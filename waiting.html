<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MYEShim – Čekárna</title>
  <style>
    :root{--bg:#120f15;--card:#1d1723;--line:#3b3044;--text:#f7f1ff;--sub:#b9a9c6;--accent:#d4af37}
    *{box-sizing:border-box} body{margin:0;min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at top,#2a1f31,var(--bg));font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding:20px}
    .card{width:min(500px,100%);background:rgba(29,23,35,.92);border:1px solid var(--line);border-radius:18px;padding:24px;text-align:center}
    h1{margin:0 0 12px;font-size:1.45rem}
    p{margin:0 0 18px;color:var(--sub);line-height:1.55}
    button{padding:12px 18px;border:none;border-radius:12px;background:linear-gradient(135deg,#e3c76a,var(--accent));color:#1a1210;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <h1>Žádost odeslána</h1>
    <p>Tvoje žádost o přístup byla odeslána. Vyčkej prosím na schválení administrátorem.</p>
    <button id="signout-btn" type="button">Odhlásit se</button>
  </div>

  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const FIREBASE_AUTH_CONFIG = {
      apiKey: "AIzaSyDNxmsMfxs0RZJLOViRn85P1t3SxuDOoRc",
      authDomain: "myeshim-app.firebaseapp.com",
      projectId: "myeshim-app",
      storageBucket: "myeshim-app.firebasestorage.app",
      messagingSenderId: "360259005980",
      appId: "1:360259005980:web:610695f8b44de04dc079d9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_AUTH_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let unsubscribeStatus = null;

    document.getElementById('signout-btn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.replace('./login.html');
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.replace('./login.html');
        return;
      }

      if (unsubscribeStatus) unsubscribeStatus();
      unsubscribeStatus = onSnapshot(doc(db, 'approvedUsers', user.uid), (snap) => {
        const status = snap.exists() ? snap.data().status : 'pending';
        if (status === 'approved') {
          window.location.replace('./index.html');
        }
      });
    });
  </script>
</body>
</html>
