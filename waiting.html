<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MYEShim – Čekárna</title>
  <style>
    :root{--bg:#120f15;--card:#1d1723;--line:#3b3044;--text:#f7f1ff;--sub:#b9a9c6;--accent:#d4af37}
    *{box-sizing:border-box} body{margin:0;min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at top,#2a1f31,var(--bg));font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding:20px}
    .card{width:min(560px,100%);background:rgba(29,23,35,.92);border:1px solid var(--line);border-radius:18px;padding:28px;text-align:center}
    h1{margin:0 0 12px;font-size:1.45rem}
    p{margin:0 0 16px;color:var(--sub);line-height:1.6}
    .btn{display:inline-block;margin-top:8px;padding:12px 18px;border:none;border-radius:12px;background:linear-gradient(135deg,#e3c76a,var(--accent));color:#1a1210;font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h1>Čeká se na schválení</h1>
    <p>Tvoje registrace čeká na schválení administrátorem.</p>
    <p>Jakmile bude účet schválen, můžeš se přihlásit svým e-mailem a heslem.</p>
    <a class="btn" href="./login.html">Zpět na přihlášení</a>
  </div>
</body>
</html>
