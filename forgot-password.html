<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>iginjaSlovo – Obnova hesla</title>
    <meta name="theme-color" content="#f4ead8">
  <link rel="stylesheet" href="./styles/brand.css">

</head>
<body class="centered-page">
  <form class="card" id="forgot-password-form">
    <div class="brand-logo-block">
      <img class="brand-logo" src="./iginjaslovo-logo-full.png" alt="iginjaSlovo logo" width="258" height="218" loading="lazy">
    </div>
    <h1>Obnova hesla</h1>
    <p>Zadej svůj e-mail. Pošleme ti odkaz pro nastavení nového hesla.</p>
    <div class="error" id="message"></div>
    <label for="email">E-mail</label>
    <input id="email" type="email" required autocomplete="email">
    <button id="submit-btn" type="submit">Poslat odkaz pro obnovu</button>
    <a class="link" href="./login.html">Zpět na přihlášení</a>
    <a class="link-small" href="./register.html">Ještě nemáš účet? Zaregistruj se</a>
  </form>

  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { initializeAppCheck, ReCaptchaV3Provider } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDNxmsMfxs0RZJLOViRn85P1t3SxuDOoRc",
      authDomain: "myeshim-app.firebaseapp.com",
      projectId: "myeshim-app",
      storageBucket: "myeshim-app.firebasestorage.app",
      messagingSenderId: "360259005980",
      appId: "1:360259005980:web:610695f8b44de04dc079d9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
    try {
      initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider('6Lfa1-gsAAAAAKGTlACah7A8mN1HGQUH1T1XbCKt'),
        isTokenAutoRefreshEnabled: true
      });
    } catch (error) {
      console.warn('App Check init skipped:', error && error.message ? error.message : error);
    }
    const auth = getAuth(app);
    const form = document.getElementById('forgot-password-form');
    const messageEl = document.getElementById('message');
    const submitBtn = document.getElementById('submit-btn');

    function setMessage(text, isSuccess = false) {
      messageEl.textContent = text;
      messageEl.className = isSuccess ? 'success' : 'error';
    }

    function getResetErrorMessage(error) {
      switch (error?.code) {
        case 'auth/invalid-email':
          return 'Zadaný e-mail nemá platný formát.';
        case 'auth/missing-email':
          return 'Zadej prosím svůj e-mail.';
        case 'auth/user-not-found':
          return '';
        case 'auth/too-many-requests':
          return 'Příliš mnoho pokusů. Zkus to prosím znovu za chvíli.';
        case 'auth/network-request-failed':
          return 'Nepodařilo se připojit k serveru. Zkontroluj internetové připojení.';
        default:
          return 'Odeslání odkazu se nezdařilo. Zkus to prosím znovu.';
      }
    }

    let isSubmitting = false;
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (isSubmitting) return;
      isSubmitting = true;
      setMessage('');
      submitBtn.disabled = true;

      const email = document.getElementById('email').value.trim().toLowerCase();

      try {
        await sendPasswordResetEmail(auth, email);
        setMessage('Pokud účet s tímto e-mailem existuje, poslali jsme odkaz pro obnovení hesla.', true);
        form.reset();
      } catch (error) {
        const errorMessage = getResetErrorMessage(error);
        if (!errorMessage) {
          setMessage('Pokud účet s tímto e-mailem existuje, poslali jsme odkaz pro obnovení hesla.', true);
          form.reset();
        } else {
          setMessage(errorMessage);
        }
      } finally {
        submitBtn.disabled = false;
        isSubmitting = false;
      }
    });
  </script>
</body>
</html>
