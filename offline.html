<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline | MyeShim</title>
  <meta name="theme-color" content="#f4ead8">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="stylesheet" href="./styles/brand.css">
  <style>
    body.offline-page{display:grid;place-items:center}
    .offline-card{max-width:420px;text-align:left}
    .logo{width:min(70vw,220px);height:auto;display:block;margin-bottom:18px}
    .offline-card p:last-of-type{margin-bottom:0}
    .btn{margin-top:18px}
  </style>
</head>
<body class="offline-page">
  <div class="card offline-card">
    <img class="logo" src="./logomyeshim.png" alt="MyeShim logo" width="600" height="230">
    <h1>Jsi offline</h1>
    <p>Aplikace funguje i bez internetu pro uložený obsah a poslední navštívené obrazovky.</p>
    <p>Až bude připojení znovu dostupné, data se načtou automaticky.</p>
    <a class="btn" href="./">Zkusit znovu</a>
  </div>
</body>
</html>
