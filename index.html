<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MYEShim – Zjevení</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --pink:#e5458e;--pink2:#f05ca2;
  --text:#1c1820;--sub:#7a6a76;
  --line:#ede4ea;--bg:#f3f5fa;--card:#fff;--r:20px;
}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh}

/* ── TOPBAR ── */
#topbar{
  position:sticky;top:0;z-index:30;
  background:rgba(255,255,255,.96);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;gap:10px;
}
.tb-logo{display:flex;align-items:center;gap:7px;flex-shrink:0}
.tb-mark{width:26px;height:26px;display:grid;grid-template-columns:1fr 1fr;gap:2px}
.tb-mark span{border-radius:7px 3px 7px 3px;background:linear-gradient(135deg,#7b3ef4,#e5458e)}
.tb-name{font-weight:900;font-size:.88rem;color:#c53580}
.tb-brand{display:flex;align-items:center;flex-shrink:0;padding:0 2px}

/* nav pill — middle of topbar */
#nav-pill{
  flex:1;display:flex;justify-content:center;
}
#nav-pill button{
  background:var(--bg);border:1.5px solid var(--line);border-radius:999px;
  padding:8px 18px;font:inherit;font-size:.92rem;font-weight:900;
  color:var(--pink);cursor:pointer;display:flex;align-items:center;gap:6px;
  white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;
}
#nav-pill button svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}

/* ── MAIN ── */
#app{max-width:480px;margin:0 auto;padding:16px 15px 96px}

.cv-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.cv-left .cv-chapter{font-size:.78rem;font-weight:800;color:var(--sub);letter-spacing:.05em;text-transform:uppercase}
.cv-left .cv-name{font-size:.96rem;font-weight:900;color:#b04c82;margin-top:2px;line-height:1.2}
.cv-right{font-size:.78rem;font-weight:800;color:var(--sub);text-align:right;padding-top:3px}

.verse-card{
  background:linear-gradient(160deg,#f05ca2 0%,#de4089 100%);
  border-radius:var(--r);padding:20px 18px;margin:0 0 16px;
  box-shadow:0 14px 30px rgba(222,64,137,.22);
}
.vc-ref{font-size:1.9rem;font-weight:900;color:#fff;line-height:1;margin-bottom:10px}
.vc-text{font-size:1.06rem;line-height:1.58;color:#fff}
.vc-text b{font-weight:800;opacity:.8}

.tabs{
  display:grid;grid-template-columns:repeat(3,1fr);gap:5px;
  background:#ede7eb;border-radius:16px;padding:4px;margin-bottom:16px;
}
.tabs button{
  border:none;background:none;border-radius:12px;
  padding:12px 4px;font:inherit;font-size:.93rem;font-weight:900;
  color:#9a7287;cursor:pointer;transition:all .14s;
}
.tabs button.active{background:#fff;color:var(--pink);box-shadow:0 3px 10px rgba(0,0,0,.09)}

.panel{display:none}.panel.active{display:block}

/* guide */
.guide-card{background:var(--card);border-radius:var(--r);border:1px solid var(--line);padding:16px}
.guide-title{font-size:1rem;font-weight:900;color:var(--pink);margin-bottom:14px}
.guide-step{display:grid;grid-template-columns:36px 1fr;gap:10px;align-items:start;padding:11px 0;border-bottom:1px solid #f3eaf0}
.guide-step:last-child{border-bottom:none}
.gs-num{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--pink2),var(--pink));color:#fff;display:grid;place-items:center;font-weight:900;font-size:1rem;flex-shrink:0}
.gs-body h4{font-size:.98rem;font-weight:900;margin-bottom:3px;line-height:1.2}
.gs-body p{font-size:.9rem;color:var(--sub);line-height:1.4}

/* qa */
.qa-card{background:var(--card);border-radius:var(--r);border:1px solid var(--line);overflow:hidden}
.qa-item{padding:16px;border-bottom:1px solid #f0e6ec}
.qa-item:last-child{border-bottom:none}
.qa-num{font-size:1.5rem;font-weight:900;line-height:1;margin-bottom:7px}
.qa-q{font-size:1.02rem;font-weight:900;line-height:1.3;margin-bottom:11px}
.qa-ans-label{font-size:.78rem;font-weight:900;color:var(--sub);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.qa-ans{font-size:1rem;line-height:1.58;color:#2e2532}

/* notes */
.note-hint{font-size:.9rem;color:var(--sub);margin-bottom:10px;line-height:1.45}
.note-ta{
  width:100%;min-height:190px;border:1.5px solid var(--line);
  border-radius:var(--r);padding:14px;font:inherit;font-size:1rem;
  line-height:1.6;background:var(--card);color:var(--text);resize:vertical;
}
.note-ta:focus{outline:none;border-color:var(--pink2)}
.note-save{
  width:100%;margin-top:10px;
  background:linear-gradient(135deg,var(--pink2),var(--pink));
  color:#fff;border:none;border-radius:var(--r);padding:15px;
  font:inherit;font-size:1rem;font-weight:900;cursor:pointer;
  box-shadow:0 8px 18px rgba(229,69,142,.22);
}

/* ── BOTTOM NAV ── */
#bottomnav{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  display:flex;max-width:480px;margin:0 auto;
  padding:5px 8px env(safe-area-inset-bottom);gap:8px;
}
#bottomnav button{
  flex:1;border:none;background:none;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 0;font:inherit;font-size:.72rem;font-weight:900;
  color:var(--sub);cursor:pointer;
}
#bottomnav button svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:2}
#bottomnav button.active{color:var(--pink)}
#bn-next{color:var(--pink)!important}

/* ── NAV OVERLAY ── */
#nav-ov{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.0);
  display:none;align-items:stretch;justify-content:center;
}
#nav-ov.open{display:flex}
#nav-sheet{
  background:var(--bg,#f3f5fa);
  width:100%;max-width:480px;
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  height:100dvh;
  overflow:hidden;
}
.ns-handle{display:none}
.ns-head{padding:12px 16px 0;flex-shrink:0}
.ns-search-wrap{
  display:flex;align-items:center;gap:9px;
  border:1.5px solid var(--line);border-radius:var(--r);
  padding:11px 14px;background:#fafafe;margin-bottom:14px;
}
.ns-search-wrap input{border:none;background:none;font:inherit;font-size:1rem;flex:1;outline:none;color:var(--text)}
.ns-search-wrap input:focus{outline:none}
.ns-search-wrap svg{color:#bbb;flex-shrink:0}

/* chapter + verse grids */
.ns-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 20px}
.ns-section-label{
  font-size:.76rem;font-weight:900;color:var(--sub);
  text-transform:uppercase;letter-spacing:.07em;
  margin:0 0 10px;
}
.ns-ch-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;
}
.ns-ch-grid button{
  border:1.5px solid var(--line);background:#fafafe;border-radius:16px;
  padding:12px 6px;font:inherit;font-size:.88rem;font-weight:900;
  color:var(--sub);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;transition:all .12s;
}
.ns-ch-grid button .ch-num{font-size:1.06rem}
.ns-ch-grid button .ch-title{font-size:.72rem;font-weight:700;color:#b08090;line-height:1.2;text-align:center}
.ns-ch-grid button.active{border-color:var(--pink);background:#fff0f7;color:var(--pink)}
.ns-ch-grid button.active .ch-title{color:var(--pink)}

.ns-v-section{}
.ns-v-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;}
.ns-v-grid button{
  border:1.5px solid var(--line);background:#fafafe;border-radius:12px;
  padding:12px 4px;font:inherit;font-size:.95rem;font-weight:900;
  color:var(--sub);cursor:pointer;transition:all .12s;
}
.ns-v-grid button.active{border-color:var(--pink);background:#fff0f7;color:var(--pink)}
.ns-v-grid button.has-note{border-color:#c4e0b2;background:#f4fbed}

/* search results */
.ns-sr{}
.ns-sr-item{
  padding:13px 0;border-bottom:1px solid #f3eaf0;cursor:pointer;
  display:grid;grid-template-columns:62px 1fr;gap:10px;align-items:start;
}
.ns-sr-item:last-child{border-bottom:none}
.ns-sr-ref{font-weight:900;color:var(--pink);font-size:.88rem}
.ns-sr-name{font-size:.76rem;color:var(--sub);margin-top:1px}
.ns-sr-text{font-size:.95rem;color:var(--text);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
</style>

<style id="ux35-style">
:root{--fontScale:1;--shadow-soft:0 10px 26px rgba(18,20,38,.08);--chip:#ffffffcc}
html{font-size:calc(16px * var(--fontScale));scroll-behavior:smooth}
body{padding-bottom:max(0px,env(safe-area-inset-bottom));}
body.dark{
  --text:#f6eef3;--sub:#c7b3c2;--line:#352b35;--bg:#120f15;--card:#1a151d;
  --chip:#221b25d9;
}
body.dark #topbar{background:rgba(22,18,24,.88)}
body.dark .tabs{background:#261f27}
body.dark .tabs button.active{background:#1a151d;box-shadow:0 4px 14px rgba(0,0,0,.22)}
body.dark .qa-ans, body.dark .gs-body p, body.dark .note-hint, body.dark .cv-right, body.dark .cv-left .cv-chapter{color:var(--sub)}
body.dark .guide-card, body.dark .qa-card, body.dark .note-ta{background:var(--card);border-color:var(--line)}
body.dark .note-ta{color:var(--text)}
body.dark #bottomnav, body.dark #nav-sheet{background:#171219;border-color:var(--line)}
body.dark .ns-search-wrap{background:#221b25;border-color:var(--line)}
body.dark #nav-pill button{background:#221b25;border-color:var(--line)}
body.dark .tabs button{color:#caa6bb}
body.dark .cv-left .cv-name{color:#ff87bd}
body.dark #ux35-progress-wrap{background:rgba(255,255,255,.08)}
body.dark .ux35-dock{background:rgba(26,21,29,.88);border-color:var(--line)}
body.dark .ux35-btn{background:#221b25;color:#f7d3e3;border-color:#3a2d39}
body.dark .ux35-btn:hover{background:#2a2230}
body.dark .ux35-status{color:var(--sub)}
body.dark .tb-brand, body.dark .tb-name{filter:brightness(1.1)}

#topbar{padding-top:max(11px,calc(11px + env(safe-area-inset-top)))}
#app{max-width:760px;padding-bottom:170px}
.verse-card,.guide-card,.qa-card,.note-ta,.note-save,.tabs,#nav-pill button{box-shadow:var(--shadow-soft)}
.vc-text,.qa-ans,.gs-body p,.note-ta{hyphens:auto}
#ux35-progress-wrap{
  position:sticky;top:60px;z-index:24;max-width:760px;margin:8px auto 0;padding:0 15px;
}
#ux35-progress-track{
  height:8px;border-radius:999px;background:rgba(229,69,142,.13);overflow:hidden;position:relative;
}
#ux35-progress{
  height:100%;width:0%;background:linear-gradient(90deg,#7b3ef4,#e5458e);border-radius:999px;transition:width .18s ease;
}
#ux35-progress-label{
  margin-top:6px;font-size:.77rem;font-weight:800;color:var(--sub);text-align:right;
}
.ux35-dock{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(74px + env(safe-area-inset-bottom));z-index:29;
  display:flex;gap:8px;align-items:center;padding:8px;border-radius:18px;background:rgba(255,255,255,.78);
  backdrop-filter:blur(16px);border:1px solid var(--line);box-shadow:0 12px 28px rgba(26,18,26,.12);max-width:min(94vw,760px);
}
.ux35-btn{
  border:1px solid #eadde5;background:#fff;color:var(--text);border-radius:14px;padding:10px 12px;
  font:inherit;font-size:.9rem;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;
}
.ux35-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.2}
.ux35-btn:hover{background:#fbf6f9}
.ux35-status{font-size:.8rem;font-weight:800;color:var(--sub);padding:0 4px;white-space:nowrap}
#ux35-toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(136px + env(safe-area-inset-bottom));z-index:40;
  background:#201823;color:#fff;padding:10px 14px;border-radius:999px;font-size:.88rem;font-weight:800;
  opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;
}
#ux35-toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
#ux35-note-meta{margin-top:10px;font-size:.82rem;color:var(--sub);text-align:right}
@media (max-width:720px){
  .ux35-dock{gap:6px;padding:7px 7px 7px 7px;width:calc(100vw - 18px);overflow:auto;justify-content:flex-start}
  .ux35-btn{padding:10px 11px;font-size:.86rem}
  .ux35-status{display:none}
}
@media (min-width:900px){
  #app{max-width:820px}
  #ux35-progress-wrap{max-width:820px}
}
@media print{
  #topbar,#bottomnav,#nav-ov,.tabs,.note-save,.ux35-dock,#ux35-toast,#ux35-progress-wrap{display:none !important}
  html,body{background:#fff !important;color:#000 !important}
  #app{max-width:none;padding:0 0 0 0}
  .panel{display:block !important}
  .guide-card,.qa-card,.verse-card,.note-ta{box-shadow:none !important;border:1px solid #ddd !important}
  .verse-card{background:#fff !important;color:#000 !important}
  .vc-ref,.vc-text{color:#000 !important}
}
</style>

<script>
/* ════════════════════════════════════════════
   DATA – Book of Revelation (Zjevení), 22 chapters
   ════════════════════════════════════════════ */
const CHAPTERS = [
  { n:1,  name:'Vidění Syna člověka',       verses:20 },
  { n:2,  name:'Listy čtyřem sborům',       verses:29 },
  { n:3,  name:'Listy třem sborům',         verses:22 },
  { n:4,  name:'Trůn v nebesích',           verses:11 },
  { n:5,  name:'Zapečetěná kniha',          verses:14 },
  { n:6,  name:'Otevírání šesti pečetí',    verses:17 },
  { n:7,  name:'144 000 zapečetěných',      verses:17 },
  { n:8,  name:'Sedmá pečeť a polnice',     verses:13 },
  { n:9,  name:'Pátá a šestá polnice',      verses:21 },
  { n:10, name:'Anděl s otevřenou knihou',  verses:11 },
  { n:11, name:'Dva svědkové',              verses:19 },
  { n:12, name:'Žena a drak',               verses:17 },
  { n:13, name:'Šelmy ze země a moře',      verses:18 },
  { n:14, name:'Beránek na hoře Sion',      verses:20 },
  { n:15, name:'Sedm andělů s miskami',     verses:8  },
  { n:16, name:'Sedm misek hněvu',          verses:21 },
  { n:17, name:'Velká nevěstka',            verses:18 },
  { n:18, name:'Pád Babylona',              verses:24 },
  { n:19, name:'Slavnostní chválopěv',      verses:21 },
  { n:20, name:'Tisíciletá vláda',          verses:15 },
  { n:21, name:'Nové nebe a nová země',     verses:27 },
  { n:22, name:'Řeka života a závěr',       verses:21 }
];

/* Sample verse texts (Czech, Zjevení 1:1-3) */
const VERSES = {
  '1-1': 'Zjevení Ježíše Krista, které mu dal Bůh, aby ukázal svým otrokům, co se musí brzy stát; naznačil to prostřednictvím svého anděla a dal to poznat svému otroku Janovi.',
  '1-2': 'Ten vydal svědectví o Božím slově a o svědectví Ježíše Krista — o všem, co viděl.',
  '1-3': 'Blahoslavený, kdo čte, i ti, kteří slyší slova tohoto proroctví a zachovávají, co je v něm napsáno; neboť čas je blízko.',
  '22-20':'Ten, který dosvědčuje tato slova, říká: „Ano, přijdu brzy." Amen, přijď, Pane Ježíši!'
};

function verseText(ch, v) {
  return VERSES[ch+'-'+v] || 'Zjevení '+ch+':'+v+' — text připravujeme…';
}

/* ════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════ */
const state = { ch:1, v:1, selCh:1, tab:0, notes:{} };

/* ════════════════════════════════════════════
   NAV OVERLAY
   ════════════════════════════════════════════ */

/** Open nav overlay and pre-select current chapter */
function nsOpen() {
  state.selCh = state.ch;
  nsRenderChapterGrid();
  nsRenderVerseGrid(state.selCh);
  document.getElementById('ns-v-section').style.display = '';
  document.getElementById('ns-search').value = '';
  document.getElementById('ns-sr').style.display = 'none';
  document.getElementById('nav-ov').classList.add('open');
  // scroll to active chapter button
  requestAnimationFrame(() => {
    const active = document.querySelector('.ns-ch-grid button.active');
    if (active) active.scrollIntoView({ block:'nearest' });
  });
}

/** Close nav overlay */
function nsClose() {
  document.getElementById('nav-ov').classList.remove('open');
}

/** Click on overlay background → close */
function nsOvClick(e) {
  if (e.target === document.getElementById('nav-ov')) nsClose();
}

/** Select a chapter inside the overlay: mark active, render verse grid */
function nsSelectChapter(ch) {
  state.selCh = ch;
  // update active class on chapter buttons
  document.querySelectorAll('#ns-ch-grid button').forEach(btn => {
    btn.classList.toggle('active', +btn.dataset.ch === ch);
  });
  // show verse grid for chosen chapter
  nsRenderVerseGrid(ch);
  document.getElementById('ns-v-section').style.display = '';
  document.getElementById('ns-v-label').textContent =
    'Verše – ' + CHAPTERS[ch-1].name;
  // scroll verse section into view
  document.getElementById('ns-v-section').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

/** Click a verse → close overlay, navigate */
function nsSelectVerse(ch, v) {
  nsClose();
  state.ch = ch;
  state.v  = v;
  render();
}

/** Build chapter grid buttons */
function nsRenderChapterGrid() {
  const grid = document.getElementById('ns-ch-grid');
  if (grid.children.length > 0) {
    // already built; just update active state
    grid.querySelectorAll('button').forEach(btn => {
      btn.classList.toggle('active', +btn.dataset.ch === state.selCh);
    });
    return;
  }
  CHAPTERS.forEach(ch => {
    const btn = document.createElement('button');
    btn.dataset.ch = ch.n;
    btn.innerHTML = '<span class="ch-num">'+ch.n+'</span>'
                  + '<span class="ch-title">'+ch.name+'</span>';
    btn.classList.toggle('active', ch.n === state.selCh);
    btn.addEventListener('click', () => nsSelectChapter(ch.n));
    grid.appendChild(btn);
  });
}

/** Build verse grid buttons for a chapter */
function nsRenderVerseGrid(ch) {
  const grid = document.getElementById('ns-v-grid');
  grid.innerHTML = '';
  const count = CHAPTERS[ch-1].verses;
  for (let v = 1; v <= count; v++) {
    const btn = document.createElement('button');
    btn.textContent = v;
    btn.dataset.v = v;
    if (state.notes[ch+'-'+v]) btn.classList.add('has-note');
    if (ch === state.ch && v === state.v) btn.classList.add('active');
    btn.addEventListener('click', () => nsSelectVerse(ch, v));
    grid.appendChild(btn);
  }
}

/** Search inside nav overlay */
function nsSearch(q) {
  const sr = document.getElementById('ns-sr');
  const chGrid = document.getElementById('ns-ch-grid');
  const vSec   = document.getElementById('ns-v-section');
  if (!q.trim()) {
    sr.style.display = 'none';
    chGrid.style.display = '';
    vSec.style.display = '';
    return;
  }
  chGrid.style.display = 'none';
  vSec.style.display   = 'none';
  sr.style.display = '';
  const results = [];
  CHAPTERS.forEach(ch => {
    for (let v = 1; v <= ch.verses; v++) {
      const text = verseText(ch.n, v);
      if (text.toLowerCase().includes(q.toLowerCase())) {
        results.push({ ch:ch.n, v, name:ch.name, text });
      }
    }
  });
  if (!results.length) {
    sr.innerHTML = '<p style="padding:20px;text-align:center;color:var(--sub)">Nic nenalezeno.</p>';
    return;
  }
  sr.innerHTML = results.slice(0,30).map(r =>
    '<div class="ns-sr-item" onclick="nsSelectVerse('+r.ch+','+r.v+')">'
    +'<div><div class="ns-sr-ref">Zj '+r.ch+':'+r.v+'</div>'
    +'<div class="ns-sr-name">'+r.name+'</div></div>'
    +'<div class="ns-sr-text">'+r.text+'</div></div>'
  ).join('');
}

/* ════════════════════════════════════════════
   MAIN RENDER
   ════════════════════════════════════════════ */
function render() {
  const ch = state.ch, v = state.v;
  const chData = CHAPTERS[ch-1];

  // topbar / nav pill
  document.getElementById('nav-pill-label').textContent = 'Zjevení '+ch;

  // chapter header
  document.getElementById('cv-chapter').textContent = ch;
  document.getElementById('cv-name').textContent    = chData.name;
  document.getElementById('cv-right').textContent   = 'Verš '+v+' / '+chData.verses;

  // progress
  const total = CHAPTERS.reduce((s,c)=>s+c.verses,0);
  const done  = CHAPTERS.slice(0,ch-1).reduce((s,c)=>s+c.verses,0) + v;
  const pct   = Math.round(done/total*100);
  document.getElementById('ux35-progress').style.width = pct+'%';
  document.getElementById('ux35-progress-label').textContent = 'Přečteno '+pct+' %';
  document.getElementById('ux35-status').textContent = 'Zj '+ch+':'+v;

  // verse card
  document.getElementById('vc-ref').textContent  = 'Zjevení '+ch+':'+v;
  document.getElementById('vc-text').textContent = verseText(ch, v);

  // note textarea
  document.getElementById('note-ta').value = state.notes[ch+'-'+v] || '';

  // guide card
  document.getElementById('guide-card').innerHTML =
    '<div style="padding:4px 0 10px"><b style="color:var(--pink)">Kapitola '+ch+' – '+chData.name+'</b></div>'
    +'<p style="color:var(--sub);font-size:.92rem">Studijní průvodce pro tuto kapitolu bude brzy dostupný.</p>';

  // qa card
  document.getElementById('qa-card').innerHTML =
    '<div style="padding:16px">'
    +'<div class="qa-q" style="margin-bottom:8px">Co nás učí Zjevení '+ch+':'+v+'?</div>'
    +'<div class="qa-ans" style="color:var(--sub);font-size:.92rem">Otázky pro tuto kapitolu budou brzy dostupné.</div>'
    +'</div>';

  // prev/next buttons
  const firstVerse = (ch===1 && v===1);
  const lastVerse  = (ch===CHAPTERS.length && v===CHAPTERS[ch-1].verses);
  document.getElementById('bn-prev').disabled = firstVerse;
  document.getElementById('bn-next').disabled = lastVerse;

  // scroll to top
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* ════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════ */
function navVerse(dir) {
  let {ch, v} = state;
  v += dir;
  if (v < 1) {
    if (ch > 1) { ch--; v = CHAPTERS[ch-1].verses; }
    else return;
  } else if (v > CHAPTERS[ch-1].verses) {
    if (ch < CHAPTERS.length) { ch++; v = 1; }
    else return;
  }
  state.ch = ch; state.v = v;
  render();
}

function setTab(n) {
  state.tab = n;
  document.querySelectorAll('.tabs button').forEach((b,i) => b.classList.toggle('active', i===n));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===n));
}

function saveNote() {
  const key = state.ch+'-'+state.v;
  state.notes[key] = document.getElementById('note-ta').value;
  showToast('Poznámka uložena');
  // refresh verse grid has-note in overlay if open
  if (document.getElementById('nav-ov').classList.contains('open')) nsRenderVerseGrid(state.selCh);
}

function showToast(msg) {
  const t = document.getElementById('ux35-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleDark() {
  document.body.classList.toggle('dark');
}

/* ════════════════════════════════════════════
   PWA
   ════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-card').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click', () => {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
  document.getElementById('install-card').classList.remove('show');
});

/* ════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════ */
render();
document.body.classList.add('ready');
</script>
</body>
