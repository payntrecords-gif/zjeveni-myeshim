const VERSES=[{"c":1,"v":1,"t":"Zjevení Ježíše Krista, které mu dal Bůh, aby svým otrokům ukázal, co se má brzy stát. On to prostřednictvím svého anděla naznačil svému otroku Janovi"},{"c":1,"v":2,"t":"Ten dosvědčil Boží slovo a svědectví Ježíše Krista, vše, co uviděl"},{"c":1,"v":3,"t":"Blahoslavený, kdo předčítá, i ti, kdo slyší slova tohoto proroctví a zachovávají, co je v něm zapsáno, neboť ten čas je blízko"},{"c":1,"v":4,"t":"Jan sedmi sborům v Asii: Milost vám a pokoj od Toho, který jest a který byl a který přichází, i od sedmi duchů, kteří jsou před jeho trůnem,"},{"c":1,"v":5,"t":"a od Ježíše Krista, jenž je věrný svědek, prvorozený z mrtvých a vládce králů země. Tomu, jenž nás miluje a svou krví nás rozvázal z našich hříchů"},{"c":1,"v":6,"t":"a učinil nás královstvím, kněžími svému Bohu a Otci — jemu sláva i moc na věky věků. Amen"},{"c":1,"v":7,"t":"‚Hle, přichází s oblaky‘ a ‚uzří jej každé oko, i ti, kteří jej probodli‘, a ‚budou se pro něho bít v prsa všechny kmeny země‘. Ano, amen"},{"c":1,"v":8,"t":"Já jsem Alfa i Omega, počátek i konec, praví Pán Bůh, Ten, který jest a který byl a který přichází, ten Všemohoucí"},{"c":1,"v":9,"t":"Já Jan, váš bratr a spoluúčastník soužení, království a vytrvalosti v Ježíši Kristu, jsem se ocitl pro Boží slovo a svědectví Ježíše Krista na ostrově zvaném Patmos"},{"c":1,"v":10,"t":"V den Páně jsem se ocitl v Duchu a uslyšel jsem za sebou mocný hlas jako zvuk polnice,"},{"c":1,"v":11,"t":"který říkal: „Co vidíš, napiš do svitku a pošli sedmi sborům: Do Efesu, do Smyrny, do Pergama, do Thyatir, do Sard, do Filadelfie a do Laodiceje.“"},{"c":1,"v":12,"t":"Obrátil jsem se, abych viděl hlas, který se mnou mluvil. A když jsem se obrátil, spatřil jsem sedm zlatých svícnů"},{"c":1,"v":13,"t":"a uprostřed těch svícnů někoho jako Syna člověka, oděného dlouhým rouchem a přepásaného zlatým pásem až k prsům"},{"c":1,"v":14,"t":"Jeho hlava a vlasy byly bílé jako bílá vlna, jako sníh, jeho oči jako plamen ohně;"},{"c":1,"v":15,"t":"jeho nohy podobné bronzu rozžhavenému v peci a jeho hlas jako zvuk mnohých vod"},{"c":1,"v":16,"t":"A ve své pravici měl sedm hvězd a z jeho úst vycházel ostrý dvousečný meč a jeho tvář jako když slunce září ve své síle"},{"c":1,"v":17,"t":"Když jsem jej spatřil, padl jsem k jeho nohám jako mrtvý. I položil na mne svou pravici a řekl: „Neboj se. Já jsem první i poslední,"},{"c":1,"v":18,"t":"ten Živý. Byl jsem mrtvý, a hle, žiji na věky věků. Amen. Mám klíče smrti i podsvětí"},{"c":1,"v":19,"t":"Napiš tedy ty věci, které jsi uviděl, a ty, které jsou, a ty, které se mají stát po nich"},{"c":1,"v":20,"t":"Tajemství těch sedmi hvězd, které jsi spatřil na mé pravici, i těch sedmi zlatých svícnů: Sedm hvězd jsou andělé sedmi sborů, sedm svícnů je sedm sborů.“"},{"c":2,"v":1,"t":"„Andělu sboru v Efesu napiš: ‚Toto praví ten, který pevně drží těch sedm hvězd ve své pravici, který se prochází uprostřed těch sedmi zlatých svícnů:"},{"c":2,"v":2,"t":"Znám tvé skutky, tvou námahu i tvou vytrvalost; vím, že nemůžeš snést zlé lidi a vyzkoušel jsi ty, kteří se nazývají apoštoly, ale nejsou, a shledal jsi, že jsou lháři"},{"c":2,"v":3,"t":"Máš vytrvalost a snášel jsi těžkosti pro mé jméno, a nezemdlel jsi"},{"c":2,"v":4,"t":"Ale to mám proti tobě, že jsi opustil svou první lásku"},{"c":2,"v":5,"t":"Rozpomeň se, odkud jsi spadl, učiň pokání a začni jednat jako dřív! Ne-li, přijdu k tobě brzy a pohnu tvým svícnem z jeho místa; jestliže neučiníš pokání"},{"c":2,"v":6,"t":"To však máš k dobru, že nenávidíš skutky Nikolaitů, které i já nenávidím"},{"c":2,"v":7,"t":"Kdo má uši, slyš, co Duch praví sborům: Tomu, kdo vítězí, dám jíst ze stromu života, který je v Božím ráji.‘"},{"c":2,"v":8,"t":"Andělu sboru ve Smyrně napiš: ‚Toto praví ten první a poslední, který byl mrtev a ožil:"},{"c":2,"v":9,"t":"Znám tvé soužení a chudobu, ale jsi bohatý. Znám i urážení od těch, kteří sami o sobě říkají, že jsou Židé, ale nejsou, nýbrž jsou synagogou Satanovou"},{"c":2,"v":10,"t":"Neboj se toho, co máš trpět. Hle, Ďábel se chystá některé z vás dávat do vězení, abyste byli vyzkoušeni, a budete mít soužení po deset dní. Buď věrný až na smrt, a dám ti věnec života"},{"c":2,"v":11,"t":"Kdo má uši, slyš, co Duch praví sborům: Kdo vítězí, tomu druhá smrt neublíží.‘"},{"c":2,"v":12,"t":"Andělu sboru v Pergamu napiš: ‚Toto praví ten, který má ostrý dvousečný meč:"},{"c":2,"v":13,"t":"Vím, kde bydlíš: tam, kde je trůn Satanův; avšak pevně držíš mé jméno a nezapřel jsi mou víru ani ve dnech, v nichž můj věrný svědek Antipas byl zabit u vás, kde bydlí Satan"},{"c":2,"v":14,"t":"Ale mám několik věcí proti tobě. Že tam máš lidi, kteří drží učení Balaámovo, který učil Baláka položit nástrahu před syny Izraele, aby jedli maso obětované modlám a smilnili;"},{"c":2,"v":15,"t":"tak i ty máš některé, kteří stejně drží učení Nikolaitů"},{"c":2,"v":16,"t":"Učiň tedy pokání! Ne-li, brzy k tobě přijdu a budu s nimi válčit mečem svých úst"},{"c":2,"v":17,"t":"Kdo má uši, slyš, co Duch praví sborům: Tomu, kdo vítězí, dám skrytou manu a dám mu bílý kamének a na tom kaménku napsané nové jméno, které nezná nikdo, než ten, kdo je dostává.‘"},{"c":2,"v":18,"t":"Andělu sboru v Thyatirech napiš: ‚Toto praví Syn Boží, který má oči jako plamen ohně a nohy podobné bronzu:"},{"c":2,"v":19,"t":"Znám tvé skutky a tvou lásku, věrnost a službu, tvou vytrvalost a tvé poslední skutky, hojnější než ty první"},{"c":2,"v":20,"t":"Ale to mám proti tobě, že trpíš ženu Jezábel, která si říká prorokyně, vyučuje a svádí mé otroky, aby smilnili a jedli maso obětované modlám"},{"c":2,"v":21,"t":"Dal jsem jí čas k pokání, ale ona se nechce odvrátit od svého smilstva."},{"c":2,"v":22,"t":"Hle, uvrhnu ji na lůžko a ty, kteří s ní cizoloží, do velkého soužení, jestliže se od jejích činů neodvrátí;"},{"c":2,"v":23,"t":"a její děti zahubím. A všechny sbory poznají, že já jsem ten, který zkoumá ledví i srdce, a každému z vás odplatím podle vašich skutků"},{"c":2,"v":24,"t":"Vám ostatním v Thyatirech, kteří nemáte toto učení, kteří jste, jak oni říkají, nepoznali hluboké věci Satanovy, pravím: Nekladu na vás jiné břemeno;"},{"c":2,"v":25,"t":"pouze držte pevně, co máte, dokud nepřijdu"},{"c":2,"v":26,"t":"Kdo vítězí a zachovává moje skutky až do konce, tomu dám vládu nad národy;"},{"c":2,"v":27,"t":"bude je pást železnou berlou a budou rozbíjeny jako hliněné nádobí,"},{"c":2,"v":28,"t":"jak jsem to i já přijal od svého Otce. A dám mu hvězdu jitřní"},{"c":2,"v":29,"t":"Kdo má uši, slyš, co Duch praví sborům.‘"},{"c":3,"v":1,"t":"Andělu sboru v Sardách napiš: ‚Toto praví ten, který má sedm duchů Božích a sedm hvězd: Znám tvé skutky; máš jméno, že žiješ, ale jsi mrtvý"},{"c":3,"v":2,"t":"Buď bdělý a upevni to, co ještě zbývá a je na umření, neboť jsem nenalezl tvé skutky úplné před mým Bohem"},{"c":3,"v":3,"t":"Připomínej si, jak jsi mé slovo přijal a slyšel, zachovávej je a učiň pokání. Neprobudíš-li se, přijdu jako zloděj, a nebudeš vědět, v kterou hodinu na tebe přijdu"},{"c":3,"v":4,"t":"Máš však v Sardách několik osob, které neposkvrnily svá roucha; ti budou se mnou chodit v bílých šatech, protože jsou toho hodni"},{"c":3,"v":5,"t":"Kdo vítězí, takto se bude oblékat do bílých šatů a jeho jméno nevymažu z knihy života, nýbrž vyznám je před svým Otcem a před jeho anděly"},{"c":3,"v":6,"t":"Kdo má uši, slyš, co Duch praví sborům.‘"},{"c":3,"v":7,"t":"Andělu sboru ve Filadelfii napiš: ‚Toto praví ten Svatý, ten Pravý, který má klíč Davidův; když on otevírá, nikdo nezavře, a když on zavírá, nikdo neotevře:"},{"c":3,"v":8,"t":"Znám tvé skutky. Hle, postavil jsem před tebou otevřené dveře, které nemůže nikdo zavřít. Neboť máš malou moc, a přece jsi zachoval mé slovo a nezapřel jsi mé jméno"},{"c":3,"v":9,"t":"Hle, dávám ti ze synagogy Satanovy ty, kdo o sobě říkají, že jsou Židé, a nejsou, ale lžou. Hle, způsobím, že přijdou a pokloní se před tvýma nohama; a poznají, že já jsem si tě zamiloval"},{"c":3,"v":10,"t":"Protože jsi zachoval slovo mé vytrvalosti, i já zachovám tebe v hodině zkoušky, která má přijít na celý obydlený svět, aby vyzkoušela obyvatele země"},{"c":3,"v":11,"t":"Přijdu brzy. Drž pevně, co máš, aby ti nikdo nevzal věnec vítěze"},{"c":3,"v":12,"t":"Kdo vítězí, toho učiním sloupem ve svatyni svého Boha a již nikdy nevyjde ven. Napíšu na něj jméno svého Boha a jméno města svého Boha, nového Jeruzaléma, který sestupuje z nebe od mého Boha, i své nové jméno"},{"c":3,"v":13,"t":"Kdo má uši, slyš, co Duch praví sborům.‘"},{"c":3,"v":14,"t":"Andělu sboru v Laodiceji napiš: ‚Toto praví Amen, svědek věrný a pravý, původ Božího stvoření:"},{"c":3,"v":15,"t":"Znám tvé skutky; nejsi studený ani horký. Kéž bys byl studený nebo horký!"},{"c":3,"v":16,"t":"Takto však, že jsi vlažný, a nejsi studený ani horký, vyvrhnu tě ze svých úst"},{"c":3,"v":17,"t":"Neboť říkáš: Jsem bohatý, zbohatl jsem, nic nepotřebuji. A nevíš, že jsi ubohý, politováníhodný a chudý, slepý a nahý"},{"c":3,"v":18,"t":"Radím ti, abys ode mne koupil zlato v ohni pročištěné, a tak zbohatl, bílé šaty, aby ses oblékl a neukázala se hanba tvé nahoty, a mast k pomazání svých očí, abys viděl"},{"c":3,"v":19,"t":"Já usvědčuji a kárám ty, které miluji; buď tedy horlivý a učiň pokání"},{"c":3,"v":20,"t":"Hle, stojím u dveří a tluču; kdo by uslyšel můj hlas a otevřel dveře, k tomu vejdu a budu s ním večeřet a on se mnou"},{"c":3,"v":21,"t":"Kdo vítězí, tomu dám usednout se mnou na můj trůn, jako i já jsem zvítězil a usedl se svým Otcem na jeho trůn."},{"c":3,"v":22,"t":"Kdo má uši, slyš, co Duch praví sborům.‘“"},{"c":4,"v":1,"t":"Potom jsem uviděl: Hle, otevřené dveře v nebi, a ten první hlas, který jsem uslyšel jako zvuk polnice mluvící se mnou, říkal: „Vystup sem a ukážu ti, co se má stát potom. “"},{"c":4,"v":2,"t":"Ihned jsem se ocitl v Duchu. A hle, v nebi stál trůn a na tom trůnu někdo seděl"},{"c":4,"v":3,"t":"A ten, kdo na něm seděl, byl na pohled jako kámen jaspis a karneol; a kolem trůnu duha na pohled jako smaragd"},{"c":4,"v":4,"t":"Okolo toho trůnu čtyřiadvacet jiných trůnů a na těch trůnech sedělo čtyřiadvacet starších, oblečených do bílých šatů a na hlavách zlaté věnce"},{"c":4,"v":5,"t":"Z trůnu vycházely blesky, hlasy a hromy. Před trůnem hořelo sedm ohnivých pochodní, to jest sedm duchů Božích"},{"c":4,"v":6,"t":"A před trůnem bylo něco jako skelné moře, podobné křišťálu. Uprostřed trůnu a kolem trůnu čtyři živé bytosti plné očí zpředu i zezadu"},{"c":4,"v":7,"t":"První bytost byla podobná lvu, druhá bytost byla podobná býku, třetí bytost měla tvář jako člověk a čtvrtá bytost byla podobná letícímu orlu"},{"c":4,"v":8,"t":"Ty čtyři živé bytosti měly každá po šesti křídlech, dokola i uvnitř plno očí. A bez přestání dnem i nocí říkají: „Svatý, svatý, svatý Pán, Bůh Všemohoucí, ten, který byl a který jest a který přichází.“"},{"c":4,"v":9,"t":"A kdykoli ty živé bytosti vzdají slávu a čest a díky Sedícímu na trůnu, Žijícímu na věky věků,"},{"c":4,"v":10,"t":"padne těch čtyřiadvacet starších před Sedícím na trůnu a pokloní se Žijícímu na věky věků; pak hodí své věnce vítězů před trůn a říkají:"},{"c":4,"v":11,"t":"„Hoden jsi, Pane a Bože náš, Svatý, přijmout slávu a úctu i moc, neboť ty jsi stvořil všechny věci, z tvé vůle existovaly a byly stvořeny.“"},{"c":5,"v":1,"t":"A na pravici Sedícího na trůnu jsem spatřil svitek popsaný zevnitř i zvenčí, zapečetěný sedmi pečetěmi"},{"c":5,"v":2,"t":"A uviděl jsem silného anděla, který hlásal mocným hlasem: „Kdo je hoden otevřít ten svitek a rozlomit jeho pečetě?“"},{"c":5,"v":3,"t":"A nikdo v nebi ani na zemi ani pod zemí nemohl otevřít ten svitek a dívat se do něho"},{"c":5,"v":4,"t":"Velmi jsem plakal, že se nenašel nikdo, kdo by byl hoden svitek otevřít a dívat se do něj"},{"c":5,"v":5,"t":"Ale jeden ze starších mi říká: „Neplač. Hle, zvítězil lev, ten z kmene Judova, kořen Davidův, aby otevřel ten svitek a jeho sedm pečetí.“"},{"c":5,"v":6,"t":"A tu jsem spatřil, že uprostřed trůnu a těch čtyř živých bytostí a uprostřed těch starších stál Beránek jako zabitý; měl sedm rohů a sedm očí, což jest sedm duchů Božích, vyslaných do celé země"},{"c":5,"v":7,"t":"I přišel a vzal ten svitek z pravice sedícího na trůnu"},{"c":5,"v":8,"t":"A když ho vzal, čtyři živé bytosti i čtyřiadvacet starších padlo před Beránkem; každý měl harfu a zlaté misky plné kadidel, což jsou modlitby svatých"},{"c":5,"v":9,"t":"A zpívají novou píseň: „Jsi hoden vzít ten svitek a otevřít jeho pečeti, protože jsi byl zabit a svou krví jsi vykoupil Bohu lidi z každého kmene, jazyka, lidu a národu,"},{"c":5,"v":10,"t":"a učinil jsi je králi a kněžími našemu Bohu; a budou kralovat na zemi.“"},{"c":5,"v":11,"t":"I uviděl jsem a uslyšel jsem hlas mnoha andělů okolo trůnu a těch živých bytostí a těch starších, jejich počet byl desetitisíce desetitisíců a tisíce tisíců,"},{"c":5,"v":12,"t":"a říkali mocným hlasem: „Hoden jest Beránek, ten zabitý, přijmout tu moc a bohatství, moudrost, sílu a úctu, slávu a dobrořečení.“"},{"c":5,"v":13,"t":"A všechno stvoření, které je v nebi, na zemi, pod zemí i na moři, všechno, co je v nich, jsem slyšel volat: „Tomu, jenž sedí na trůnu, a Beránkovi dobrořečení, úcta, sláva i moc na věky věků!“"},{"c":5,"v":14,"t":"A ty čtyři živé bytosti říkaly: „Amen.“A starší padli na tvář a poklonili se"},{"c":6,"v":1,"t":"I uviděl jsem, když Beránek otevřel jednu ze sedmi pečetí, a uslyšel jsem, jak jedna z těch čtyř živých bytostí řekla hromovým hlasem: „Pojď! “"},{"c":6,"v":2,"t":"A uviděl jsem, a hle, bílý kůň; a ten, který na něm seděl, měl luk a byl mu dán věnec; a vyšel vítězící, a aby zvítězil"},{"c":6,"v":3,"t":"Když otevřel druhou pečeť, uslyšel jsem, jak ta druhá živá bytost řekla: „Pojď! “"},{"c":6,"v":4,"t":"A vyšel jiný kůň, ohnivě rudý; a tomu, kdo na něm seděl, bylo dáno, aby vzal ze země pokoj a aby se lidé navzájem zabíjeli; a byl mu dán veliký meč"},{"c":6,"v":5,"t":"A když otevřel třetí pečeť, uslyšel jsem, jak třetí živá bytost řekla: „Pojď! “A uviděl jsem, a hle, černý kůň; a ten, který na něm seděl, měl ve své ruce vahadlo"},{"c":6,"v":6,"t":"A uslyšel jsem cosi jako hlas uprostřed těch čtyř živých bytostí, který řekl: „Mírka pšenice za denár a tři mírky ječmene za denár. Olej a víno nezdražuj. “"},{"c":6,"v":7,"t":"A když otevřel čtvrtou pečeť, uslyšel jsem hlas čtvrté živé bytosti, jak řekla: „Pojď! “"},{"c":6,"v":8,"t":"A uviděl jsem, a hle, kůň plavý; a jméno toho, který na něm seděl, bylo Smrt, a Hádes ho doprovázel. Byla jim dána moc nad čtvrtinou země, aby zabíjeli mečem, hladem, smrtí a šelmami země"},{"c":6,"v":9,"t":"A když otevřel pátou pečeť, spatřil jsem pod oltářem duše zabitých pro Boží slovo a pro svědectví, které věrně drželi"},{"c":6,"v":10,"t":"A ti zvolali mocným hlasem: „Jak dlouho ještě, Panovníku, svatý a pravý, nebudeš soudit a trestat za naši krev ty, kdo bydlí na zemi?“"},{"c":6,"v":11,"t":"A každému z nich bylo dáno bílé roucho a bylo jim řečeno, ať odpočinou ještě krátký čas, dokud se nenaplní počet jejich spoluotroků a jejich bratrů, kteří mají být zabíjeni jako oni"},{"c":6,"v":12,"t":"A když otevřel šestou pečeť, uviděl jsem, že nastalo veliké zemětřesení, slunce zčernalo jako žíněný pytel a měsíc úplně zkrvavěl"},{"c":6,"v":13,"t":"A nebeské hvězdy spadly na zem, jako když fíkovník zmítaný vichrem shazuje své pozdní fíky;"},{"c":6,"v":14,"t":"a nebe zmizelo, jako když se svinuje svitek, a každá hora i každý ostrov se pohnuly ze svého místa"},{"c":6,"v":15,"t":"Králové země i velmoži a vojevůdci, boháči a mocní, každý otrok i svobodný, se ukryli do jeskyň a do horských skal"},{"c":6,"v":16,"t":"a říkali těm horám a skalám: „Padněte na nás a skryjte nás před tváří toho, který sedí na trůnu, a před hněvem Beránka!"},{"c":6,"v":17,"t":"Neboť přišel veliký den jejich hněvu; kdo bude moci obstát?“"},{"c":7,"v":1,"t":"Potom jsem uviděl čtyři anděly stát na čtyřech úhlech země a držet čtyři zemské větry, aby vítr nevál na zemi ani na moře ani na žádný strom"},{"c":7,"v":2,"t":"A uviděl jsem jiného anděla, jak vystupuje od východu slunce a má pečetidlo živého Boha. Mocným hlasem zvolal na ty čtyři anděly, kterým bylo dáno škodit zemi a moři:"},{"c":7,"v":3,"t":"„Neškoďte zemi, moři ani stromům, dokud neoznačíme otroky našeho Boha na jejich čelech!“"},{"c":7,"v":4,"t":"A slyšel jsem počet označených: sto čtyřicet čtyři tisíce ze všech kmenů synů Izraele"},{"c":7,"v":5,"t":"Z kmene Juda je označeno dvanáct tisíc, z kmene Rúben dvanáct tisíc, z kmene Gád dvanáct tisíc"},{"c":7,"v":6,"t":"Z kmene Ašer dvanáct tisíc, z kmene Neftalí dvanáct tisíc, z kmene Manases dvanáct tisíc"},{"c":7,"v":7,"t":"Z kmene Šimeón dvanáct tisíc, z kmene Lévi dvanáct tisíc, z kmene Isachar dvanáct tisíc"},{"c":7,"v":8,"t":"Z kmene Zabulón dvanáct tisíc, z kmene Josef dvanáct tisíc a z kmene Benjamín je označeno dvanáct tisíc"},{"c":7,"v":9,"t":"Potom jsem uviděl, a hle, veliký zástup, který nikdo nemohl spočítat, ze všech národů, kmenů, jazyků a z každého lidu, jak stojí před trůnem a před Beránkem, oblečeni v bílá roucha, palmové ratolesti v rukou,"},{"c":7,"v":10,"t":"a volají velikým hlasem: „Záchrana náleží našemu Bohu, tomu, který sedí na trůnu, a Beránkovi.“"},{"c":7,"v":11,"t":"A všichni andělé stáli kolem trůnu, kolem starších i těch čtyř živých bytostí, a padli před trůnem na tvář a poklonili se Bohu"},{"c":7,"v":12,"t":"se slovy: „Amen! Dobrořečení a sláva, moudrost i vděčnost, úcta a moc i síla náleží našemu Bohu na věky věků. Amen. “"},{"c":7,"v":13,"t":"Jeden z těch starších na mne promluvil: „Kdo jsou a odkud přišli tito, kteří jsou oblečeni v bílá roucha?“"},{"c":7,"v":14,"t":"Řekl jsem mu: „Můj pane, ty to víš.“A on mi řekl: „To jsou ti, kteří přicházejí z velikého soužení a svá roucha vyprali a vybílili v krvi Beránkově"},{"c":7,"v":15,"t":"Proto jsou před Božím trůnem a slouží mu v jeho svatyni dnem i nocí; a ten, který sedí na trůnu, nad nimi roztáhne svůj stan"},{"c":7,"v":16,"t":"Již nebudou hladovět ani žíznit, neublíží jim slunce ani jiný žár,"},{"c":7,"v":17,"t":"neboť Beránek, který je uprostřed trůnu, je bude pást a povede je k pramenům vod života. A Bůh jim setře každou slzu z očí.“"},{"c":8,"v":1,"t":"A když otevřel sedmou pečeť, nastalo v nebi ticho asi na půl hodiny"},{"c":8,"v":2,"t":"A uviděl jsem sedm andělů, kteří stáli před Bohem; a bylo jim dáno sedm polnic"},{"c":8,"v":3,"t":"A přišel jiný anděl, který měl zlatou kadidelnici, a postavil se k oltáři; bylo mu dáno množství kadidla, aby je dal s modlitbami všech svatých na zlatý oltář, který je před trůnem"},{"c":8,"v":4,"t":"A dým kadidla spolu s modlitbami svatých vystoupil z ruky anděla před Boha"},{"c":8,"v":5,"t":"Tu vzal anděl kadidelnici, naplnil ji ohněm z oltáře a hodil dolů na zem; i nastaly hromy, hlasy, blesky a zemětřesení"},{"c":8,"v":6,"t":"A těch sedm andělů, kteří měli sedm polnic, se připravilo, aby zatroubili"},{"c":8,"v":7,"t":"Zatroubil první anděl. Nastalo krupobití a oheň smíšený s krví a bylo to svrženo na zem. Třetina země shořela, třetina stromů shořela, veškerá zelená tráva shořela"},{"c":8,"v":8,"t":"Zatroubil druhý anděl. Něco jako veliká hora hořící ohněm bylo vrženo do moře. Třetina moře se obrátila v krev"},{"c":8,"v":9,"t":"a zahynula třetina živých tvorů v moři a byla zničena třetina lodí"},{"c":8,"v":10,"t":"Zatroubil třetí anděl, a z nebe spadla veliká hvězda, hořící jako pochodeň, a padla na třetinu řek a na prameny vod"},{"c":8,"v":11,"t":"Jméno té hvězdy je Pelyněk. Třetina vod se změnila v pelyněk a mnoho lidí zemřelo z těch vod, protože zhořkly"},{"c":8,"v":12,"t":"Zatroubil čtvrtý anděl, a byla zasažena třetina slunce, třetina měsíce a třetina hvězd, takže třetina z nich ztemněla a nebylo světlo po třetinu dne a stejně i noci"},{"c":8,"v":13,"t":"Tu jsem uviděl a uslyšel jednoho orla, jak letí prostředkem nebe a volá mocným hlasem: „Běda, běda, běda těm, kteří bydlí na zemi, pro zbývající hlasy polnic tří andělů, kteří ještě mají troubit.“"},{"c":9,"v":1,"t":"Zatroubil pátý anděl. A uviděl jsem hvězdu spadlou z nebe na zem a byl jí dán klíč od jícnu bezedné propasti"},{"c":9,"v":2,"t":"Otevřela jícen bezedné propasti a z toho jícnu vystoupil dým jako dým z veliké pece; dýmem z jícnu se zatmělo slunce i všechno ovzduší"},{"c":9,"v":3,"t":"Z toho dýmu vyšly na zem kobylky a byla jim dána moc, jakou mají pozemští štíři"},{"c":9,"v":4,"t":"A bylo jim řečeno, aby neškodily trávě na zemi ani žádné zeleni ani žádnému stromu, jenom lidem, kteří na čele nemají Boží pečeť"},{"c":9,"v":5,"t":"A bylo jim dáno, ne aby je zabíjely, nýbrž aby jim působily trýzeň po pět měsíců; jejich trýzeň byla jako trýzeň od štíra, když bodne člověka"},{"c":9,"v":6,"t":"V oněch dnech lidé budou hledat smrt, a nenaleznou ji, budou si přát umřít, ale smrt od nich uteče"},{"c":9,"v":7,"t":"Vzhledem se ty kobylky podobaly koním připraveným k boji; na svých hlavách měly něco jako věnce podobné zlatu, jejich tváře byly jako tváře lidí,"},{"c":9,"v":8,"t":"vlasy měly jako vlasy žen a jejich zuby byly jako zuby lvů"},{"c":9,"v":9,"t":"Měly hrudní pancíře jako ze železa a zvuk jejich křídel jako zvuk mnoha vozů s koňmi běžícími do boje"},{"c":9,"v":10,"t":"Mají ocasy jako štíři a v nich žihadla, a v jejich ocasech je jejich moc škodit lidem po pět měsíců"},{"c":9,"v":11,"t":"Nad sebou mají krále, anděla bezedné propasti, který se hebrejsky jmenuje Abaddon a řecky Apollyón"},{"c":9,"v":12,"t":"První ‚běda‘ pominulo; hle, ještě dvoje ‚běda‘ přichází potom"},{"c":9,"v":13,"t":"Zatroubil šestý anděl. Uslyšel jsem jakýsi hlas ze čtyř rohů zlatého oltáře, který je před Bohem"},{"c":9,"v":14,"t":"Ten řekl šestému andělu, který měl polnici: „Rozvaž ty čtyři anděly, kteří jsou svázáni při veliké řece Eufratu.“"},{"c":9,"v":15,"t":"Tu byli rozvázáni ti čtyři andělé, připravení k hodině, dni, měsíci a roku, aby zabili třetinu lidí"},{"c":9,"v":16,"t":"Vojska jejich jízdy měla dvě stě miliónů mužů — uslyšel jsem jejich počet"},{"c":9,"v":17,"t":"A takto jsem ve vidění spatřil koně a ty, kteří na nich seděli: hrudní pancíře měli ohnivé, hyacintové a sírově žluté; hlavy koní jako hlavy lvů, z jejich tlam vychází oheň, dým a síra"},{"c":9,"v":18,"t":"Těmito třemi ranami byla zabita třetina lidí: ohněm, dýmem a sírou, která vycházela z jejich tlam"},{"c":9,"v":19,"t":"Neboť moc koní je v jejich tlamách a v jejich ocasech; jejich ocasy jsou podobné hadům: mají hlavy a těmi škodí"},{"c":9,"v":20,"t":"Ale ostatní lidé, kteří nebyli těmito ranami zabiti, se neodvrátili od skutků svých rukou: nepřestali se klanět démonům a modlám ze zlata, stříbra, mědi, kamene i dřeva, které nemohou ani vidět ani slyšet ani chodit;"},{"c":9,"v":21,"t":"neodvrátili se od svých vražd ani od svých čárů, od svého smilstva ani od svých krádeží. Hlavní blok textu"},{"c":10,"v":1,"t":"Tu jsem uviděl sestupovat z nebe jiného silného anděla oděného do oblaku a nad jeho hlavou byla duha; jeho tvář byla jako slunce a jeho nohy jako ohnivé sloupy"},{"c":10,"v":2,"t":"a v ruce měl rozvinutý malý svitek. Pravou nohou se postavil na moře, levou na zem"},{"c":10,"v":3,"t":"a vykřikl mohutným hlasem, jako když řve lev. A když vykřikl, promluvilo svými hlasy sedm hromů"},{"c":10,"v":4,"t":"Jakmile promluvilo těch sedm hromů, chtěl jsem psát, ale uslyšel jsem hlas z nebe, který říkal: „Zapečeť, co promluvilo těch sedm hromů, a nepiš to.“"},{"c":10,"v":5,"t":"A anděl, kterého jsem viděl stát na moři i na zemi, zdvihl svou pravou ruku k nebi"},{"c":10,"v":6,"t":"a přísahal při tom, který je živ na věky věků, který stvořil nebe i to, co je v něm, zemi i to, co je v ní, a moře i to, co je v něm, že čas již více nebude,"},{"c":10,"v":7,"t":"nýbrž ve dnech hlasu sedmého anděla, až bude troubit, bude dokonáno tajemství Boží, jak to ohlásil svým otrokům prorokům"},{"c":10,"v":8,"t":"Hlas, který jsem uslyšel z nebe, se mnou opět mluvil a říkal: „Jdi, vezmi ten rozvinutý svitek, který je v ruce anděla stojícího na moři a na zemi.“"},{"c":10,"v":9,"t":"I odešel jsem k tomu andělovi a řekl jsem mu, aby mi dal ten malý svitek. Řekl mi: „Vezmi jej a sněz; naplní tvé břicho hořkostí, ale v tvých ústech bude sladký jako med.“"},{"c":10,"v":10,"t":"Vzal jsem ten malý svitek z ruky anděla a snědl jsem jej; v mých ústech byl sladký jako med, ale když jsem ho snědl, naplnil mé břicho hořkostí"},{"c":10,"v":11,"t":"A řekli mi: „Musíš znovu přinést proroctví mnohým lidem, národům, jazykům i králům.“"},{"c":11,"v":1,"t":"Byla mi dána třtina podobná holi se slovy: „Vstaň a změř Boží svatyni i oltář a ty, kteří se v ní klanějí"},{"c":11,"v":2,"t":"Ale vnější nádvoří svatyně vynech a neměř je, protože bylo dáno pohanům, kteří budou šlapat po svatém městě dvaačtyřicet měsíců"},{"c":11,"v":3,"t":"A dám pravomoc svým dvěma svědkům, a budou prorokovat tisíc dvě stě šedesát dní, oblečeni v žíněný šat.“"},{"c":11,"v":4,"t":"To jsou ty dvě olivy a ty dva svícny, které stojí před Pánem země"},{"c":11,"v":5,"t":"Bude-li jim chtít někdo ublížit, z jejich úst vyjde oheň a sežehne jejich nepřátele; kdo by jim chtěl ublížit, musí být takto usmrcen"},{"c":11,"v":6,"t":"Tito svědkové mají pravomoc zavřít nebe, aby ve dnech jejich prorocké služby nepršelo, a mají pravomoc nad vodami, aby je obraceli v krev, a aby zasáhli zemi jakoukoli ranou, kdykoli budou chtít"},{"c":11,"v":7,"t":"A když dokončí své svědectví, bude s nimi bojovat šelma, která vystupuje z bezedné propasti, přemůže je a zabije"},{"c":11,"v":8,"t":"A jejich mrtvá těla budou ležet na náměstí toho velikého města, které se duchovně nazývá Sodoma a Egypt, kde byl také ukřižován jejich Pán"},{"c":11,"v":9,"t":"Mnozí z lidí, kmenů, jazyků a národů budou hledět na jejich mrtvá těla po tři a půl dne a nedovolí je uložit do hrobu"},{"c":11,"v":10,"t":"Obyvatelé země se nad nimi budou radovat, budou jásat a navzájem si posílat dary, protože tito dva proroci trýznili obyvatele země"},{"c":11,"v":11,"t":"Ale po třech a půl dnech do nich vstoupil duch života z Boha, postavili se na nohy a na ty, kteří na ně hleděli, padl veliký strach"},{"c":11,"v":12,"t":"Tu uslyšeli mocný hlas z nebe, který jim řekl: „Vystupte sem!“A vystoupili v oblaku do nebe a jejich nepřátelé je pozorovali"},{"c":11,"v":13,"t":"V tu hodinu nastalo veliké zemětřesení, desetina toho města se zřítila a v zemětřesení bylo zabito sedm tisíc lidí. Ostatní se vyděsili a vzdali slávu nebeskému Bohu"},{"c":11,"v":14,"t":"Druhé ‚běda‘ pominulo; hle, třetí ‚běda‘ rychle přichází"},{"c":11,"v":15,"t":"Zatroubil sedmý anděl. A v nebi se ozvaly mocné hlasy, které říkaly: „Království světa se stalo královstvím našeho Pána a jeho Krista, a bude kralovat na věky věků.“"},{"c":11,"v":16,"t":"Čtyřiadvacet starších, sedících na svých trůnech před Bohem, padlo na tváře a poklonilo se Bohu"},{"c":11,"v":17,"t":"se slovy: „Děkujeme tobě, Pane Bože, Všemohoucí, který jsi a kterýs byl, že ses chopil své veliké moci a ujal ses kralování"},{"c":11,"v":18,"t":"Rozhněvaly se národy, ale přišel tvůj hněv, čas, aby byli souzeni mrtví a aby byla dána mzda tvým otrokům prorokům a svatým a bojícím se tvého jména, malým i velkým, a aby byli zničeni ti, kteří ničí zemi.“"},{"c":11,"v":19,"t":"Tu byla otevřena Boží svatyně, která je v nebi, a byla vidět schrána jeho smlouvy v jeho svatyni; nastaly blesky, hlasy a hromy, zemětřesení a veliké krupobití. Hlavní blok textu"},{"c":12,"v":1,"t":"A ukázalo se veliké znamení v nebi: žena oděná sluncem, pod jejíma nohama měsíc a na její hlavě koruna z dvanácti hvězd"},{"c":12,"v":2,"t":"Byla těhotná a křičela, když v bolestech a mukách pracovala ku porodu"},{"c":12,"v":3,"t":"A ukázalo se jiné znamení v nebi: hle, veliký rudý drak, mající sedm hlav a deset rohů, a na těch hlavách sedm diadémů"},{"c":12,"v":4,"t":"Jeho ocas vlekl třetinu nebeských hvězd; i svrhl je na zem. A drak stál před ženou, která měla porodit, aby její dítě sežral, jakmile porodí"},{"c":12,"v":5,"t":"A porodila syna — muže, který má pást všechny národy železnou berlou. Vtom bylo její dítě vytrženo k Bohu a k jeho trůnu"},{"c":12,"v":6,"t":"A žena utekla do pustiny, kde měla od Boha připravené místo, aby ji tam živili tisíc dvě stě šedesát dní"},{"c":12,"v":7,"t":"A v nebi nastala válka: Michael a jeho andělé museli bojovat s drakem. Drak i jeho andělé bojovali,"},{"c":12,"v":8,"t":"ale neobstáli, a už pro ně nebylo místo v nebi"},{"c":12,"v":9,"t":"A byl svržen veliký drak, ten dávný had, nazývaný Ďábel a Satan, který svádí celý obydlený svět. Byl svržen na zem a jeho andělé byli svrženi s ním"},{"c":12,"v":10,"t":"A uslyšel jsem mocný hlas v nebi, který říkal: „Nyní přišla záchrana, moc a kralování našeho Boha a pravomoc jeho Krista, neboť byl svržen žalobce našich bratří, který je obviňoval před naším Bohem dnem i nocí"},{"c":12,"v":11,"t":"Oni nad ním zvítězili pro krev Beránkovu a pro slovo svého svědectví; a nemilovali svou duši až na smrt"},{"c":12,"v":12,"t":"Proto se radujte, nebesa a vy, kdo v nich přebýváte. Běda zemi a moři, neboť k vám sestoupil Ďábel s velikou zuřivostí; ví, že má málo času.“"},{"c":12,"v":13,"t":"Když drak uviděl, že byl svržen na zem, začal pronásledovat ženu, která porodila toho syna"},{"c":12,"v":14,"t":"Ale té ženě byla dána dvě křídla velikého orla, aby mohla letět do pustiny na své místo, kde skryta před hadem bude živena čas a časy a půl času"},{"c":12,"v":15,"t":"A had vychrlil z tlamy za ženou vodu jako řeku, aby ji strhl proudem"},{"c":12,"v":16,"t":"Ale země přispěla ženě na pomoc: země otevřela svá ústa a pohltila řeku, kterou vychrlil drak ze své tlamy"},{"c":12,"v":17,"t":"Drak se na tu ženu rozzuřil a odešel, aby rozpoutal válku proti ostatním z jejího potomstva, kteří zachovávají Boží přikázání a mají Ježíšovo svědectví"},{"c":12,"v":18,"t":"I postavil se na písku u moře"},{"c":13,"v":1,"t":"Tu jsem uviděl, jak z moře vystupuje šelma, která měla deset rohů a sedm hlav; na svých rozích měla deset diadémů a na svých hlavách jména urážející Boha"},{"c":13,"v":2,"t":"Ta šelma, kterou jsem uviděl, byla podobná levhartovi, její nohy jako tlapy medvěda a její tlama jako tlama lví. A drak jí dal svou sílu, svůj trůn a velikou pravomoc"},{"c":13,"v":3,"t":"A jednu z jejích hlav jsem viděl jakoby raněnou k smrti, ale její smrtelná rána byla vyléčena. Celá země nad tou šelmou užasla;"},{"c":13,"v":4,"t":"poklonili se drakovi, že dal té šelmě svou pravomoc, a poklonili se také šelmě se slovy: „Kdo je podobný té šelmě a kdo s ní může bojovat? “"},{"c":13,"v":5,"t":"Byla jí dána ústa mluvící veliké věci a rouhání a byla jí dána moc, aby činila, co chce po čtyřicet dva měsíce"},{"c":13,"v":6,"t":"I otevřela svá ústa k rouhání se Bohu a rouhala se jeho jménu a jeho stánku, to jest těm, kteří přebývají v nebi"},{"c":13,"v":7,"t":"A bylo jí dáno, aby rozpoutala válku proti svatým a aby je přemohla, a byla jí dána moc nad každým kmenem, lidem, jazykem i národem;"},{"c":13,"v":8,"t":"budou se jí klanět všichni obyvatelé země, jejichž jména nejsou od založení světa zapsána v knize života toho zabitého Beránka"},{"c":13,"v":9,"t":"Má-li kdo uši, slyš."},{"c":13,"v":10,"t":"Kdo má jít do zajetí, půjde do zajetí; kdo má být zabit mečem, musí být mečem zabit. Zde jest vytrvalost a víra svatých"},{"c":13,"v":11,"t":"A uviděl jsem jinou šelmu vystupovat ze země; měla dva rohy jako beránek, ale mluvila jako drak"},{"c":13,"v":12,"t":"Vykonává všechnu pravomoc té první šelmy v její přítomnosti. Nutí zemi a její obyvatele, aby se klaněli té první šelmě, jejíž smrtelná rána byla vyléčena"},{"c":13,"v":13,"t":"Činí veliká znamení, takže nechá i oheň z nebe před zraky lidí sestupovat na zem,"},{"c":13,"v":14,"t":"a svádí obyvatele země znameními, která jí bylo dáno učinit před očima šelmy. Říká obyvatelům země, aby učinili obraz šelmě, která měla ránu od meče a ožila"},{"c":13,"v":15,"t":"A bylo jí dáno, aby vložila ducha do obrazu té šelmy, takže obraz šelmy promluvil a způsobil, aby byli zabiti všichni, kteří se nepokloní obrazu šelmy"},{"c":13,"v":16,"t":"A působí, aby všem, malým i velkým, bohatým i chudým, svobodným i otrokům, byl dán cejch na pravou ruku nebo na čelo"},{"c":13,"v":17,"t":"a aby nikdo nemohl kupovat ani prodávat, leda ten, kdo má cejch: jméno šelmy nebo číslo jejího jména"},{"c":13,"v":18,"t":"Zde je moudrost. Kdo má rozum, ať spočte číslo té šelmy. Je to číslo člověka, a jeho číslo je šest set šedesát šest. Hlavní blok textu"},{"c":14,"v":1,"t":"A uviděl jsem, hle, Beránek stál na hoře Sión a s ním sto čtyřicet čtyři tisíce těch, kdo mají na svých čelech napsáno jméno jeho i jméno jeho Otce"},{"c":14,"v":2,"t":"A uslyšel jsem hlas z nebe jako zvuk mnohých vod a jako zvuk velikého hromu. A hlas, který jsem uslyšel, byl jako hlas harfeníků, hrajících na své harfy"},{"c":14,"v":3,"t":"Zpívali novou píseň před trůnem, před těmi čtyřmi živými bytostmi a před staršími. Nikdo se nemohl naučit té písni než těch sto čtyřicet čtyři tisíce vykoupených ze země"},{"c":14,"v":4,"t":"To jsou ti, kteří se neposkvrnili se ženami, jsou to panici. To jsou ti, kteří následují Beránka, kamkoli jde. Ti byli vykoupeni z lidí jako prvotiny Bohu a Beránkovi"},{"c":14,"v":5,"t":"V jejich ústech nebyla nalezena lež; jsou bez úhony"},{"c":14,"v":6,"t":"Tu jsem uviděl jiného anděla, majícího věčné evangelium, jak letí prostředkem nebe, aby je zvěstoval těm, kteří přebývají na zemi, každému národu, kmenu, jazyku a lidu"},{"c":14,"v":7,"t":"Volal mocným hlasem: „Bojte se Boha a vzdejte mu slávu, neboť přišla hodina jeho soudu; pokloňte se tomu, který učinil nebe, zemi, moře i prameny vod.“"},{"c":14,"v":8,"t":"A jiný, druhý anděl ho následoval a volal: „Padl, padl veliký Babylon, který napájel všechny národy vášnivým vínem svého smilstva.“"},{"c":14,"v":9,"t":"A jiný, třetí anděl je následoval a volal mocným hlasem: „Kdo se klaní šelmě a jejímu obrazu a přijímá cejch na čelo či na ruku,"},{"c":14,"v":10,"t":"bude také pít z vína Božího rozhorlení, které je nalito neředěné v číši jeho hněvu; a bude mučen v ohni a síře před svatými anděly a před Beránkem"},{"c":14,"v":11,"t":"Dým jejich muk vystupuje na věky věků a dnem i nocí nemají odpočinutí ti, kdo se klanějí šelmě a jejímu obrazu, a ti, kdo přijímají cejch jejího jména.“"},{"c":14,"v":12,"t":"Zde je vytrvalost svatých, kteří zachovávají Boží přikázání a Ježíšovu víru"},{"c":14,"v":13,"t":"Tu jsem uslyšel hlas z nebe, který říkal: „Napiš: Blahoslavení mrtví, kteří od této chvíle umírají v Pánu!“„Ano,“praví Duch, „ať odpočinou od svých prací, neboť jejich skutky jdou s nimi.“"},{"c":14,"v":14,"t":"A uviděl jsem, hle, bílý oblak a na oblaku sedí někdo podobný Synu člověka, na hlavě má zlatou korunu a v ruce ostrý srp"},{"c":14,"v":15,"t":"A další anděl vyšel ze svatyně a volal mocným hlasem na toho, který seděl na oblaku: „Pošli svůj srp a začni žeň, protože přišla hodina žně a dozrála úroda země.“"},{"c":14,"v":16,"t":"A ten, který seděl na oblaku, hodil svůj srp na zem a země byla požata"},{"c":14,"v":17,"t":"A další anděl vyšel ze svatyně, která je v nebi, a také on měl ostrý srp"},{"c":14,"v":18,"t":"A jiný anděl vyšel z oltáře a ten měl moc nad ohněm. Mocným hlasem zvolal na toho, který měl ostrý srp: „Pošli svůj ostrý srp a skliď hrozny z vinné révy země, neboť její plody dozrály.“"},{"c":14,"v":19,"t":"Tu hodil ten anděl svůj srp na zem a sklidil vinnou révu země a hrozny uvrhl do velikého lisu Božího hněvu"},{"c":14,"v":20,"t":"A ten lis byl stlačen venku za městem a vytekla z něj krev až po uzdy koní na vzdálenost tisíce šesti set stadií"},{"c":15,"v":1,"t":"Tu jsem uviděl v nebi jiné veliké a podivuhodné znamení: sedm andělů, kteří měli sedm posledních ran, protože jimi je dovršen Boží hněv"},{"c":15,"v":2,"t":"Uviděl jsem něco jako skelné moře smíšené s ohněm a ty, kteří vycházeli vítězní z moci té šelmy, z moci jejího obrazu i z moci čísla jejího jména; stáli na skelném moři, měli Boží harfy"},{"c":15,"v":3,"t":"a zpívali píseň Božího otroka Mojžíše a píseň Beránkovu: „Veliké a podivuhodné jsou tvé skutky, Pane Bože Všemohoucí, spravedlivé a pravdivé jsou tvé cesty, Králi národů"},{"c":15,"v":4,"t":"Kdo by se nebál tebe, Pane, a neoslavoval tvé jméno? Neboť ty jediný jsi svatý; všechny národy přijdou a pokloní se před tebou, protože tvé spravedlivé soudy vyšly najevo.“"},{"c":15,"v":5,"t":"Potom jsem uviděl: V nebi byla otevřena svatyně stánku svědectví"},{"c":15,"v":6,"t":"a ze svatyně vyšlo sedm andělů, kteří měli těch sedm ran; byli oděni lněným rouchem, čistým a zářivým, a kolem prsou měli zlaté pásy"},{"c":15,"v":7,"t":"A jedna z těch čtyř živých bytostí dala sedmi andělům sedm zlatých misek plných hněvu Boha, toho živého na věky věků"},{"c":15,"v":8,"t":"A svatyně byla naplněna dýmem z Boží slávy a z jeho moci; nikdo nemohl vstoupit do svatyně, dokud se nedokoná sedm ran těch sedmi andělů"},{"c":16,"v":1,"t":"Tu jsem uslyšel mocný hlas ze svatyně, který těm sedmi andělům říkal: „Jděte a vylejte těch sedm misek Božího hněvu na zem.“"},{"c":16,"v":2,"t":"První z nich odešel a vylil svou misku na zem, a na lidi, kteří měli cejch šelmy a kteří se klaněli jejímu obrazu, přišly zlé a zhoubné vředy"},{"c":16,"v":3,"t":"Druhý anděl vylil svou misku do moře, a změnilo se v krev jako krev mrtvého a všechna živá duše, která byla v moři, zemřela"},{"c":16,"v":4,"t":"Třetí vylil svou misku do řek a pramenů vod, a objevila se v nich krev"},{"c":16,"v":5,"t":"Uslyšel jsem, jak anděl vod říká: „Spravedlivý jsi, který jsi a kterýs byl, ty Svatý, že jsi vynesl tento soud;"},{"c":16,"v":6,"t":"neboť prolili krev svatých a proroků, a dal jsi jim pít krev. Zaslouží si to!“"},{"c":16,"v":7,"t":"A uslyšel jsem, jak oltář říká: „Ano, Pane Bože Všemohoucí, pravé a spravedlivé jsou tvé soudy.“"},{"c":16,"v":8,"t":"A čtvrtý anděl vylil svou misku na slunce, a bylo mu dáno, aby ožehlo lidi ohněm"},{"c":16,"v":9,"t":"Lidé byli ožehnuti velikým žárem a proklínali jméno Boha, který měl moc nad těmito ranami, ale neobrátili se, aby mu vzdali slávu"},{"c":16,"v":10,"t":"Pátý anděl vylil svou misku na trůn šelmy, a její království se zatmělo; lidé se bolestí kousali do jazyka"},{"c":16,"v":11,"t":"a proklínali nebeského Boha pro své bolesti a pro své vředy, ale neodvrátili se od svých skutků"},{"c":16,"v":12,"t":"Šestý anděl vylil svou misku na velikou řeku Eufrat, a její voda vyschla, aby byla připravena cesta králům od východu slunce"},{"c":16,"v":13,"t":"A uviděl jsem z úst draka a z úst šelmy a z úst falešného proroka vycházet tři nečisté duchy jako žáby"},{"c":16,"v":14,"t":"Jsou to duchové démonů, činící znamení; vycházejí ke králům celé obydlené země, aby je shromáždili k boji ve veliký den Boha, Všemohoucího"},{"c":16,"v":15,"t":"‚Hle, přicházím jako zloděj; blahoslavený, kdo bdí a střeží své šaty, aby nechodil nahý a neviděli jeho nahotu. ‘"},{"c":16,"v":16,"t":"I shromáždil je na místo, zvané hebrejsky Harmagedon"},{"c":16,"v":17,"t":"Sedmý anděl vylil svou misku na ovzduší, a ze svatyně od trůnu vyšel mocný hlas, který řekl: „ Stalo se!“"},{"c":16,"v":18,"t":"A nastaly blesky, hlasy a hromy, a nastalo veliké zemětřesení, jaké nebylo, co je člověk na zemi; tak veliké a silné bylo to zemětřesení"},{"c":16,"v":19,"t":"A to veliké město se roztrhlo na tři díly a města národů se zřítila. A veliký Babylon byl připomenut před Bohem, a Bůh mu dal číši vína svého planoucího hněvu"},{"c":16,"v":20,"t":"Všechny ostrovy zmizely a hory nebyly k nalezení"},{"c":16,"v":21,"t":"Veliké kroupy jako závaží padaly z nebe na lidi; a lidé prokleli Boha pro tu ránu krupobití, protože ta rána byla velmi veliká. Hlavní blok textu"},{"c":17,"v":1,"t":"Tu přišel jeden ze sedmi andělů, kteří měli těch sedm misek, a promluvil se mnou: „Pojď, ukážu ti soud nad tou velikou smilnicí, která sedí na mnohých vodách,"},{"c":17,"v":2,"t":"se kterou smilnili králové země a vínem jejího smilstva se opili obyvatelé země.“"},{"c":17,"v":3,"t":"A odnesl mne v Duchu do pustiny. Tu jsem uviděl ženu, sedící na šelmě šarlatové barvy, plné rouhavých jmen, mající sedm hlav a deset rohů"},{"c":17,"v":4,"t":"Ta žena byla oděna purpurem a šarlatem a ozdobena zlatem, drahými kameny a perlami; ve své ruce měla zlatou číši plnou ohavností a nečistot svého smilstva"},{"c":17,"v":5,"t":"a na svém čele měla napsané jméno: ‚Tajemství, Babylon, ten veliký, matka smilnic a ohavností země.‘"},{"c":17,"v":6,"t":"Uviděl jsem tu ženu zpitou krví svatých a krví Ježíšových svědků. Velice jsem užasl, když jsem ji uviděl"},{"c":17,"v":7,"t":"Anděl mi řekl: „Proč jsi užasl? Já ti řeknu tajemství té ženy a šelmy, která ji nese a má sedm hlav a deset rohů"},{"c":17,"v":8,"t":"Šelma, kterou jsi viděl, byla a není; má vystoupit z bezedné propasti a jít do záhuby; a ti, kdo bydlí na zemi a jejich jméno není zapsáno od založení světa v knize života, užasnou, až uvidí, že ta šelma byla a není, a opět přijde"},{"c":17,"v":9,"t":"Zde je třeba mysli, která má moudrost: Těch sedm hlav je sedm hor, na nichž ta žena sedí. A je sedm králů:"},{"c":17,"v":10,"t":"pět jich padlo, jeden je, další ještě nepřišel; a až přijde, musí zůstat jen nakrátko"},{"c":17,"v":11,"t":"A šelma, která byla a není, je tím osmým; je z těch sedmi a jde do záhuby"},{"c":17,"v":12,"t":"Těch deset rohů, které jsi viděl, je deset králů, kteří královskou moc ještě nepřijali, ale pravomoc jako králové mají přijmout na jednu hodinu spolu s šelmou"},{"c":17,"v":13,"t":"Ti budou mít stejný úmysl a svou sílu a moc dají šelmě"},{"c":17,"v":14,"t":"Ti budou válčit s Beránkem, ale Beránek je přemůže, protože je Pán pánů a Král králů, a ti, kteří jsou s ním, jsou povolaní, vyvolení a věrní.“"},{"c":17,"v":15,"t":"Ještě mi řekl: „Vody, které jsi viděl, kde ta smilnice sedí, jsou lidé a zástupy, národy a jazyky"},{"c":17,"v":16,"t":"Těch deset rohů, které jsi viděl, i ta šelma budou nenávidět smilnici a učiní ji zpustlou a nahou, budou jíst její maso a spálí ji v ohni"},{"c":17,"v":17,"t":"Neboť Bůh dal do jejich srdcí, aby uskutečnili jeho úmysl, jednali jednomyslně a dali šelmě svou královskou moc, dokud nebudou dokonána Boží slova"},{"c":17,"v":18,"t":"A ta žena, kterou jsi viděl, je veliké město, které má královskou moc nad králi země.“"},{"c":18,"v":1,"t":"Potom jsem uviděl jiného anděla sestupovat z nebe: měl velikou pravomoc a země byla ozářena jeho slávou"},{"c":18,"v":2,"t":"Zvolal mocným hlasem: „Padl, padl veliký Babylon a stal se příbytkem démonů, vězením všech nečistých duchů a vězením každého nečistého a nenáviděného ptáka;"},{"c":18,"v":3,"t":"neboť z vášnivého vína jejího smilstva pily všechny národy, i králové země s ní smilnili a obchodníci země zbohatli z moci jejího zhýralého přepychu.“"},{"c":18,"v":4,"t":"Tu jsem uslyšel jiný hlas z nebe, který říkal: „Vyjděte z ní, můj lide, abyste neměli účast na jejích hříších a nedostali z jejích ran"},{"c":18,"v":5,"t":"Neboť její hříchy dosáhly až k nebi a Bůh se rozpomenul na bezpráví, které činila"},{"c":18,"v":6,"t":"Odplaťte jí, jako i ona odplatila vám; a odplaťte jí dvojnásobně podle jejích skutků! Do číše, kterou namíchala, namíchejte jí dvojnásob;"},{"c":18,"v":7,"t":"nakolik oslavila sebe a užila hýření, tolik jí dejte trýzně a žalu. Neboť si ve svém srdci říká: ‚Jsem královna, nejsem vdova a jistě mne nepotká žal.‘"},{"c":18,"v":8,"t":"Proto v jednom dni přijdou její rány: smrt, žal a hlad, a bude spálena ohněm. Protože silný je Pán Bůh, který ji soudí.“"},{"c":18,"v":9,"t":"I budou nad ní plakat a bít se v prsa králové země, kteří s ní smilnili a hýřili, až uvidí dým z jejího požáru"},{"c":18,"v":10,"t":"Z hrůzy nad její trýzní budou stát zdaleka a budou říkat: „Běda, běda, ty veliké město Babylone, ty mocné město, neboť v jedné hodině přišel tvůj soud.“"},{"c":18,"v":11,"t":"A obchodníci země nad ní pláčou a truchlí, protože už nikdo nekoupí jejich zboží:"},{"c":18,"v":12,"t":"náklady zlata a stříbra, drahokamů a perel, kmentu, purpuru, hedvábí a šarlatu, všechny druhy vonného dřeva a veškeré předměty ze slonoviny a všeliké předměty ze vzácného dřeva, mědi, železa a mramoru,"},{"c":18,"v":13,"t":"skořici, indické koření, voňavky, mast a kadidlo, víno a olej, mouku a obilí, dobytčata a ovce, koně a vozy, otroky i lidské duše"},{"c":18,"v":14,"t":"„Ovoce, po kterém toužila tvá duše, od tebe odešlo, všechen lesk a nádhera se ti ztratily a lidé je již nikdy více nenaleznou.“"},{"c":18,"v":15,"t":"Obchodníci s těmito věcmi, kteří jejím prostřednictvím zbohatli, se ze strachu před její trýzní postaví zdaleka, budou plakat a truchlit"},{"c":18,"v":16,"t":"a říkat: „Běda, běda, město veliké, kterés bylo oblečeno do kmentu, purpuru a šarlatu, ozdobeno zlatem, drahokamy a perlami,"},{"c":18,"v":17,"t":"neboť v jedinou hodinu bylo zpustošeno tak veliké bohatství.“Každý kormidelník, každý, kdo se plaví při pobřeží, námořníci a všichni, kdo pracují na moři, se postavili zdaleka"},{"c":18,"v":18,"t":"a křičeli, když viděli dým jejího požáru: „Které město je podobno tomu velikému městu?“"},{"c":18,"v":19,"t":"A nasypali si prach na hlavu a v pláči a truchlení volali: „Běda, běda, to město veliké, v němž všichni, kdo měli lodě na moři, zbohatli z jeho bohatství, a v jedinou hodinu bylo zpustošeno!“"},{"c":18,"v":20,"t":"Raduj se nad ní nebe a svatí, apoštolové i proroci, protože Bůh nad ní vynesl soud za to, jak jednala s vámi"},{"c":18,"v":21,"t":"Tu jeden silný anděl zvedl kámen, podobný velkému mlýnskému kameni, hodil jej do moře a řekl: „Takto s prudkostí bude zavržen Babylon, to veliké město, a nikdy více nebude nalezen."},{"c":18,"v":22,"t":"Nikdy se již v tobě neozve hlas harfeníků, zpěváků, pištců a trubačů, nikdy už v tobě nebude žádný mistr jakéhokoliv řemesla, nikdo již v tobě neuslyší zvuk mlýnského kamene,"},{"c":18,"v":23,"t":"nikdy už v tobě nezasvitne světlo lampy, nikdo už v tobě nezaslechne hlas ženicha a nevěsty. Neboť tvoji obchodníci byli velmožové země a tvými kouzly byly svedeny všechny národy"},{"c":18,"v":24,"t":"V něm byla nalezena krev proroků a svatých a všech zabitých na zemi.“"},{"c":19,"v":1,"t":"Potom jsem uslyšel něco jako mocný hlas velikého zástupu v nebi, který říkal: „Haleluja! Záchrana, sláva i moc náleží našemu Bohu,"},{"c":19,"v":2,"t":"protože pravé a spravedlivé jsou jeho soudy, neboť odsoudil tu velikou smilnici, která zničila zemi svým smilstvem, a potrestal krev svých otroků, která je na jejích rukou. “"},{"c":19,"v":3,"t":"A řekli podruhé: „Haleluja! Její dým vystupuje na věky věků. “"},{"c":19,"v":4,"t":"A těch čtyřiadvacet starších a ty čtyři živé bytosti padli na kolena a poklonili se Bohu sedícímu na trůnu se slovy: „Amen. Haleluja.“"},{"c":19,"v":5,"t":"A od trůnu vyšel hlas, který říkal: „Chvalte našeho Boha všichni jeho otroci a vy, kdo se ho bojíte, malí i velcí.“"},{"c":19,"v":6,"t":"A uslyšel jsem jakoby hlas velikého zástupu a jakoby zvuk mnohých vod a jakoby zvuk silných hromů: „Haleluja, ujal se kralování Pán, náš Bůh, ten Všemohoucí"},{"c":19,"v":7,"t":"Radujme se a jásejme a vzdávejme mu slávu, protože přišla svatba Beránkova a jeho žena se připravila;"},{"c":19,"v":8,"t":"a bylo jí dáno, aby si oblékla zářivě čistý kment.“Tím kmentem jsou spravedlivé činy svatých"},{"c":19,"v":9,"t":"A řekl mi: „Napiš: Blahoslavení, kdo jsou pozváni k Beránkově svatební hostině.“Ještě mi řekl: „Toto jsou pravá Boží slova.“"},{"c":19,"v":10,"t":"Padl jsem mu k nohám, abych se mu poklonil. Ale on mi řekl: „Varuj se toho! Jsem spoluotrok tvůj a tvých bratrů, kteří mají Ježíšovo svědectví. Bohu se pokloň! Ježíšovo svědectví je Duch proroctví.“"},{"c":19,"v":11,"t":"A uviděl jsem otevřené nebe, a hle, bílý kůň, a ten, kdo na něm seděl, se jmenoval Věrný a Pravý; spravedlivě soudí a bojuje"},{"c":19,"v":12,"t":"Jeho oči byly jako plamen ohně a na hlavě měl mnoho diadémů; má napsané jméno, které nezná nikdo než on sám"},{"c":19,"v":13,"t":"Je oblečen do pláště zbroceného krví a jeho jméno je Slovo Boží"},{"c":19,"v":14,"t":"A vojska, která jsou v nebi, jela za ním na bílých koních, oblečená do bělostného čistého kmentu"},{"c":19,"v":15,"t":"Z jeho úst vychází veliký ostrý meč, aby jím bil národy; bude je pást železnou berlou. On bude šlapat lis vína planoucího hněvu Všemohoucího Boha"},{"c":19,"v":16,"t":"Na plášti a na svém boku má napsáno jméno: Král králů a Pán pánů"},{"c":19,"v":17,"t":"A uviděl jsem jednoho anděla, jak stojí ve slunci. Mocným hlasem zvolal na všechny ptáky, letící prostředkem nebe: „Pojďte, shromážděte se k veliké Boží hostině,"},{"c":19,"v":18,"t":"abyste jedli těla králů a těla vojevůdců a těla silných, těla koní i těch, kdo na nich sedí, těla všech, svobodných i otroků, malých i velikých.“"},{"c":19,"v":19,"t":"A uviděl jsem šelmu a krále země i jejich vojska shromážděná, aby rozpoutali válku proti tomu, jenž seděl na koni, a proti jeho vojsku"},{"c":19,"v":20,"t":"Ale šelma byla zajata a s ní falešný prorok, který před ní činil znamení, jimiž svedl ty, kdo přijali cejch šelmy a kdo se klaněli jejímu obrazu; ti dva byli za živa uvrženi do ohnivého jezera, hořícího sírou"},{"c":19,"v":21,"t":"Ostatní byli zabiti velikým mečem, který vyšel z úst toho, jenž seděl na koni. A všichni ptáci se nasytili jejich těly."},{"c":20,"v":1,"t":"Uviděl jsem, jak z nebe sestupuje anděl, který měl klíč od bezedné propasti a ve své ruce veliký řetěz"},{"c":20,"v":2,"t":"Zmocnil se draka, toho dávného hada, jenž jest Ďábel a Satan, na tisíc let jej spoutal"},{"c":20,"v":3,"t":"a uvrhl do bezedné propasti. A zamkl a zapečetil ji nad ním, aby již nesváděl národy, dokud se nedovrší těch tisíc let. Potom musí být ještě na krátký čas rozvázán"},{"c":20,"v":4,"t":"A spatřil jsem trůny a ty, kteří se na ně posadili, a byl jim svěřen soud; uviděl jsem také duše těch, kteří byli sťati pro Ježíšovo svědectví a pro Boží slovo, i ty, kteří se nepoklonili šelmě ani jejímu obrazu a nepřijali její cejch na čelo ani na ruku. I ožili a kralovali s Kristem tisíc let"},{"c":20,"v":5,"t":"Ostatní mrtví neožili, dokud se těch tisíc let nedovršilo. To je první vzkříšení"},{"c":20,"v":6,"t":"Blahoslavený a svatý, kdo má podíl na prvním vzkříšení; nad těmi druhá smrt nemá pravomoc, nýbrž budou kněžími Božími a Kristovými a budou s ním kralovat tisíc let"},{"c":20,"v":7,"t":"Až se těch tisíc let dovrší, bude Satan propuštěn ze svého vězení"},{"c":20,"v":8,"t":"a vyjde, aby svedl národy, které jsou ve všech čtyřech úhlech země, Góga i Magóga, a shromáždil je k boji; a bude jich jako písku v moři"},{"c":20,"v":9,"t":"Vystoupili na šíři země a obklíčili ležení svatých a milované město. Ale sestoupil oheň z nebe a pohltil je"},{"c":20,"v":10,"t":"A Ďábel, který je sváděl, byl uvržen do jezera ohně a síry, kde je šelma a falešný prorok. A budou trýzněni dnem i nocí na věky věků"},{"c":20,"v":11,"t":"A uviděl jsem veliký bílý trůn a toho, kdo na něm seděl; před jeho tváří zmizela země i nebe a jejich místo již více nebylo"},{"c":20,"v":12,"t":"A uviděl jsem mrtvé, velké i malé, jak stojí před trůnem, a byly otevřeny knihy. Byla otevřena i jiná kniha, to jest kniha života. A mrtví byli souzeni podle svých skutků, zapsaných v těch knihách"},{"c":20,"v":13,"t":"A moře vydalo mrtvé, kteří v něm byli, i Smrt a Hádes vydali mrtvé, kteří v nich byli, a každý byl souzen podle svých skutků"},{"c":20,"v":14,"t":"A Smrt a Hádes byli uvrženi do ohnivého jezera. To je ta druhá smrt: ohnivé jezero"},{"c":20,"v":15,"t":"A kdo nebyl nalezen zapsán v knize života, byl uvržen do ohnivého jezera"},{"c":21,"v":1,"t":"A spatřil jsem nové nebe a novou zemi, neboť první nebe a první země pominuly, a moře již není"},{"c":21,"v":2,"t":"A to svaté město, nový Jeruzalém, jsem uviděl sestupovat z nebe od Boha, připravené jako nevěsta ozdobená pro svého muže"},{"c":21,"v":3,"t":"A uslyšel jsem mocný hlas z trůnu, který řekl: „Hle, Boží stánek s lidmi; bude přebývat s nimi a oni budou jeho lid, a sám Bůh bude s nimi a bude jejich Bohem"},{"c":21,"v":4,"t":"A Bůh setře každou slzu z jejich očí. A smrti již nebude, ani žalu ani křiku ani bolesti již nebude, neboť první věci pominuly.“"},{"c":21,"v":5,"t":"Ten, který seděl na trůnu, řekl: „Hle, činím všechno nové.“A řekl mi: „ Napiš: Tato slova jsou věrná a pravá.“"},{"c":21,"v":6,"t":"A řekl mi: „ Stalo se. Já jsem Alfa i Omega, počátek i konec. Já dám žíznivému zadarmo napít z pramene vody života"},{"c":21,"v":7,"t":"Kdo vítězí, dostane toto jako dědictví; budu mu Bohem a on mi bude synem"},{"c":21,"v":8,"t":"Avšak bázliví, nevěřící, ti, kdo propadli modlářské ohavnosti, vrahové, smilníci, kouzelníci, modloslužebníci a všichni lháři mají svůj díl v jezeře, které hoří ohněm a sírou, což je smrt druhá.“"},{"c":21,"v":9,"t":"Vtom přišel jeden z těch sedmi andělů, kteří měli sedm misek plných sedmi posledních ran, a promluvil se mnou slovy: „Pojď, ukážu ti Nevěstu, ženu Beránkovu.“"},{"c":21,"v":10,"t":"V Duchu mne odnesl na velikou a vysokou horu a ukázal mi svaté město Jeruzalém, jak sestupuje z nebe od Boha,"},{"c":21,"v":11,"t":"mající Boží slávu. Jeho jas je podobný nejvzácnějšímu kameni, je jako kámen jaspis, čistý jako křišťál"},{"c":21,"v":12,"t":"Má velikou a vysokou hradbu, má dvanáct bran a na těch branách dvanáct andělů a napsaná jména, která jsou jmény dvanácti kmenů synů Izraele"},{"c":21,"v":13,"t":"Tři brány jsou na východ, tři brány na sever, tři brány na jih a tři brány na západ"},{"c":21,"v":14,"t":"A hradba toho města má dvanáct základních kamenů a na nich dvanáct jmen dvanácti Beránkových apoštolů"},{"c":21,"v":15,"t":"Ten, který se mnou mluvil, měl jako měřidlo zlatou třtinu, aby změřil město, jeho brány i jeho hradbu"},{"c":21,"v":16,"t":"Město je rozloženo do čtverce: jeho délka je stejná jako šířka. Změřil město tou třtinou na dvanáct tisíc stadií, jeho délka, šířka i výška jsou stejné"},{"c":21,"v":17,"t":"Změřil také jeho hradbu: sto čtyřicet čtyři loktů podle lidské míry, která je také mírou andělskou"},{"c":21,"v":18,"t":"Stavivem jeho hradby je jaspis a město je z čistého zlata, podobné čistému sklu"},{"c":21,"v":19,"t":"Základy městské hradby jsou ozdobeny všelijakými drahými kameny: první základní kámen je jaspis, druhý safír, třetí chalcedon, čtvrtý smaragd,"},{"c":21,"v":20,"t":"pátý sardonyx, šestý karneol, sedmý chrysolit, osmý beryl, devátý topas, desátý chrysopras, jedenáctý hyacint, dvanáctý ametyst"},{"c":21,"v":21,"t":"A dvanáct bran, dvanáct perel; každá z těch bran byla z jedné perly. A náměstí města bylo čisté zlato jako průhledné sklo."},{"c":21,"v":22,"t":"Avšak svatyni jsem v něm neviděl, neboť jeho svatyní je Pán Bůh Všemohoucí a Beránek"},{"c":21,"v":23,"t":"A to město nepotřebuje slunce ani měsíc, aby mu svítily. Ozářila ho Boží sláva a jeho lampou je Beránek"},{"c":21,"v":24,"t":"A národy budou chodit v jeho světle a králové země do něho přinášejí svou slávu"},{"c":21,"v":25,"t":"Jeho brány nebudou nikdy ve dne uzavřeny, a noci tam už nebude"},{"c":21,"v":26,"t":"A přinesou do něho slávu a čest národů"},{"c":21,"v":27,"t":"A nevstoupí do něho nic nečistého ani ten, kdo činí ohavnost a lež, ale jen ti, kdo jsou zapsáni v Beránkově knize života"},{"c":22,"v":1,"t":"I ukázal mi řeku vody života, čirou jako křišťál, která vycházela z trůnu Božího a Beránkova"},{"c":22,"v":2,"t":"Uprostřed náměstí toho města, z obou stran řeky je strom života, nesoucí dvanáctero ovoce; každý měsíc vydává své ovoce a listí toho stromu slouží k léčení národů"},{"c":22,"v":3,"t":"Nic prokletého již nebude. V tom městě bude Boží a Beránkův trůn a jeho otroci mu budou sloužit"},{"c":22,"v":4,"t":"a budou vidět jeho tvář a na jejich čelech bude jeho jméno"},{"c":22,"v":5,"t":"Noci již nebude ani nebude třeba světla lampy nebo světla slunce: Pán Bůh je bude osvěcovat a budou kralovat na věky věků"},{"c":22,"v":6,"t":"I řekl mi: „Tato slova jsou věrná a pravá; Pán Bůh duchů proroků poslal svého anděla, aby svým otrokům ukázal, co se má brzo stát"},{"c":22,"v":7,"t":"A hle, přijdu brzy. Blahoslavený, kdo zachovává slova proroctví tohoto svitku.“"},{"c":22,"v":8,"t":"Já, Jan, jsem ten, kdo tyto věci slyšel a viděl. A když jsem to uslyšel a uviděl, padl jsem k nohám anděla, který mi tyto věci ukazoval, abych se mu poklonil"},{"c":22,"v":9,"t":"Řekl mi: „Varuj se toho! Jsem spoluotrok tvůj a tvých bratrů proroků a těch, kdo zachovávají slova tohoto svitku. Bohu se pokloň.“"},{"c":22,"v":10,"t":"Ještě mi řekl: „Nezapečeť slova proroctví tohoto svitku, neboť ten čas je blízko"},{"c":22,"v":11,"t":"Kdo ubližuje, ať ještě ubližuje do konce, kdo je špinavý, ať se ještě ušpiní, a kdo je spravedlivý, ať ještě až do konce koná spravedlnost, a kdo je svatý, ať se ještě posvětí.“"},{"c":22,"v":12,"t":"„Hle, přijdu brzy a moje mzda se mnou, abych odplatil každému podle toho, jaké je jeho dílo"},{"c":22,"v":13,"t":"Já jsem Alfa i Omega, první i poslední, počátek i konec.“"},{"c":22,"v":14,"t":"„Blahoslavení ti, kdo si perou roucha, aby měli právo ke stromu života a aby branami vstoupili do města"},{"c":22,"v":15,"t":"Venku zůstanou psi, kouzelníci, smilníci, vrahové a modloslužebníci i každý, kdo miluje a činí lež.“"},{"c":22,"v":16,"t":"„Já, Ježíš, jsem poslal svého anděla, aby vám ve sborech tyto věci dosvědčil. Já jsem kořen a rod Davidův, jasná hvězda jitřní.“"},{"c":22,"v":17,"t":"A Duch i Nevěsta praví: „Přijď. “A kdo slyší, ať řekne: „Přijď. “A kdo žízní, ať přijde, a kdo chce, ať si zdarma vezme vodu života"},{"c":22,"v":18,"t":"Já dosvědčuji každému, kdo slyší slova proroctví tohoto svitku: kdo by k nim něco přidal, tomu Bůh přidá ran zapsaných v tomto svitku;"},{"c":22,"v":19,"t":"a kdo by ze slov svitku tohoto proroctví něco odejmul, tomu Bůh odejme jeho díl ze stromu života a ze svatého města, které byly popsány v tomto svitku"},{"c":22,"v":20,"t":"Ten, který o tom svědčí, praví: „Ano, přijdu brzy. “Amen, přijď, Pane Ježíši!"},{"c":22,"v":21,"t":"Milost Pána Ježíše Krista se všemi svatými. Amen."}];
const CHAPTERS={"1":"Shrnutí a závěr celé knihy Zjevení","2":"Dopisy poslané poslům sedmi sborů","3":"Dopisy poslané poslům sedmi sborů","4":"Boží trůn a organizace v duchovním světě","5":"Kniha zapečetěná sedmi pečetěmi","6":"Soud nad sluncem, měsícem a hvězdami předchozího nebe, které zradilo","7":"Nově stvořených dvanáct kmenů nového duchovního Izraele","8":"Poslední pečeť a sedm polnic","9":"Kobylky z propasti a padlí andělé","10":"Otevřená kniha z nebe a zaslíbený pastýř","11":"Dva svědkové a sedmá polnice","12":"Válka mezi Bohem a drakem","13":"Vyvolený lid, který přijal cejch šelmy a zradil","14":"000 prvotin na hoře Sión","15":"Svatyně stánku svědectví - místo, kam se přijdou poklonit všechny národy","16":"Sedm misek hněvu","17":"Pokrm ďábla, víno smilstva","18":"Svatba se Satanem, který zničil všechny národy","19":"Duchové a těla svatební hostiny Beránkovy","20":"První vzkříšení duchů mučedníků a živých","21":"Shincheonji - zaslíbené nové nebe a nová země","22":"Závěr a svědectví o naplnění Zjevení"};
const QA={"1:1":[{"q":"Co tento verš otevírá podle této lekce?","a":"Tento verš otevírá celé Zjevení jako proces předání: Bůh dává zjevení Ježíši, Ježíš je posílá skrze anděla a nový Jan je doručuje služebníkům. Lekce tím zdůrazňuje, že Zjevení není lidský výklad, ale svědectví předané v určeném pořadí."},{"q":"Jak je zde vysvětleno „co se má brzy stát“?","a":"Podle studia jde o všechny události celé knihy Zjevení, které se mají ukázat v čase naplnění. Verš je proto chápán jako souhrnný úvod k celé knize, ne jen k jedné malé části."},{"q":"Co si zapsat k tomuto verši?","a":"Klíčová myšlenka je pořadí předání zjevení a to, že služebníci ho mají přijmout skrze svědectví toho, kdo je viděl a slyšel."}],"1:2":[{"q":"Co zdůrazňuje svědectví v tomto verši?","a":"Verš ukazuje, že Jan svědčí o Božím slově a o tom, co viděl. V této lekci je Jan chápán jako svědek, který předává skutečnosti Zjevení na základě toho, co mu bylo ukázáno."},{"q":"Jak je zde chápáno „svědectví Ježíše Krista“?","a":"Je vykládáno jako svědectví o naplněné skutečnosti Zjevení. Nejde jen o text k přečtení, ale o obsah, který má být dosvědčen tomu, kdo ho přijímá."},{"q":"Co si zapsat k tomuto verši?","a":"Důležité je, že pravé svědectví stojí na tom, co bylo skutečně viděno a slyšeno, ne jen na vlastním názoru."}],"1:3":[{"q":"Koho tento verš nazývá blahoslaveným?","a":"Lekce vysvětluje, že požehnání patří tomu, kdo čte, slyší a zachovává slova proroctví. Nestačí text jen znát; člověk ho má přijmout a držet se ho."},{"q":"Jak je v této lekci vyloženo čtení, slyšení a zachovávání?","a":"Čtení je spojeno s tím, kdo Zjevení ovládá a předává, slyšení s těmi, kdo přijímají svědectví, a zachovávání s těmi, kdo podle přijatého slova skutečně jednají. Důraz je tedy na poslušnost přijatému zjevení."},{"q":"Co si zapsat k tomuto verši?","a":"Požehnání je spojeno s přijetím a zachováním slova, ne pouze s informací o něm."}],"1:4":[{"q":"Co tato pasáž ukazuje o Ježíši a jeho lidu?","a":"Tato část představuje Ježíše jako toho, kdo svým lidem přináší milost, pokoj a vykoupení. Lekce zdůrazňuje, že vykoupení jeho krví se v naplnění projeví na těch, kdo budou tvořit Boží království a kněze."},{"q":"Jak je zde chápán účinek Ježíšovy krve?","a":"Studium vysvětluje, že krev rozvazuje z hříchu a vytváří lid patřící Bohu. Tím se tato slova spojují s pozdějším vytvořením 144 000 a Božího království."},{"q":"Co si zapsat k této pasáži?","a":"Ježíšovo dílo není jen minulá událost; v tomto výkladu směřuje k vytvoření Božího lidu v čase naplnění."}],"1:5":[{"q":"Co tato pasáž ukazuje o Ježíši a jeho lidu?","a":"Tato část představuje Ježíše jako toho, kdo svým lidem přináší milost, pokoj a vykoupení. Lekce zdůrazňuje, že vykoupení jeho krví se v naplnění projeví na těch, kdo budou tvořit Boží království a kněze."},{"q":"Jak je zde chápán účinek Ježíšovy krve?","a":"Studium vysvětluje, že krev rozvazuje z hříchu a vytváří lid patřící Bohu. Tím se tato slova spojují s pozdějším vytvořením 144 000 a Božího království."},{"q":"Co si zapsat k této pasáži?","a":"Ježíšovo dílo není jen minulá událost; v tomto výkladu směřuje k vytvoření Božího lidu v čase naplnění."}],"1:6":[{"q":"Co tato pasáž ukazuje o Ježíši a jeho lidu?","a":"Tato část představuje Ježíše jako toho, kdo svým lidem přináší milost, pokoj a vykoupení. Lekce zdůrazňuje, že vykoupení jeho krví se v naplnění projeví na těch, kdo budou tvořit Boží království a kněze."},{"q":"Jak je zde chápán účinek Ježíšovy krve?","a":"Studium vysvětluje, že krev rozvazuje z hříchu a vytváří lid patřící Bohu. Tím se tato slova spojují s pozdějším vytvořením 144 000 a Božího království."},{"q":"Co si zapsat k této pasáži?","a":"Ježíšovo dílo není jen minulá událost; v tomto výkladu směřuje k vytvoření Božího lidu v čase naplnění."}],"1:7":[{"q":"Jak tato lekce vykládá příchod na oblacích?","a":"Příchod na oblacích je zde chápán duchovně, ne jako běžný fyzický obraz na obloze. Verš oznamuje příchod Ježíše v době naplnění a soud nad těmi, kdo mu odporují."},{"q":"Kdo jsou zde ti, kdo ho probodli?","a":"Ve studiu jsou spojeni s těmi, kdo pronásledovali Ježíšovy svědky. Důraz není na dávnou historii, ale na protivníky, kteří se staví proti Božímu dílu v naplnění."},{"q":"Co si zapsat k tomuto verši?","a":"Tento verš je varováním, že Ježíšův příchod znamená zároveň zjevení, oddělení i soud."}],"1:8":[{"q":"Co znamená „Alfa i Omega“ v této lekci?","a":"Výklad říká, že Bůh je začátek i konec svého díla a dovádí svůj plán do naplnění skrze Zjevení. Verš tak uzavírá úvod jako potvrzení Boží svrchovanosti nad celým dějem."},{"q":"Jaký důraz má tento verš v rámci kapitoly?","a":"Zdůrazňuje, že za naplněním Zjevení stojí sám Bůh a že celé dílo směřuje k dokončení toho, co začal. Není to samostatná lidská iniciativa."},{"q":"Co si zapsat k tomuto verši?","a":"Začátek i konec patří Bohu, proto je celé Zjevení chápáno jako dovršení jeho plánu."}],"1:9":[{"q":"Co tato část otevírá?","a":"Tato pasáž podle lekce otevírá začátek událostí Zjevení. Právě odtud se rozbíhá děj, v němž se objevují sedm poslů, Ježíš a následně nový Jan s úkolem napsat dopisy."},{"q":"Jak je zde chápán příkaz psát do knihy?","a":"Příkaz je vykládán jako pověření předat svědectví sedmi sborům v době naplnění. Dopisy tedy nejsou chápány jen jako minulá korespondence, ale jako součást prorocké skutečnosti."},{"q":"Co si zapsat k této pasáži?","a":"Od této chvíle se Zjevení nezaobírá jen viděním, ale i konkrétním předáním svědectví adresátům."}],"1:10":[{"q":"Co tato část otevírá?","a":"Tato pasáž podle lekce otevírá začátek událostí Zjevení. Právě odtud se rozbíhá děj, v němž se objevují sedm poslů, Ježíš a následně nový Jan s úkolem napsat dopisy."},{"q":"Jak je zde chápán příkaz psát do knihy?","a":"Příkaz je vykládán jako pověření předat svědectví sedmi sborům v době naplnění. Dopisy tedy nejsou chápány jen jako minulá korespondence, ale jako součást prorocké skutečnosti."},{"q":"Co si zapsat k této pasáži?","a":"Od této chvíle se Zjevení nezaobírá jen let state={
  idx: parseInt(localStorage.getItem('mye_idx')||'0'),
  tab: 'guide',
  notes: JSON.parse(localStorage.getItem('mye_notes')||'{}'),
  navCh: 1,
  navView: 'chapters'
};
function save(){ localStorage.setItem('mye_idx',state.idx); localStorage.setItem('mye_notes',JSON.stringify(state.notes)); }
function esc(s){ return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function chVS(ch){ return VERSES.filter(v=>v.c===ch); }
function chName(ch){ return CHAPTERS[ch]||'Kapitola '+ch; }
function getQA(c,v){ return QA[c+':'+v]||[]; }
function hasNote(c,v){ return !!(state.notes[c+':'+v]||'').trim(); }

const GUIDE=[
  ['1','Přečti verš pomalu','Všimni si, kdo jedná, co se děje a které slovo je nejdůležitější.'],
  ['2','Polož si 5W1H','Kdo, co, kdy, kde, proč a jak — zkus si odpovědět vlastními slovy.'],
  ['3','Otevři Q&A','Porovnej svoji odpověď s připravenými otázkami k tomuto verši.'],
  ['4','Zapiš poznámku','Stačí jedna věta: co sis zapamatoval nebo co tě zaujalo.'],
  ['5','Řekni to nahlas','Zkus verš stručně převyprávět, jako bys to vysvětloval kamarádovi.'],
  ['6','Sdílej uvědomění','Hlavní myšlenku si ulož do poznámek nebo sdílej ve skupině.'],
];

function render(){
  const vv=VERSES[state.idx];
  const cvs=chVS(vv.c);
  const pos=cvs.findIndex(x=>x.v===vv.v)+1;
  document.getElementById('cv-ch').textContent='Kapitola '+vv.c;
  document.getElementById('cv-name').textContent=chName(vv.c);
  document.getElementById('cv-right').textContent='Verš '+pos+' z '+cvs.length;
  document.getElementById('vc-ref').textContent='Zj '+vv.c+':'+vv.v;
  document.getElementById('vc-text').innerHTML='<b>'+vv.v+'.</b> '+esc(vv.t);
  document.getElementById('nav-label').textContent='Zj '+vv.c+':'+vv.v;
  const prevBtn=document.getElementById('bn-prev');
  const nextBtn=document.getElementById('bn-next');
  prevBtn.style.opacity=state.idx===0?'.35':'1';
  nextBtn.style.opacity=state.idx===VERSES.length-1?'.35':'1';
  prevBtn.disabled=state.idx===0; nextBtn.disabled=state.idx===VERSES.length-1;
  prevBtn.setAttribute('aria-disabled',state.idx===0?'true':'false');
  nextBtn.setAttribute('aria-disabled',state.idx===VERSES.length-1?'true':'false');
  setTab(state.tab||'qa');
  save();
}

function setTab(t){
  state.tab=t;
  ['guide','qa','note'].forEach(x=>{
    document.getElementById('panel-'+x).classList.toggle('active',x===t);
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  const vv=VERSES[state.idx];
  if(t==='guide'){
    document.getElementById('panel-guide').innerHTML=
      '<div class="guide-card"><div class="guide-title">Návod na MYEShim</div>'+
      GUIDE.map(([n,h,p])=>`<div class="guide-step"><div class="gs-num">${n}</div><div class="gs-body"><h4>${h}</h4><p>${p}</p></div></div>`).join('')+
      '</div>';
  } else if(t==='qa'){
    const items=getQA(vv.c,vv.v);
    if(!items.length){ document.getElementById('panel-qa').innerHTML='<p style="color:var(--sub);padding:10px 0 20px">Pro tento verš zatím není Q&A.</p>'; return; }
    document.getElementById('panel-qa').innerHTML=
      '<div class="qa-card">'+
      items.map((it,i)=>`<div class="qa-item"><div class="qa-num">${i+1}.</div><div class="qa-q">${esc(it.q)}</div><div class="qa-ans-label">Odpověď</div><div class="qa-ans">${esc(it.a)}</div></div>`).join('')+
      '</div>';
  } else {
    const key=vv.c+':'+vv.v;
    const val=state.notes[key]||'';
    document.getElementById('panel-note').innerHTML=
      `<p class="note-hint">Krátká poznámka — vlastní shrnutí, klíčové slovo nebo otázka.</p>`+
      `<textarea class="note-ta" id="note-ta" placeholder="Co sis dnes zapamatoval nebo co tě zaujalo?">${esc(val)}</textarea>`+
      `<button class="note-save" onclick="saveNote()">Uložit poznámku</button><div id="ux36-note-tip" style="margin-top:8px;font-size:.82rem;color:var(--sub);text-align:center">Poznámky se ukládají i automaticky během psaní.</div>`;
  }
}

function saveNote(silent){
  const vv=VERSES[state.idx];
  const ta=document.getElementById('note-ta');
  if(ta){
    state.notes[vv.c+':'+vv.v]=ta.value; save();
    const btn=document.querySelector('.note-save');
    if(!silent && btn){
      btn.textContent='Uloženo ✓';
      setTimeout(()=>btn.textContent='Uložit poznámku',1500);
    }
  }
}

function go(dir){
  const ni=Math.max(0,Math.min(VERSES.length-1,state.idx+dir));
  if(ni===state.idx) return;
  state.idx=ni; render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── NAV OVERLAY ── */
function openNav(){
  state.navCh=VERSES[state.idx].c;
  state.navView='chapters';
  document.getElementById('ns-input').value='';
  renderNavGrid();
  document.getElementById('nav-ov').classList.add('open');
}
function closeNav(){ document.getElementById('nav-ov').classList.remove('open'); }

function renderNavGrid(){
  const cur=VERSES[state.idx];
  if(state.navView==='verses'){
    const vs=chVS(state.navCh);
    let h='<button class="ns-back-btn" onclick="navBackToChapters()" aria-label="Zpět na kapitoly">← Zpět</button>';
    h+='<div class="ns-section-label">Verš — '+esc(chName(state.navCh))+'</div><div class="ns-v-grid">';
    vs.forEach(vv=>{
      const a=(vv.c===cur.c&&vv.v===cur.v)?' active':'';
      const hn=hasNote(vv.c,vv.v)?' has-note':'';
      h+=`<button class="${a}${hn}" onclick="navGo(${vv.c},${vv.v})">${vv.v}</button>`;
    });
    h+='</div>';
    document.getElementById('ns-scroll').innerHTML=h;
    return;
  }
  // chapters
  let h='<div class="ns-section-label">Kapitola</div><div class="ns-ch-grid">';
  for(let i=1;i<=22;i++){
    const a=i===state.navCh?' active':'';
    const short=chName(i).length>18?chName(i).slice(0,17)+'…':chName(i);
    h+=`<button class="${a}" onclick="navSelCh(${i})"><span class="ch-num">Zj ${i}</span><span class="ch-title">${esc(short)}</span></button>`;
  }
  h+='</div>';
  document.getElementById('ns-scroll').innerHTML=h;
  // scroll active chapter into view
  setTimeout(()=>{
    const a=document.querySelector('.ns-ch-grid button.active');
    if(a) a.scrollIntoView({block:'nearest',inline:'center'});
  },30);
}

function navBackToChapters(){
  state.navView='chapters';
  renderNavGrid();
}

function navSelCh(ch){
  state.navCh=ch;
  state.navView='verses';
  renderNavGrid();
}

function navGo(c,v){
  const idx=VERSES.findIndex(x=>x.c===c&&x.v===v);
  if(idx>-1){ state.idx=idx; render(); closeNav(); window.scrollTo({top:0,behavior:'smooth'}); }
}

function nsSearch(){
  const q=document.getElementById('ns-input').value.trim().toLowerCase();
  if(q.length<2){ renderNavGrid(); return; }
  // try to parse "6:9" style
  const refM=q.match(/^(\d{1,2}):(\d{1,3})$/);
  let res;
  if(refM){
    const c=parseInt(refM[1]),v=parseInt(refM[2]);
    res=VERSES.filter(x=>x.c===c&&x.v===v);
  } else {
    res=VERSES.filter(vv=>vv.t.toLowerCase().includes(q)).slice(0,50);
  }
  let h='<div class="ns-section-label">'+(res.length?res.length+' výsledků':'Žádné výsledky')+'</div><div class="ns-sr">';
  h+=res.length?res.map(vv=>`<div class="ns-sr-item" onclick="navGo(${vv.c},${vv.v})"><div><div class="ns-sr-ref">Zj ${vv.c}:${vv.v}</div><div class="ns-sr-name">${esc(chName(vv.c))}</div></div><div class="ns-sr-text">${esc(vv.t)}</div></div>`).join(''):'<p style="color:var(--sub);padding:8px 0">Zkus jiné slovo.</p>';
  h+='</div>';
  document.getElementById('ns-scroll').innerHTML=h;
}

// swipe to close nav sheet
(function(){
  let sy=0;
  document.getElementById('nav-sheet').addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
  document.getElementById('nav-sheet').addEventListener('touchmove',e=>{
    if(e.touches[0].clientY-sy>70&&document.getElementById('ns-scroll').scrollTop<2) closeNav();
  },{passive:true});
})();

render();
</script>
