    if(!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(window.__ux35toast);
    window.__ux35toast = setTimeout(()=>el.classList.remove('show'), 1350);
  };
  function preferredTheme(){
    const saved = store.get('ux35-theme','');
    if(saved) return saved;
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  function applyTheme(theme){
    document.body.classList.toggle('dark', theme === 'dark');
    store.set('ux35-theme', theme);
    const btn = $('#ux35-theme');
    if(btn) btn.lastChild.textContent = theme === 'dark' ? ' Světlé' : ' Téma';
  }
  function clamp(n,min,max){ return Math.min(max,Math.max(min,n)); }
  function applyFont(scale){
    const s = clamp(Number(scale||1), 0.92, 1.18);
    document.documentElement.style.setProperty('--fontScale', s.toFixed(2));
    store.set('ux35-font', s.toFixed(2));
    return s;
  }
  function currentVerseIndex(){
    const ref = $('#vc-ref')?.textContent || $('#nav-label')?.textContent || '';
    const m = ref.match(/(\d+)\s*:\s*(\d+)/);
    if(!m || !Array.isArray(window.VERSES)) return -1;
    const key = m[1]+':'+m[2];
    return VERSES.findIndex(x => `${x.c}:${x.v}` === key);
  }
  function currentChapter(){
    const ref = $('#vc-ref')?.textContent || '';
    const m = ref.match(/(\d+)\s*:/);
    return m ? Number(m[1]) : null;
  }
  function updateProgress(){
    const idx = currentVerseIndex();
    const total = Array.isArray(window.VERSES) ? VERSES.length : 0;
    const pct = idx >= 0 && total ? ((idx+1)/total)*100 : 0;
    const bar = $('#ux35-progress');
    const label = $('#ux35-progress-label');
    if(bar) bar.style.width = pct.toFixed(2) + '%';
    if(label){
      const ch = currentChapter();
      label.textContent = idx >= 0 ? `Kapitola ${ch ?? '–'} · verš ${idx+1} z ${total}` : '';
    }
  }
  function openSearch(){
    if(typeof window.openNav === 'function') window.openNav();
    setTimeout(()=>{
      const input = $('#ns-input');
      if(input){ input.focus(); input.select(); }
    }, 90);
  }
  function wireNotes(){
    const ta = $('.note-ta');
    if(!ta || ta.dataset.ux35 === '1') return;
    ta.dataset.ux35 = '1';
    let meta = $('#ux35-note-meta');
    if(!meta){
      meta = document.createElement('div');
      meta.id = 'ux35-note-meta';
      const host = $('.note-save')?.parentElement || ta.parentElement;
      host && host.appendChild(meta);
    }
    const update = ()=>{ meta.textContent = `${ta.value.length} znaků · lokální uložení v prohlížeči`; };
    ta.addEventListener('input', update);
    update();
  }
  function bind(){
    $('#ux35-search')?.addEventListener('click', openSearch);
    $('#ux35-theme')?.addEventListener('click', ()=>{ const dark = document.body.classList.contains('dark'); applyTheme(dark ? 'light' : 'dark'); toast(dark ? 'Světlý režim' : 'Tmavý režim'); });
    $('#ux35-font-minus')?.addEventListener('click', ()=>{ const s = applyFont((parseFloat(store.get('ux35-font','1')) || 1) - 0.04); toast(`Písmo ${Math.round(s*100)} %`); });
    $('#ux35-font-plus')?.addEventListener('click', ()=>{ const s = applyFont((parseFloat(store.get('ux35-font','1')) || 1) + 0.04); toast(`Písmo ${Math.round(s*100)} %`); });
    document.addEventListener('keydown', (e)=>{
      const tag = (e.target?.tagName || '').toLowerCase();
      const typing = ['input','textarea','select'].includes(tag) || e.target?.isContentEditable;
      if(e.key === '/' && !typing){ e.preventDefault(); openSearch(); }
      if(typing) return;
      if(e.key.toLowerCase() === 'd'){ applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark'); }
      if(e.key === '+' || e.key === '='){ applyFont((parseFloat(store.get('ux35-font','1')) || 1) + 0.04); updateProgress(); }
      if(e.key === '-'){ applyFont((parseFloat(store.get('ux35-font','1')) || 1) - 0.04); updateProgress(); }
    });
  }

  function wireAutoSave(){
    const ta = $('.note-ta');
    if(!ta || ta.dataset.autosave === '1') return;
    ta.dataset.autosave = '1';
    let timer = null;
    ta.addEventListener('input', ()=>{
      clearTimeout(timer);
      timer = setTimeout(()=>{
        if(typeof window.saveNote === 'function') window.saveNote(true);
      }, 250);
    });
  }
  function wireSwipe(){
    const card = $('.verse-card');
    if(!card || card.dataset.swipe === '1') return;
    card.dataset.swipe = '1';
    let sx = 0, sy = 0, active = false;
    card.addEventListener('touchstart', (e)=>{
      const t = e.changedTouches && e.changedTouches[0];
      if(!t) return;
      sx = t.clientX; sy = t.clientY; active = true;
    }, {passive:true});
    card.addEventListener('touchend', (e)=>{
      if(!active) return;
      active = false;
      const t = e.changedTouches && e.changedTouches[0];
      if(!t) return;
      const dx = t.clientX - sx, dy = t.clientY - sy;
      if(Math.abs(dx) > 58 && Math.abs(dy) < 36){
        if(dx < 0 && typeof window.go === 'function') window.go(1);
        if(dx > 0 && typeof window.go === 'function') window.go(-1);
      }
    }, {passive:true});
  }
  function init(){
    applyTheme(preferredTheme());
    applyFont(parseFloat(store.get('ux35-font','1')) || 1);
    bind();
    updateProgress();
    wireNotes();
    wireAutoSave();
    wireSwipe();
    const target = $('#vc-ref') || $('#app');
    if(target){
      new MutationObserver(()=>{ updateProgress(); wireNotes(); wireAutoSave(); wireSwipe(); }).observe(target, {childList:true,subtree:true,characterData:true});
    }
    new MutationObserver(()=>{ wireNotes(); wireAutoSave(); wireSwipe(); }).observe(document.body, {childList:true,subtree:true});
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>


<script id="ux38-polish-script">
(function(){
  const pressables = 'button,.ux35-btn,.ns-ch-grid button,.ns-v-grid button';
  function bindPressFX(root=document){
    root.querySelectorAll(pressables).forEach(el=>{
      if(el.dataset.ux38press === '1') return;
      el.dataset.ux38press = '1';
      const on = ()=>el.classList.add('pressed');
      const off = ()=>el.classList.remove('pressed');
      el.addEventListener('touchstart', on, {passive:true});
      el.addEventListener('touchend', off, {passive:true});
      el.addEventListener('touchcancel', off, {passive:true});
      el.addEventListener('mousedown', on);
      el.addEventListener('mouseup', off);
      el.addEventListener('mouseleave', off);
    });
  }
  function pulseCurrentVerse(){
    const card = document.querySelector('.verse-card');
    if(!card) return;
    card.classList.remove('ux38-bump');
    void card.offsetWidth;
    card.classList.add('ux38-bump');
    setTimeout(()=>card.classList.remove('ux38-bump'), 220);
  }
  const style = document.createElement('style');
  style.textContent = '.ux38-bump{animation:ux38-bump .22s ease}.ux38-btn.pressed,#bottomnav button.pressed,.tabs button.pressed{transform:scale(.975)}@keyframes ux38-bump{0%{transform:scale(.992)}100%{transform:scale(1)}}';
  document.head.appendChild(style);
  function init(){
    document.body.classList.add('ready');
    bindPressFX(document);
    pulseCurrentVerse();
    new MutationObserver(()=>{ bindPressFX(document); }).observe(document.body,{childList:true,subtree:true});
    const ref = document.getElementById('vc-ref');
    if(ref){ new MutationObserver(()=>pulseCurrentVerse()).observe(ref,{childList:true,subtree:true,characterData:true}); }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>


<script id="ux39-finish-script">
(function(){
  function improveNavButtons(){
    const prev = document.getElementById('bn-prev');
    const next = document.getElementById('bn-next');
    if(!prev || !next) return;
    const prevDisabled = prev.style.opacity === '.35' || prev.style.opacity === '0.35';
    const nextDisabled = next.style.opacity === '.35' || next.style.opacity === '0.35';
    prev.disabled = !!prevDisabled;
    next.disabled = !!nextDisabled;
    prev.setAttribute('aria-disabled', prevDisabled ? 'true' : 'false');
    next.setAttribute('aria-disabled', nextDisabled ? 'true' : 'false');
  }
  function closeOnEscape(e){
    if(e.key === 'Escape' && typeof window.closeNav === 'function') window.closeNav();
  }
  function init(){
    improveNavButtons();
    document.addEventListener('keydown', closeOnEscape);
    const ref = document.getElementById('vc-ref');
    if(ref){
      new MutationObserver(improveNavButtons).observe(ref,{childList:true,subtree:true,characterData:true});
    }
    new MutationObserver(improveNavButtons).observe(document.body,{childList:true,subtree:true});
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>


<div id="installCard" class="install-card" aria-live="polite" aria-label="Instalace aplikace">
  <div class="install-copy">
    <p class="install-title">Nainstalovat aplikaci</p>
    <p class="install-sub">Přidej si MYEShim na plochu pro rychlé otevření a lepší každodenní používání.</p>
  </div>
  <div class="install-actions">
    <button id="installDismiss" class="install-dismiss" type="button">Později</button>
    <button id="installBtn" class="install-btn" type="button">Instalovat</button>
  </div>
</div>
<div id="pwaTip" class="pwa-tip" hidden>Aplikace jde nainstalovat z nabídky prohlížeče přes „Přidat na plochu“.</div>

<script id="ux40-pwa-script">
(function(){
  const STORAGE_KEY='myeshim-pwa-install-dismissed';
  const LAST_ROUTE_KEY='myeshim-last-route';
  let deferredPrompt=null;
  function $(id){return document.getElementById(id)}
  function showInstallCard(){ const card=$('installCard'); if(card && !localStorage.getItem(STORAGE_KEY)) card.classList.add('show'); }
  function hideInstallCard(){ const card=$('installCard'); if(card) card.classList.remove('show'); }
  function saveProgress(){
    try{
      const ref=$('vc-ref')?.textContent?.trim() || '';
      const idx=(window.state && typeof window.state.idx==='number') ? window.state.idx : null;
      localStorage.setItem(LAST_ROUTE_KEY, JSON.stringify({ref, idx, ts:Date.now()}));
    }catch(e){}
  }
  function attachProgressTracking(){
    document.addEventListener('click', function(e){
      const t=e.target;
      if(t && (t.closest('#bn-prev') || t.closest('#bn-next') || t.closest('.ns-v-grid button') || t.closest('.ns-ch-grid button'))) setTimeout(saveProgress, 50);
    }, true);
    window.addEventListener('beforeunload', saveProgress);
    setTimeout(saveProgress, 500);
  }
  function setupInstall(){
    const btn=$('installBtn'), dismiss=$('installDismiss'), tip=$('pwaTip');
    if(dismiss){
      dismiss.addEventListener('click', function(){ localStorage.setItem(STORAGE_KEY,'1'); hideInstallCard(); if(tip) tip.hidden=false; });
    }
    if(btn){
      btn.addEventListener('click', async function(){
        if(deferredPrompt){
          deferredPrompt.prompt();
          try{ await deferredPrompt.userChoice; }catch(e){}
          deferredPrompt=null;
          hideInstallCard();
          return;
        }
        if(tip) tip.hidden=false;
      });
    }
    window.addEventListener('beforeinstallprompt', function(e){
      e.preventDefault();
      deferredPrompt=e;
      showInstallCard();
    });
    window.addEventListener('appinstalled', function(){
      hideInstallCard();
      if(tip) tip.hidden=true;
    });
  }
  function registerSW(){
    if(!('serviceWorker' in navigator)) return;
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('service-worker.js').catch(function(){});
    });
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', function(){ setupInstall(); attachProgressTracking(); registerSW(); });
  } else {
    setupInstall(); attachProgressTracking(); registerSW();
  }
})();
</script>
