<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MYEShim – Zjevení</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --pink:#e5458e;--pink2:#f05ca2;
  --text:#1c1820;--sub:#7a6a76;
  --line:#ede4ea;--bg:#f3f5fa;--card:#fff;--r:20px;
}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh}

/* ── TOPBAR ── */
#topbar{
  position:sticky;top:0;z-index:30;
  background:rgba(255,255,255,.96);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;gap:10px;
}
.tb-logo{display:flex;align-items:center;gap:7px;flex-shrink:0}
.tb-mark{width:26px;height:26px;display:grid;grid-template-columns:1fr 1fr;gap:2px}
.tb-mark span{border-radius:7px 3px 7px 3px;background:linear-gradient(135deg,#7b3ef4,#e5458e)}
.tb-name{font-weight:900;font-size:.88rem;color:#c53580}
.tb-brand{display:flex;align-items:center;flex-shrink:0;padding:0 2px}

/* nav pill — middle of topbar */
#nav-pill{
  flex:1;display:flex;justify-content:center;
}
#nav-pill button{
  background:var(--bg);border:1.5px solid var(--line);border-radius:999px;
  padding:8px 18px;font:inherit;font-size:.92rem;font-weight:900;
  color:var(--pink);cursor:pointer;display:flex;align-items:center;gap:6px;
  white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;
}
#nav-pill button svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5;flex-shrink:0}

/* ── MAIN ── */
#app{max-width:480px;margin:0 auto;padding:16px 15px 96px}

.cv-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.cv-left .cv-chapter{font-size:.78rem;font-weight:800;color:var(--sub);letter-spacing:.05em;text-transform:uppercase}
.cv-left .cv-name{font-size:.96rem;font-weight:900;color:#b04c82;margin-top:2px;line-height:1.2}
.cv-right{font-size:.78rem;font-weight:800;color:var(--sub);text-align:right;padding-top:3px}

.verse-card{
  background:linear-gradient(160deg,#f05ca2 0%,#de4089 100%);
  border-radius:var(--r);padding:20px 18px;margin:0 0 16px;
  box-shadow:0 14px 30px rgba(222,64,137,.22);
}
.vc-ref{font-size:1.9rem;font-weight:900;color:#fff;line-height:1;margin-bottom:10px}
.vc-text{font-size:1.06rem;line-height:1.58;color:#fff}
.vc-text b{font-weight:800;opacity:.8}

.tabs{
  display:grid;grid-template-columns:repeat(3,1fr);gap:5px;
  background:#ede7eb;border-radius:16px;padding:4px;margin-bottom:16px;
}
.tabs button{
  border:none;background:none;border-radius:12px;
  padding:12px 4px;font:inherit;font-size:.93rem;font-weight:900;
  color:#9a7287;cursor:pointer;transition:all .14s;
}
.tabs button.active{background:#fff;color:var(--pink);box-shadow:0 3px 10px rgba(0,0,0,.09)}

.panel{display:none}.panel.active{display:block}

/* guide */
.guide-card{background:var(--card);border-radius:var(--r);border:1px solid var(--line);padding:16px}
.guide-title{font-size:1rem;font-weight:900;color:var(--pink);margin-bottom:14px}
.guide-step{display:grid;grid-template-columns:36px 1fr;gap:10px;align-items:start;padding:11px 0;border-bottom:1px solid #f3eaf0}
.guide-step:last-child{border-bottom:none}
.gs-num{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--pink2),var(--pink));color:#fff;display:grid;place-items:center;font-weight:900;font-size:1rem;flex-shrink:0}
.gs-body h4{font-size:.98rem;font-weight:900;margin-bottom:3px;line-height:1.2}
.gs-body p{font-size:.9rem;color:var(--sub);line-height:1.4}

/* qa */
.qa-card{background:var(--card);border-radius:var(--r);border:1px solid var(--line);overflow:hidden}
.qa-item{padding:16px;border-bottom:1px solid #f0e6ec}
.qa-item:last-child{border-bottom:none}
.qa-num{font-size:1.5rem;font-weight:900;line-height:1;margin-bottom:7px}
.qa-q{font-size:1.02rem;font-weight:900;line-height:1.3;margin-bottom:11px}
.qa-ans-label{font-size:.78rem;font-weight:900;color:var(--sub);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.qa-ans{font-size:1rem;line-height:1.58;color:#2e2532}

/* notes */
.note-hint{font-size:.9rem;color:var(--sub);margin-bottom:10px;line-height:1.45}
.note-ta{
  width:100%;min-height:190px;border:1.5px solid var(--line);
  border-radius:var(--r);padding:14px;font:inherit;font-size:1rem;
  line-height:1.6;background:var(--card);color:var(--text);resize:vertical;
}
.note-ta:focus{outline:none;border-color:var(--pink2)}
.note-save{
  width:100%;margin-top:10px;
  background:linear-gradient(135deg,var(--pink2),var(--pink));
  color:#fff;border:none;border-radius:var(--r);padding:15px;
  font:inherit;font-size:1rem;font-weight:900;cursor:pointer;
  box-shadow:0 8px 18px rgba(229,69,142,.22);
}

/* ── BOTTOM NAV ── */
#bottomnav{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  display:flex;max-width:480px;margin:0 auto;
  padding:5px 8px env(safe-area-inset-bottom);gap:8px;
}
#bottomnav button{
  flex:1;border:none;background:none;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 0;font:inherit;font-size:.72rem;font-weight:900;
  color:var(--sub);cursor:pointer;
}
#bottomnav button svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:2}
#bottomnav button.active{color:var(--pink)}
#bn-next{color:var(--pink)!important}

/* ── NAV OVERLAY ── */
#nav-ov{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.0);
  display:none;align-items:stretch;justify-content:center;
}
#nav-ov.open{display:flex}
#nav-sheet{
  background:var(--bg,#f3f5fa);
  width:100%;max-width:480px;
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  height:100dvh;
  overflow:hidden;
}
.ns-handle{display:none}
.ns-head{padding:12px 16px 0;flex-shrink:0}
.ns-search-wrap{
  display:flex;align-items:center;gap:9px;
  border:1.5px solid var(--line);border-radius:var(--r);
  padding:11px 14px;background:#fafafe;margin-bottom:14px;
}
.ns-search-wrap input{border:none;background:none;font:inherit;font-size:1rem;flex:1;outline:none;color:var(--text)}
.ns-search-wrap input:focus{outline:none}
.ns-search-wrap svg{color:#bbb;flex-shrink:0}

/* chapter + verse grids */
.ns-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 20px}
.ns-section-label{
  font-size:.76rem;font-weight:900;color:var(--sub);
  text-transform:uppercase;letter-spacing:.07em;
  margin:0 0 10px;
}
.ns-ch-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;
}
.ns-ch-grid button{
  border:1.5px solid var(--line);background:#fafafe;border-radius:16px;
  padding:12px 6px;font:inherit;font-size:.88rem;font-weight:900;
  color:var(--sub);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;transition:all .12s;
}
.ns-ch-grid button .ch-num{font-size:1.06rem}
.ns-ch-grid button .ch-title{font-size:.72rem;font-weight:700;color:#b08090;line-height:1.2;text-align:center}
.ns-ch-grid button.active{border-color:var(--pink);background:#fff0f7;color:var(--pink)}
.ns-ch-grid button.active .ch-title{color:var(--pink)}

.ns-v-section{}
.ns-v-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;}
.ns-v-grid button{
  border:1.5px solid var(--line);background:#fafafe;border-radius:12px;
  padding:12px 4px;font:inherit;font-size:.95rem;font-weight:900;
  color:var(--sub);cursor:pointer;transition:all .12s;
}
.ns-v-grid button.active{border-color:var(--pink);background:#fff0f7;color:var(--pink)}
.ns-v-grid button.has-note{border-color:#c4e0b2;background:#f4fbed}

/* search results */
.ns-sr{}
.ns-sr-item{
  padding:13px 0;border-bottom:1px solid #f3eaf0;cursor:pointer;
  display:grid;grid-template-columns:62px 1fr;gap:10px;align-items:start;
}
.ns-sr-item:last-child{border-bottom:none}
.ns-sr-ref{font-weight:900;color:var(--pink);font-size:.88rem}
.ns-sr-name{font-size:.76rem;color:var(--sub);margin-top:1px}
.ns-sr-text{font-size:.95rem;color:var(--text);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
</style>

<style id="ux35-style">
:root{--fontScale:1;--shadow-soft:0 10px 26px rgba(18,20,38,.08);--chip:#ffffffcc}
html{font-size:calc(16px * var(--fontScale));scroll-behavior:smooth}
body{padding-bottom:max(0px,env(safe-area-inset-bottom));}
body.dark{
  --text:#f6eef3;--sub:#c7b3c2;--line:#352b35;--bg:#120f15;--card:#1a151d;
  --chip:#221b25d9;
}
body.dark #topbar{background:rgba(22,18,24,.88)}
body.dark .tabs{background:#261f27}
body.dark .tabs button.active{background:#1a151d;box-shadow:0 4px 14px rgba(0,0,0,.22)}
body.dark .qa-ans, body.dark .gs-body p, body.dark .note-hint, body.dark .cv-right, body.dark .cv-left .cv-chapter{color:var(--sub)}
body.dark .guide-card, body.dark .qa-card, body.dark .note-ta{background:var(--card);border-color:var(--line)}
body.dark .note-ta{color:var(--text)}
body.dark #bottomnav, body.dark #nav-sheet{background:#171219;border-color:var(--line)}
body.dark .ns-search-wrap{background:#221b25;border-color:var(--line)}
body.dark #nav-pill button{background:#221b25;border-color:var(--line)}
body.dark .tabs button{color:#caa6bb}
body.dark .cv-left .cv-name{color:#ff87bd}
body.dark #ux35-progress-wrap{background:transparent}
body.dark .ux35-dock{background:rgba(26,21,29,.88);border-color:var(--line)}
body.dark .ux35-btn{background:#221b25;color:#f7d3e3;border-color:#3a2d39}
body.dark .ux35-btn:hover{background:#2a2230}
body.dark .ux35-status{color:var(--sub)}

#topbar{padding-top:max(11px,calc(11px + env(safe-area-inset-top)))}
#app{max-width:760px;padding-bottom:170px}
.verse-card,.guide-card,.qa-card,.note-ta,.note-save,.tabs,#nav-pill button{box-shadow:var(--shadow-soft)}
.vc-text,.qa-ans,.gs-body p,.note-ta{hyphens:auto}
#ux35-progress-wrap{
  position:sticky;top:60px;z-index:24;max-width:760px;margin:8px auto 0;padding:0 15px;background:transparent;
}
#ux35-progress-track{
  height:8px;border-radius:999px;background:rgba(229,69,142,.13);overflow:hidden;position:relative;
}
#ux35-progress{
  height:100%;width:0%;background:linear-gradient(90deg,#7b3ef4,#e5458e);border-radius:999px;transition:width .18s ease;
}
#ux35-progress-label{
  margin-top:6px;font-size:.77rem;font-weight:800;color:var(--sub);text-align:right;
}
.ux35-dock{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(74px + env(safe-area-inset-bottom));z-index:29;
  display:flex;gap:8px;align-items:center;padding:8px;border-radius:18px;background:rgba(255,255,255,.78);
  backdrop-filter:blur(16px);border:1px solid var(--line);box-shadow:0 12px 28px rgba(26,18,26,.12);max-width:min(94vw,760px);
}
.ux35-btn{
  border:1px solid #eadde5;background:#fff;color:var(--text);border-radius:14px;padding:10px 12px;
  font:inherit;font-size:.9rem;font-weight:900;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;
}
.ux35-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.2}
.ux35-btn:hover{background:#fbf6f9}
.ux35-status{font-size:.8rem;font-weight:800;color:var(--sub);padding:0 4px;white-space:nowrap}
#ux35-toast{
  position:fixed;left:50%;transform:translateX(-50%);bottom:calc(136px + env(safe-area-inset-bottom));z-index:40;
  background:#201823;color:#fff;padding:10px 14px;border-radius:999px;font-size:.88rem;font-weight:800;
  opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;
}
#ux35-toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
#ux35-note-meta{margin-top:10px;font-size:.82rem;color:var(--sub);text-align:right}
@media (max-width:720px){
  .ux35-dock{gap:6px;padding:7px 7px 7px 7px;width:calc(100vw - 18px);overflow:auto;justify-content:flex-start}
  .ux35-btn{padding:10px 11px;font-size:.86rem}
  .ux35-status{display:none}
}
@media (min-width:900px){
  #app{max-width:820px}
  #ux35-progress-wrap{max-width:820px}
}
@media print{
  #topbar,#bottomnav,#nav-ov,.tabs,.note-save,.ux35-dock,#ux35-toast,#ux35-progress-wrap{display:none !important}
  html,body{background:#fff !important;color:#000 !important}
  #app{max-width:none;padding:0 0 0 0}
  .panel{display:block !important}
  .guide-card,.qa-card,.verse-card,.note-ta{box-shadow:none !important;border:1px solid #ddd !important}
  .verse-card{background:#fff !important;color:#000 !important}
  .vc-ref,.vc-text{color:#000 !important}
}
</style>

<style id="ux38-original-brand-style">
:root{
  --pink:#e5458e;
  --pink2:#f05ca2;
  --text:#1c1820;
  --sub:#7a6a76;
  --line:#ede4ea;
  --bg:#f3f5fa;
  --card:#ffffff;
  --r:24px;
  --shadow-soft:0 12px 28px rgba(229,69,142,.10);
}
html,body{background:radial-gradient(circle at top,#fff7fb 0%,#f6f7fb 36%,#f2f4f9 100%);color:var(--text)}
body.dark{
  --text:#f8eef5;
  --sub:#cab5c3;
  --line:#3b2c37;
  --bg:#141017;
  --card:#1c161d;
  --shadow-soft:0 12px 30px rgba(0,0,0,.28);
  background:radial-gradient(circle at top,#26131f 0%,#17121a 40%,#110f15 100%);
}
#topbar{background:rgba(255,255,255,.93);border-bottom:1px solid rgba(237,228,234,.95);backdrop-filter:blur(18px) saturate(1.08)}
body.dark #topbar{background:rgba(22,17,23,.88);border-bottom:1px solid rgba(59,44,55,.96)}
.tb-mark span{background:linear-gradient(135deg,#7b3ef4,#e5458e) !important}
.tb-name,.tb-brand{color:#c53580 !important}
body.dark .tb-name,body.dark .tb-brand{color:#ff8cc2 !important}
#nav-pill button{
  background:rgba(255,255,255,.9);
  color:var(--pink);
  border:1.5px solid var(--line);
  box-shadow:0 6px 18px rgba(229,69,142,.08);
}
body.dark #nav-pill button{background:#241a23;color:#ff93c7}
.cv-left .cv-name{color:#b04c82}
body.dark .cv-left .cv-name{color:#ff8bc0}
.verse-card{
  background:linear-gradient(160deg,#f05ca2 0%,#de4089 100%);
  border:none;
  box-shadow:0 18px 34px rgba(222,64,137,.24);
  position:relative;overflow:hidden;
}
.verse-card::after{
  content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.16) 42%,transparent 64%);
  transform:translateX(-120%);pointer-events:none;
}
body.ready .verse-card::after{animation:ux38-sheen 1.25s ease .25s 1}
@keyframes ux38-sheen{to{transform:translateX(120%)}}
.vc-ref,.vc-text{color:#fff !important}
.vc-text b{color:#fff !important;opacity:.8}
.tabs{
  background:#ede7eb;
  border:1px solid rgba(237,228,234,.95);
  box-shadow:0 10px 24px rgba(42,24,39,.04);
}
body.dark .tabs{background:#241c24}
.tabs button{color:#9a7287;transition:transform .14s ease, background .18s ease, color .18s ease, box-shadow .18s ease}
.tabs button.active{background:#fff;color:var(--pink);box-shadow:0 6px 16px rgba(0,0,0,.08)}
body.dark .tabs button.active{background:#1d171d;color:#ff8fc3}
.guide-card,.qa-card,.note-ta{
  background:linear-gradient(180deg,#ffffff 0%,#fffafd 100%);
  border:1px solid var(--line);
  box-shadow:0 10px 24px rgba(34,20,31,.05);
}
body.dark .guide-card,body.dark .qa-card,body.dark .note-ta{background:linear-gradient(180deg,#1d171d 0%,#241c24 100%)}
.guide-title{color:var(--pink)}
.gs-num{background:linear-gradient(135deg,var(--pink2),var(--pink))}
.qa-item,.guide-step{border-bottom:1px solid rgba(243,234,240,.98)}
body.dark .qa-item,body.dark .guide-step{border-bottom:1px solid rgba(59,44,55,.95)}
.qa-num{color:var(--pink)}
.qa-q{color:var(--text)}
.qa-ans{color:#2e2532}
body.dark .qa-ans{color:#eadbe5}
.note-save{
  background:linear-gradient(135deg,var(--pink2),var(--pink));
  box-shadow:0 10px 24px rgba(229,69,142,.22);
}
#ux35-progress-track{background:rgba(229,69,142,.14)}
#ux35-progress{background:linear-gradient(90deg,#7b3ef4,#e5458e)}
.ux35-dock{
  background:rgba(255,255,255,.8);
  border:1px solid var(--line);
  box-shadow:0 14px 32px rgba(32,18,28,.10);
}
body.dark .ux35-dock{background:rgba(28,22,29,.9)}
.ux35-btn{
  background:#fff;
  border:1px solid #eadde5;
  color:var(--text);
  transition:transform .12s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease, color .16s ease;
  box-shadow:0 2px 0 rgba(255,255,255,.35) inset;
}
.ux35-btn:hover{background:#fff7fb;border-color:#e8c7da}
.ux35-btn:active,.ux35-btn.pressed{transform:scale(.975);background:#fdeaf3}
body.dark .ux35-btn{background:#251c25;color:#f8eef5;border-color:#403040;box-shadow:none}
body.dark .ux35-btn:hover{background:#2d2230}
body.dark .ux35-btn:active,body.dark .ux35-btn.pressed{background:#38283a}
#bottomnav{background:rgba(255,255,255,.95);border-top:1px solid var(--line);backdrop-filter:blur(18px)}
body.dark #bottomnav{background:rgba(20,16,23,.94)}
#bottomnav button{
  background:#fff;color:var(--pink);border:1px solid #eadde5;
  transition:transform .12s ease, background .16s ease, border-color .16s ease, opacity .16s ease;
}
#bottomnav button:active{transform:scale(.975);background:#fff0f7}
body.dark #bottomnav button{background:#241c24;color:#ff97ca;border-color:#403040}
#nav-sheet{background:linear-gradient(180deg,#fff7fb 0%,#f6f7fb 100%);border-top:1px solid var(--line)}
body.dark #nav-sheet{background:linear-gradient(180deg,#201620 0%,#151117 100%)}
.ns-search-wrap{background:#fff;border:1px solid var(--line)}
body.dark .ns-search-wrap{background:#241c24}
.ns-ch-grid button,.ns-v-grid button{
  background:#fff;border:1px solid var(--line);color:var(--text);
  transition:transform .12s ease, background .16s ease, color .16s ease, border-color .16s ease, box-shadow .16s ease;
}
.ns-ch-grid button:active,.ns-v-grid button:active{transform:scale(.97)}
body.dark .ns-ch-grid button,body.dark .ns-v-grid button{background:#241c24;color:#f8eef5}
.ns-ch-grid button.active,.ns-v-grid button.active{
  background:linear-gradient(135deg,#f05ca2,#e5458e);color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(229,69,142,.18)
}
.ns-v-grid button.has-note::after{background:var(--pink)}
#ux35-toast{background:#201823;color:#fff}
.panel.active{animation:ux38-fade .22s ease}
@keyframes ux38-fade{from{opacity:.0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.verse-card,.guide-card,.qa-card,.note-ta,.tabs,#nav-pill button,#bottomnav button,.ux35-dock,.ux35-btn,.ns-ch-grid button,.ns-v-grid button,.note-save{will-change:transform}
button:focus-visible,textarea:focus-visible,input:focus-visible{
  outline:none;box-shadow:0 0 0 3px rgba(240,92,162,.18), 0 0 0 1px rgba(229,69,142,.42) inset;
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important;scroll-behavior:auto !important}
}
</style>


<style id="ux39-finish-style">
html{scroll-padding-top:132px}
#app{padding-bottom:182px}
.cv-row,.verse-card,.tabs,.panel.active,.ux35-dock,#bottomnav{max-width:100%}
.cv-right,.qa-ans-label,#ux35-progress-label,#ux35-note-meta,#ux36-note-tip{letter-spacing:.02em}
.cv-right,.qa-ans-label,#ux35-progress-label{color:#6f616b}
body.dark .cv-right,body.dark .qa-ans-label,body.dark #ux35-progress-label,body.dark #ux35-note-meta,body.dark #ux36-note-tip{color:#d2bdca}
.guide-card,.qa-card{overflow:hidden}
.qa-item:last-child,.guide-step:last-child{padding-bottom:16px}
.note-ta::placeholder{color:#9c8794}
body.dark .note-ta::placeholder{color:#b79eae}
.note-save{min-height:52px;font-weight:900;letter-spacing:.01em}
#bottomnav{box-shadow:0 -8px 30px rgba(27,18,25,.08)}
body.dark #bottomnav{box-shadow:0 -8px 30px rgba(0,0,0,.28)}
#bottomnav button[disabled]{opacity:.38 !important;pointer-events:none;filter:saturate(.75)}
#bottomnav button{min-width:0}
#bn-prev,#bn-next{display:flex;align-items:center;justify-content:center;gap:8px}
.tabs button,.ux35-btn,#bottomnav button,.note-save,.ns-ch-grid button,.ns-v-grid button{-webkit-user-select:none;user-select:none}
.ns-search-wrap input::-webkit-search-cancel-button{-webkit-appearance:none;appearance:none}
.ns-scroll{padding-bottom:18px}
.ns-v-grid button,.ns-ch-grid button{font-weight:800}
.ns-v-grid button{aspect-ratio:1.08/1}
#ux35-toast{box-shadow:0 12px 26px rgba(20,12,19,.22)}
.ux35-dock{gap:7px}
.ux35-btn{min-width:0}
.ux35-status{font-weight:900}
@media (max-width:420px){
  .verse-card{padding:18px 15px 17px}
  .guide-step,.qa-item{padding:14px 13px}
  .ux35-dock{padding:6px}
}
@media (prefers-reduced-motion:reduce){
  .panel.active,.verse-card::after{animation:none !important}
}
</style>

<style id="ux44-design">
/* === LIGHT MODE === */
html,body{background:linear-gradient(180deg,#f8f9fc 0%,#f0f2f7 100%)}
#topbar{background:rgba(255,255,255,0.97);border-bottom:1px solid #e2e4ea}
.verse-card{background:linear-gradient(160deg,#c73d7a 0%,#a82d64 100%);box-shadow:0 12px 28px rgba(167,45,100,0.22);border-radius:16px}
.guide-card,.qa-card{background:#ffffff;box-shadow:0 2px 12px rgba(0,0,0,0.07);border:1px solid #ebebf0;border-radius:16px}
.tabs{background:#e9eaf0;border-radius:14px}
.tabs button{font-weight:700;border-radius:12px}
.tabs button.active{background:#ffffff;box-shadow:0 1px 6px rgba(0,0,0,0.10)}
#bottomnav{background:rgba(255,255,255,0.98);border-top:1px solid #e2e4ea}
#bottomnav button{border:none;box-shadow:none}
.ns-section-label,.qa-ans-label{font-weight:700}
.ns-ch-grid button,.ns-v-grid button{border-radius:12px}
.ns-back-btn{display:flex;align-items:center;gap:5px;border:none;background:none;font:inherit;font-size:.92rem;font-weight:700;color:var(--pink);cursor:pointer;padding:4px 0 14px}
.ns-back-btn:hover{opacity:.75}
.ns-back-btn:focus-visible{outline:2px solid var(--pink);outline-offset:3px;border-radius:4px}

/* === DARK MODE === */
body.dark{background:#0d0f14;--bg:#0d0f14;--card:#161a22;--line:#252b38;--text:#e8ecf4;--sub:#8892a4;--pink:#b06ec8}
body.dark #topbar{background:rgba(13,15,20,0.93)}
body.dark .verse-card{background:linear-gradient(160deg,#1e1030 0%,#2a1040 100%);box-shadow:0 12px 28px rgba(0,0,0,0.38)}
body.dark .guide-card,body.dark .qa-card{background:#161a22;border:1px solid #252b38}
body.dark .tabs{background:#161a22}
body.dark .tabs button.active{background:#1e2332}
body.dark #bottomnav{background:rgba(13,15,20,0.96)}

/* === GENERAL === */
.verse-card::after{content:none}
body.ready .verse-card::after{animation:none !important}
.verse-card,.guide-card,.qa-card,.note-ta,.tabs,#nav-pill button,#bottomnav button,.ux35-dock,.ux35-btn,.ns-ch-grid button,.ns-v-grid button,.note-save{will-change:auto}
</style>

</head>
