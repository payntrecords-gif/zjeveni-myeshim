<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MYEShim – Admin</title>
  <style>
    :root{--bg:#f7f1e3;--card:#fbf4e7;--line:#e6d7ba;--text:#3f2f1e;--sub:#7a6542;--accent:#c79b3b;--accent-2:#ddb86a;--ok:#658348;--error:#a35746;--shadow:0 14px 30px rgba(118,90,40,.12)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at top,#fff8ea 0%,#f7efdf 42%,#f2e8d3 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
    h1,h2{color:var(--text)}
    p{color:var(--sub)}
    input,textarea{width:100%;margin-bottom:12px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#fffaf0;color:var(--text);font:inherit}
    input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(199,155,59,.22)}
    button,.btn{padding:12px 14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#2f2214;font-weight:700;cursor:pointer;box-shadow:0 8px 18px rgba(139,104,43,.2)}
    button:hover,.btn:hover{filter:brightness(1.02)}
    button:active,.btn:active{transform:translateY(1px)}
    button:disabled,.btn:disabled{opacity:.6;cursor:not-allowed}
    a,.link{color:#9a772f}
    .error{color:var(--error)}
    .success,.status.ok{color:var(--ok)}
    .status.error{color:var(--error)}
    .wrap{max-width:960px;margin:0 auto}
    .card{padding:18px;margin-bottom:16px}
    .notice{margin-top:10px;font-size:.85rem;color:var(--sub);border-top:1px solid var(--line);padding-top:10px}
    .list{display:grid;gap:12px}
    .item{border:1px solid var(--line);border-radius:12px;padding:14px;background:#fff8ee}
    .head{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:flex-start}
    .meta{display:grid;gap:4px}
    .muted{color:var(--sub)}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .btn-red{background:linear-gradient(135deg,#d7be84,#c6a15b);color:#2f2214}
    .btn-gold{background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#2f2214}

  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Admin panel</h1>
      <p>Ruční schvalování registrací přes Firebase Auth a Firestore.</p>
      <p class="notice">⚠️ Pozn.: Smazání v admin panelu maže přístup a Firestore data, ale <strong>nemaže Firebase Authentication účet</strong>.</p>
      <div class="status" id="status"></div>
    </div>

    <div class="card">
      <h2>Čekající žádosti</h2>
      <div id="pending-list" class="list muted">Načítám…</div>
    </div>

    <div class="card">
      <h2>Schválení uživatelé</h2>
      <div id="approved-list" class="list muted">Načítám…</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, getDoc, collection, query, where, onSnapshot, setDoc, deleteDoc, writeBatch, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { initializeAppCheck, ReCaptchaV3Provider } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDNxmsMfxs0RZJLOViRn85P1t3SxuDOoRc",
      authDomain: "myeshim-app.firebaseapp.com",
      projectId: "myeshim-app",
      storageBucket: "myeshim-app.firebasestorage.app",
      messagingSenderId: "360259005980",
      appId: "1:360259005980:web:610695f8b44de04dc079d9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
    try {
      initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider('6Lfa1-gsAAAAAKGTlACah7A8mN1HGQUH1T1XbCKt'),
        isTokenAutoRefreshEnabled: true
      });
    } catch (error) {
      console.warn('App Check init skipped:', error && error.message ? error.message : error);
    }
    const auth = getAuth(app);
    const db = getFirestore(app);
    const pendingList = document.getElementById('pending-list');
    const approvedList = document.getElementById('approved-list');
    const statusEl = document.getElementById('status');

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(value) {
      if (!value) return 'neuvedeno';
      if (typeof value?.toDate === 'function') return value.toDate().toLocaleString('cs-CZ');
      if (typeof value === 'string') return value;
      return 'neuvedeno';
    }

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = `status ${text ? (isError ? 'error' : 'ok') : ''}`.trim();
    }

    async function approveUser(userData) {
      const uid = userData.uid;
      console.log('Admin: approving user uid:', uid, 'email:', userData.email || '');
      await setDoc(doc(db, 'approvedUsers', uid), {
        uid,
        name: userData.name || '',
        email: userData.email || '',
        poslani: userData.poslani || '',
        status: 'approved',
        approvedAt: serverTimestamp()
      });
      await setDoc(doc(db, 'pendingUsers', uid), { status: 'approved' }, { merge: true });
      setStatus(`Uživatel ${userData.email || uid} byl schválen.`);
    }

    async function rejectUser(userData) {
      console.log('Admin: rejecting user uid:', userData.uid, 'email:', userData.email || '');
      await setDoc(doc(db, 'pendingUsers', userData.uid), { status: 'rejected' }, { merge: true });
      setStatus(`Uživatel ${userData.email || userData.uid} byl zamítnut.`);
    }

    async function deletePendingRequest(uid, email) {
      if (!confirm(`Opravdu smazat žádost uživatele ${email || uid}?\nTato akce je nevratná.`)) return;
      await deleteDoc(doc(db, 'pendingUsers', uid));
      setStatus(`Žádost uživatele ${email || uid} byla smazána.`);
    }

    async function revokeAccess(userData) {
      const uid = userData.uid;
      const email = userData.email || uid;
      if (!confirm(`Opravdu odebrat přístup uživateli ${email}?\nDokument approvedUsers bude smazán. Pokud existuje žádost, její stav bude nastaven na 'revoked'.`)) return;
      console.log('Admin: revoking access for uid:', uid, 'email:', email);
      await deleteDoc(doc(db, 'approvedUsers', uid));
      const pendingSnap = await getDoc(doc(db, 'pendingUsers', uid));
      if (pendingSnap.exists()) {
        await setDoc(doc(db, 'pendingUsers', uid), { status: 'revoked' }, { merge: true });
      }
      setStatus(`Přístup uživatele ${email} byl odebrán.`);
    }

    async function deleteApproval(uid, email) {
      if (!confirm(`Opravdu smazat schválení uživatele ${email || uid}?\nBude smazán pouze dokument approvedUsers.`)) return;
      await deleteDoc(doc(db, 'approvedUsers', uid));
      setStatus(`Schválení uživatele ${email || uid} bylo smazáno.`);
    }

    async function deleteUserFromDB(uid, email) {
      if (!confirm(`Opravdu smazat uživatele ${email || uid} kompletně z databáze?\nBudou smazány záznamy approvedUsers, pendingUsers a users (pokud existují). Tato akce je nevratná.`)) return;
      const batch = writeBatch(db);
      batch.delete(doc(db, 'approvedUsers', uid));
      batch.delete(doc(db, 'pendingUsers', uid));
      batch.delete(doc(db, 'users', uid));
      await batch.commit();
      setStatus(`Uživatel ${email || uid} byl smazán z databáze.`);
    }

    function renderPending(items) {
      if (!items.length) {
        pendingList.textContent = 'Žádné čekající žádosti.';
        pendingList.className = 'list muted';
        return;
      }

      pendingList.className = 'list';
      pendingList.innerHTML = '';

      items.forEach((item) => {
        const safeName = escapeHtml(item.name || 'Bez jména');
        const safeEmail = escapeHtml(item.email || '');
        const safePoslani = escapeHtml(item.poslani || 'neuvedeno');
        const safeCreatedAt = escapeHtml(formatDate(item.createdAt));
        const el = document.createElement('div');
        el.className = 'item';
        el.innerHTML = `
          <div class="head">
            <div class="meta">
              <strong>${safeName}</strong>
              <div class="muted">${safeEmail}</div>
              <div class="muted">Poslání: ${safePoslani}</div>
              <div class="muted">Registrován: ${safeCreatedAt}</div>
            </div>
          </div>
        `;

        const actions = document.createElement('div');
        actions.className = 'row';

        const approveBtn = document.createElement('button');
        approveBtn.type = 'button';
        approveBtn.className = 'btn btn-gold';
        approveBtn.textContent = 'Schválit';
        approveBtn.addEventListener('click', async () => {
          approveBtn.disabled = true;
          rejectBtn.disabled = true;
          try {
            await approveUser(item);
          } catch (error) {
            console.error('Approve user failed:', error);
            setStatus('Schválení se nezdařilo. Zkus to znovu.', true);
            approveBtn.disabled = false;
            rejectBtn.disabled = false;
          }
        });

        const rejectBtn = document.createElement('button');
        rejectBtn.type = 'button';
        rejectBtn.className = 'btn btn-red';
        rejectBtn.textContent = 'Zamítnout';
        rejectBtn.addEventListener('click', async () => {
          approveBtn.disabled = true;
          rejectBtn.disabled = true;
          try {
            await rejectUser(item);
          } catch (error) {
            console.error('Reject user failed:', error);
            setStatus('Zamítnutí se nezdařilo. Zkus to znovu.', true);
            approveBtn.disabled = false;
            rejectBtn.disabled = false;
          }
        });

        const deleteRequestBtn = document.createElement('button');
        deleteRequestBtn.type = 'button';
        deleteRequestBtn.className = 'btn btn-red';
        deleteRequestBtn.textContent = 'Smazat žádost';
        deleteRequestBtn.addEventListener('click', async () => {
          deleteRequestBtn.disabled = true;
          try {
            await deletePendingRequest(item.uid, item.email);
          } catch (error) {
            console.error('Delete pending request failed:', error);
            setStatus('Smazání žádosti se nezdařilo. Zkus to znovu.', true);
            deleteRequestBtn.disabled = false;
          }
        });

        actions.append(approveBtn, rejectBtn, deleteRequestBtn);
        el.appendChild(actions);
        pendingList.appendChild(el);
      });
    }

    function renderApproved(items) {
      if (!items.length) {
        approvedList.textContent = 'Zatím nejsou žádní schválení uživatelé.';
        approvedList.className = 'list muted';
        return;
      }

      approvedList.className = 'list';
      approvedList.innerHTML = '';
      items.forEach((item) => {
        const safeName = escapeHtml(item.name || 'Bez jména');
        const safeEmail = escapeHtml(item.email || '');
        const safePoslani = escapeHtml(item.poslani || 'neuvedeno');
        const safeApprovedAt = escapeHtml(formatDate(item.approvedAt));
        const el = document.createElement('div');
        el.className = 'item';
        el.innerHTML = `
          <div class="meta">
            <strong>${safeName}</strong>
            <div class="muted">${safeEmail}</div>
            <div class="muted">Poslání: ${safePoslani}</div>
            <div class="muted">Schváleno: ${safeApprovedAt}</div>
          </div>
        `;

        const actions = document.createElement('div');
        actions.className = 'row';

        const revokeBtn = document.createElement('button');
        revokeBtn.type = 'button';
        revokeBtn.className = 'btn btn-red';
        revokeBtn.textContent = 'Odebrat přístup';
        revokeBtn.addEventListener('click', async () => {
          revokeBtn.disabled = true;
          try {
            await revokeAccess(item);
          } catch (error) {
            console.error('Revoke access failed:', error);
            setStatus('Odebrání přístupu se nezdařilo. Zkus to znovu.', true);
            revokeBtn.disabled = false;
          }
        });

        const deleteApprovalBtn = document.createElement('button');
        deleteApprovalBtn.type = 'button';
        deleteApprovalBtn.className = 'btn btn-red';
        deleteApprovalBtn.textContent = 'Smazat schválení';
        deleteApprovalBtn.addEventListener('click', async () => {
          deleteApprovalBtn.disabled = true;
          try {
            await deleteApproval(item.uid, item.email);
          } catch (error) {
            console.error('Delete approval failed:', error);
            setStatus('Smazání schválení se nezdařilo. Zkus to znovu.', true);
            deleteApprovalBtn.disabled = false;
          }
        });

        const deleteUserBtn = document.createElement('button');
        deleteUserBtn.type = 'button';
        deleteUserBtn.className = 'btn btn-red';
        deleteUserBtn.textContent = 'Smazat uživatele z databáze';
        deleteUserBtn.addEventListener('click', async () => {
          deleteUserBtn.disabled = true;
          try {
            await deleteUserFromDB(item.uid, item.email);
          } catch (error) {
            console.error('Delete user from DB failed:', error);
            setStatus('Smazání uživatele se nezdařilo. Zkus to znovu.', true);
            deleteUserBtn.disabled = false;
          }
        });

        actions.append(revokeBtn, deleteApprovalBtn, deleteUserBtn);
        el.appendChild(actions);
        approvedList.appendChild(el);
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.replace('./admin-login.html');
        return;
      }

      try {
        const adminSnap = await getDoc(doc(db, 'admins', user.uid));
        if (!adminSnap.exists()) {
          window.location.replace('./index.html');
          return;
        }
      } catch (error) {
        console.error('Admin check failed:', error);
        window.location.replace('./admin-login.html');
        return;
      }

      onSnapshot(query(collection(db, 'pendingUsers'), where('status', '==', 'pending')), (snap) => {
        renderPending(snap.docs.map((entry) => ({ uid: entry.id, ...entry.data() })));
      }, (error) => {
        console.error('Load pending users failed:', error);
        setStatus('Nepodařilo se načíst čekající žádosti.', true);
      });

      onSnapshot(query(collection(db, 'approvedUsers'), where('status', '==', 'approved')), (snap) => {
        renderApproved(snap.docs.map((entry) => ({ uid: entry.id, ...entry.data() })));
      }, (error) => {
        console.error('Load approved users failed:', error);
        setStatus('Nepodařilo se načíst schválené uživatele.', true);
      });
    });
  </script>
</body>
</html>
