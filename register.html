<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MYEShim – Registrace</title>
  <style>
    :root{--bg:#f7f1e3;--card:#fbf4e7;--line:#e6d7ba;--text:#3f2f1e;--sub:#7a6542;--accent:#c79b3b;--accent-2:#ddb86a;--ok:#658348;--error:#a35746;--shadow:0 14px 30px rgba(118,90,40,.12)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at top,#fff8ea 0%,#f7efdf 42%,#f2e8d3 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
    h1,h2{color:var(--text)}
    p{color:var(--sub)}
    input,textarea{width:100%;margin-bottom:12px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#fffaf0;color:var(--text);font:inherit}
    input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(199,155,59,.22)}
    button,.btn{padding:12px 14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#2f2214;font-weight:700;cursor:pointer;box-shadow:0 8px 18px rgba(139,104,43,.2)}
    button:hover,.btn:hover{filter:brightness(1.02)}
    button:active,.btn:active{transform:translateY(1px)}
    button:disabled,.btn:disabled{opacity:.6;cursor:not-allowed}
    a,.link{color:#9a772f}
    .error{color:var(--error)}
    .success,.status.ok{color:var(--ok)}
    .status.error{color:var(--error)}
  </style>
</head>
<body>
  <form class="card" id="register-form">
    <h1>Registrace</h1>
    <p>Vyplň své údaje. Po registraci se žádost uloží ke schválení administrátorem.</p>
    <div class="error" id="error"></div>
    <label for="name">Celé jméno</label>
    <input id="name" type="text" required autocomplete="name">
    <label for="email">E-mail</label>
    <input id="email" type="email" required autocomplete="email">
    <label for="password">Heslo</label>
    <input id="password" type="password" required minlength="8" placeholder="Minimálně 8 znaků" autocomplete="new-password">
    <label for="poslani">Poslání</label>
    <textarea id="poslani" required placeholder="např. mládež, domácí skupina, starší..."></textarea>
    <button id="submit-btn" type="submit">Vytvořit účet</button>
    <a class="link" href="./login.html">Už máš účet? Přihlas se</a>
  </form>

  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, deleteUser, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { initializeAppCheck, ReCaptchaV3Provider } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js';

    const FIREBASE_AUTH_CONFIG = {
      apiKey: "AIzaSyDNxmsMfxs0RZJLOViRn85P1t3SxuDOoRc",
      authDomain: "myeshim-app.firebaseapp.com",
      projectId: "myeshim-app",
      storageBucket: "myeshim-app.firebasestorage.app",
      messagingSenderId: "360259005980",
      appId: "1:360259005980:web:610695f8b44de04dc079d9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_AUTH_CONFIG);
    try {
      initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider('6Lfa1-gsAAAAAKGTlACah7A8mN1HGQUH1T1XbCKt'),
        isTokenAutoRefreshEnabled: true
      });
    } catch (error) {
      console.warn('App Check init skipped:', error && error.message ? error.message : error);
    }
    const auth = getAuth(app);
    const db = getFirestore(app);
    const form = document.getElementById('register-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');

    function getRegisterErrorMessage(error) {
      switch (error?.code) {
        case 'auth/email-already-in-use':
          return 'Účet s tímto e-mailem už existuje. Zkus se přihlásit.';
        case 'auth/invalid-email':
          return 'Zadaný e-mail nemá platný formát.';
        case 'auth/weak-password':
          return 'Heslo je příliš slabé. Zvol delší a bezpečnější heslo.';
        default:
          return 'Registrace se nezdařila. Zkontroluj údaje a zkus to znovu.';
      }
    }

    let isSubmitting = false;
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (isSubmitting) return;
      isSubmitting = true;
      errorEl.textContent = '';
      submitBtn.disabled = true;

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const poslani = document.getElementById('poslani').value.trim();

      try {
        const credential = await createUserWithEmailAndPassword(auth, email, password);
        try {
          await setDoc(doc(db, 'pendingUsers', credential.user.uid), {
            uid: credential.user.uid,
            name,
            email,
            poslani,
            status: 'pending',
            createdAt: serverTimestamp()
          });
        } catch (firestoreError) {
          await deleteUser(credential.user).catch((cleanupError) => {
            console.error('Failed to delete newly created account after Firestore error:', { uid: credential.user.uid, email, cleanupError });
          });
          throw firestoreError;
        }

        await signOut(auth).catch((signOutError) => {
          console.warn('Registration saved but automatic sign-out failed:', { uid: credential.user.uid, email, signOutError });
        });
        window.location.replace('./waiting.html');
      } catch (error) {
        errorEl.textContent = getRegisterErrorMessage(error);
      } finally {
        submitBtn.disabled = false;
        isSubmitting = false;
      }
    });
  </script>
</body>
</html>
