<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MYEShim – Registrace</title>
  <style>
    :root{--bg:#120f15;--card:#1d1723;--line:#3b3044;--text:#f7f1ff;--sub:#b9a9c6;--accent:#d4af37}
    *{box-sizing:border-box} body{margin:0;min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at top,#2a1f31,var(--bg));font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding:20px}
    .card{width:min(460px,100%);background:rgba(29,23,35,.92);border:1px solid var(--line);border-radius:18px;padding:24px}
    h1{margin:0 0 8px;font-size:1.4rem} p{margin:0 0 18px;color:var(--sub)}
    label{display:block;font-size:.92rem;margin-bottom:6px}
    input,textarea{width:100%;margin-bottom:12px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#120f15;color:var(--text);font:inherit}
    textarea{min-height:96px;resize:vertical}
    button{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#e3c76a,var(--accent));color:#1a1210;font-weight:700;cursor:pointer}
    button[disabled]{opacity:.65;cursor:wait}
    .link{display:block;margin-top:14px;color:#f2dc98;text-align:center;text-decoration:none}
    .error{min-height:20px;color:#ff8d8d;font-size:.9rem;margin-bottom:10px}
  </style>
</head>
<body>
  <form class="card" id="register-form">
    <h1>Registrace</h1>
    <p>Vyplň jméno, e-mail a poslání. Po odeslání žádosti počkej na schválení adminem.</p>
    <div class="error" id="error"></div>
    <label for="name">Celé jméno</label>
    <input id="name" type="text" required autocomplete="name">
    <label for="email">E-mail</label>
    <input id="email" type="email" required autocomplete="email">
    <label for="password">Heslo</label>
    <input id="password" type="password" required minlength="6" placeholder="Minimálně 6 znaků" autocomplete="new-password">
    <label for="poslani">Poslání</label>
    <textarea id="poslani" required placeholder="např. mládež, domácí skupina, starší..."></textarea>
    <button id="submit-btn" type="submit">Odeslat žádost</button>
    <a class="link" href="./login.html">Už máš účet? Přihlas se</a>
  </form>

  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { createPasswordRecord } from './password-utils.js';

    const FIREBASE_AUTH_CONFIG = {
      apiKey: "AIzaSyDNxmsMfxs0RZJLOViRn85P1t3SxuDOoRc",
      authDomain: "myeshim-app.firebaseapp.com",
      projectId: "myeshim-app",
      storageBucket: "myeshim-app.firebasestorage.app",
      messagingSenderId: "360259005980",
      appId: "1:360259005980:web:610695f8b44de04dc079d9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_AUTH_CONFIG);
    const db = getFirestore(app);
    const form = document.getElementById('register-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorEl.textContent = '';
      submitBtn.disabled = true;

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const poslani = document.getElementById('poslani').value.trim();

      try {
        const pendingRef = doc(db, 'pendingUsers', email);
        const pendingSnap = await getDoc(pendingRef);
        if (pendingSnap.exists()) {
          errorEl.textContent = 'Tento e-mail je již zaregistrován.';
          submitBtn.disabled = false;
          return;
        }

        const { passwordHash, passwordSalt } = await createPasswordRecord(password);
        await setDoc(pendingRef, {
          name,
          email,
          poslani,
          passwordHash,
          passwordSalt,
          createdAt: serverTimestamp(),
          status: 'pending'
        });
        window.location.replace('./waiting.html');
      } catch (error) {
        errorEl.textContent = 'Registrace se nezdařila. Zkontrolujte údaje a zkuste to znovu.';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
