<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MYEShim – Přihlášení</title>
  <style>
    :root{--bg:#120f15;--card:#1d1723;--line:#3b3044;--text:#f7f1ff;--sub:#b9a9c6;--accent:#d4af37}
    *{box-sizing:border-box} body{margin:0;min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at top,#2a1f31,var(--bg));font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding:20px}
    .card{width:min(420px,100%);background:rgba(29,23,35,.92);border:1px solid var(--line);border-radius:18px;padding:24px}
    h1{margin:0 0 8px;font-size:1.4rem} p{margin:0 0 18px;color:var(--sub);line-height:1.6}
    label{display:block;font-size:.92rem;margin-bottom:6px}
    input{width:100%;margin-bottom:12px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#120f15;color:var(--text);font:inherit}
    button{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#e3c76a,var(--accent));color:#1a1210;font-weight:700;cursor:pointer}
    button[disabled]{opacity:.65;cursor:wait}
    .link{display:block;margin-top:14px;color:#f2dc98;text-align:center;text-decoration:none}
    .link-small{display:block;margin-top:10px;color:var(--sub);text-align:center;text-decoration:none;font-size:.85rem}
    .error{min-height:20px;color:#ff8d8d;font-size:.9rem;margin-bottom:10px}
  </style>
</head>
<body>
  <form class="card" id="login-form">
    <h1>Přihlášení</h1>
    <p>Přihlas se svým e-mailem a heslem. Po schválení administrátorem tě aplikace pustí dál.</p>
    <div class="error" id="error"></div>
    <label for="email">E-mail</label>
    <input id="email" type="email" required autocomplete="email">
    <label for="password">Heslo</label>
    <input id="password" type="password" required minlength="8" placeholder="Tvé heslo" autocomplete="current-password">
    <button id="submit-btn" type="submit">Přihlásit se</button>
    <a class="link" href="./register.html">Ještě nemáš účet? Zaregistruj se</a>
    <a class="link-small" href="./forgot-password.html">Zapomněl(a) jsem heslo</a>
  </form>

  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { initializeAppCheck, ReCaptchaV3Provider } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDNxmsMfxs0RZJLOViRn85P1t3SxuDOoRc",
      authDomain: "myeshim-app.firebaseapp.com",
      projectId: "myeshim-app",
      storageBucket: "myeshim-app.firebasestorage.app",
      messagingSenderId: "360259005980",
      appId: "1:360259005980:web:610695f8b44de04dc079d9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
    try {
      initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider('6Lfa1-gsAAAAAKGTlACah7A8mN1HGQUH1T1XbCKt'),
        isTokenAutoRefreshEnabled: true
      });
    } catch (error) {
      console.warn('App Check init skipped:', error && error.message ? error.message : error);
    }
    const auth = getAuth(app);
    const db = getFirestore(app);
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');

    // If a user session is already active and approved, redirect straight to the app.
    let authStateResolved = false;
    const unsubscribeAuth = onAuthStateChanged(auth, async (user) => {
      if (authStateResolved) return;
      if (user) {
        try {
          const approvedSnap = await getDoc(doc(db, 'approvedUsers', user.uid));
          const isApproved = approvedSnap.exists() && approvedSnap.data()?.status === 'approved';
          if (isApproved) {
            authStateResolved = true;
            unsubscribeAuth();
            redirectApprovedUser();
            return;
          }
        } catch (e) {
          // Ignore; let the user log in normally.
        }
      }
      authStateResolved = true;
      unsubscribeAuth();
    });

    function getLoginErrorMessage(error) {
      switch (error?.code) {
        case 'auth/invalid-credential':
        case 'auth/user-not-found':
        case 'auth/wrong-password':
          return 'Neplatný e-mail nebo heslo.';
        case 'auth/invalid-email':
          return 'Zadaný e-mail nemá platný formát.';
        case 'auth/user-disabled':
          return 'Tento účet byl zablokován. Kontaktuj administrátora.';
        case 'auth/too-many-requests':
          return 'Příliš mnoho pokusů. Zkus to prosím znovu za chvíli.';
        case 'auth/network-request-failed':
          return 'Nepodařilo se připojit k serveru. Zkontroluj internetové připojení.';
        case 'auth/operation-not-allowed':
          return 'Přihlášení e-mailem není povoleno. Kontaktuj administrátora.';
        default:
          return 'Přihlášení se nezdařilo. Zkus to prosím znovu.';
      }
    }

    function redirectApprovedUser() {
var isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.matchMedia('(display-mode: minimal-ui)').matches ||
      window.navigator.standalone === true ||
      document.referrer.startsWith('android-app://');

    if (isStandalone) {
      // Launched from home screen — go straight to app
      window.location.replace('./index.html');
      return;
    }

    // In browser — check if user has already seen install guide
    var installSeen = false;
    try { installSeen = localStorage.getItem('myeshim-install-seen') === '1'; } catch(e) {}

   if (isStandalone) {
  window.location.replace('./index.html');
  return;
}

window.location.replace('./install.html');
    }
  }
);
  </script>
</body>
</html>
