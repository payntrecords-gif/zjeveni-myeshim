<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MyeShim – Přihlášení</title>

    <meta name="theme-color" content="#f4ead8">
  <link rel="stylesheet" href="./styles/brand.css">

</head>

<body class="centered-page">

  <form class="card" id="login-form">
    <div class="brand-logo-block">
      <img class="brand-logo" src="./logomyeshim.png" alt="MyeShim logo" width="600" height="230" loading="lazy">
    </div>
    <h1>Přihlášení</h1>
    <p>Přihlas se e-mailem a heslem. Přístup je možný až po schválení administrátorem.</p>

    <div class="error" id="error"></div>

    <input id="email" type="email" placeholder="E-mail" required>
    <input id="password" type="password" placeholder="Heslo" required minlength="6">

    <button id="submit-btn" type="submit">Přihlásit se</button>

    <a href="./register.html">Nemáš účet? Registrace</a>
  </form>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNxmsMfxs0RZJLOViRn85P1t3SxuDOoRc",
      authDomain: "myeshim-app.firebaseapp.com",
      projectId: "myeshim-app",
      storageBucket: "myeshim-app.firebasestorage.app",
      messagingSenderId: "360259005980",
      appId: "1:360259005980:web:610695f8b44de04dc079d9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("error");
    const btn = document.getElementById("submit-btn");
    const INSTALL_ONBOARDING_KEY = "myeshim-install-onboarding-complete";

    function isStandaloneMode() {
      return (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
             navigator.standalone === true ||
             (document.referrer || "").startsWith("android-app://");
    }

    function isMobileDevice() {
      return /android|iphone|ipad|ipod/i.test(navigator.userAgent || "");
    }

    function hasCompletedInstallOnboarding() {
      if (isStandaloneMode()) return true;
      try {
        if (localStorage.getItem(INSTALL_ONBOARDING_KEY) === "1") return true;
        const legacyCompleted =
          localStorage.getItem("myeshim-install-seen") === "1" ||
          localStorage.getItem("myeshim-install-completed") === "1";
        if (legacyCompleted) {
          localStorage.setItem(INSTALL_ONBOARDING_KEY, "1");
        }
        return legacyCompleted;
      } catch (error) {
        return false;
      }
    }

    function redirect() {
      const target = isMobileDevice() && !hasCompletedInstallOnboarding()
        ? "./index.html#install"
        : "./index.html";
      window.location.replace(target);
    }

    function errorMessage(code) {
      switch(code){
        case "auth/invalid-email":
          return "Neplatný e-mail.";
        case "auth/wrong-password":
        case "auth/user-not-found":
          return "Špatný e-mail nebo heslo.";
        default:
          return "Chyba při přihlášení.";
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      const snap = await getDoc(doc(db, "approvedUsers", user.uid));
      const approved = snap.exists() && snap.data().status === "approved";

      if (approved) redirect();
      else await signOut(auth);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorEl.textContent = "";
      btn.disabled = true;

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const result = await signInWithEmailAndPassword(auth, email, password);

        const snap = await getDoc(doc(db, "approvedUsers", result.user.uid));
        const approved = snap.exists() && snap.data().status === "approved";

        if (!approved) {
          await signOut(auth);
          errorEl.textContent = "Účet ještě není schválen.";
          btn.disabled = false;
          return;
        }

        redirect();

      } catch (err) {
        errorEl.textContent = errorMessage(err.code);
        btn.disabled = false;
      }
    });

  </script>

</body>
</html>
