<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MYEShim – Přihlášení</title>

  <style>
    :root{--bg:#f7f1e3;--card:#fbf4e7;--line:#e6d7ba;--text:#3f2f1e;--sub:#7a6542;--accent:#c79b3b;--accent-2:#ddb86a;--ok:#658348;--error:#a35746;--shadow:0 14px 30px rgba(118,90,40,.12)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at top,#fff8ea 0%,#f7efdf 42%,#f2e8d3 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
    h1,h2{color:var(--text)}
    p{color:var(--sub)}
    input,textarea{width:100%;margin-bottom:12px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#fffaf0;color:var(--text);font:inherit}
    input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(199,155,59,.22)}
    button,.btn{padding:12px 14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#2f2214;font-weight:700;cursor:pointer;box-shadow:0 8px 18px rgba(139,104,43,.2)}
    button:hover,.btn:hover{filter:brightness(1.02)}
    button:active,.btn:active{transform:translateY(1px)}
    button:disabled,.btn:disabled{opacity:.6;cursor:not-allowed}
    a,.link{color:#9a772f}
    .error{color:var(--error)}
    .success,.status.ok{color:var(--ok)}
    .status.error{color:var(--error)}
  </style>
</head>

<body>

  <form class="card" id="login-form">
    <h1>Přihlášení</h1>
    <p>Přihlas se e-mailem a heslem. Přístup je možný až po schválení administrátorem.</p>

    <div class="error" id="error"></div>

    <input id="email" type="email" placeholder="E-mail" required>
    <input id="password" type="password" placeholder="Heslo" required minlength="6">

    <button id="submit-btn" type="submit">Přihlásit se</button>

    <a href="./register.html">Nemáš účet? Registrace</a>
  </form>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNxmsMfxs0RZJLOViRn85P1t3SxuDOoRc",
      authDomain: "myeshim-app.firebaseapp.com",
      projectId: "myeshim-app",
      storageBucket: "myeshim-app.firebasestorage.app",
      messagingSenderId: "360259005980",
      appId: "1:360259005980:web:610695f8b44de04dc079d9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("error");
    const btn = document.getElementById("submit-btn");

    function redirect() {
      const isStandalone =
        window.matchMedia('(display-mode: standalone)').matches ||
        window.navigator.standalone;

      window.location.replace(isStandalone ? "./index.html" : "./install.html");
    }

    function errorMessage(code) {
      switch(code){
        case "auth/invalid-email":
          return "Neplatný e-mail.";
        case "auth/wrong-password":
        case "auth/user-not-found":
          return "Špatný e-mail nebo heslo.";
        default:
          return "Chyba při přihlášení.";
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      const snap = await getDoc(doc(db, "approvedUsers", user.uid));
      const approved = snap.exists() && snap.data().status === "approved";

      if (approved) redirect();
      else await signOut(auth);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorEl.textContent = "";
      btn.disabled = true;

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const result = await signInWithEmailAndPassword(auth, email, password);

        const snap = await getDoc(doc(db, "approvedUsers", result.user.uid));
        const approved = snap.exists() && snap.data().status === "approved";

        if (!approved) {
          await signOut(auth);
          errorEl.textContent = "Účet ještě není schválen.";
          btn.disabled = false;
          return;
        }

        redirect();

      } catch (err) {
        errorEl.textContent = errorMessage(err.code);
        btn.disabled = false;
      }
    });

  </script>

</body>
</html>
