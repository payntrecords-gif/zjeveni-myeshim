<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MYEShim – Přihlášení</title>
  <style>
    :root{--bg:#120f15;--card:#1d1723;--line:#3b3044;--text:#f7f1ff;--sub:#b9a9c6;--accent:#d4af37}
    *{box-sizing:border-box} body{margin:0;min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at top,#2a1f31,var(--bg));font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding:20px}
    .card{width:min(420px,100%);background:rgba(29,23,35,.92);border:1px solid var(--line);border-radius:18px;padding:24px}
    h1{margin:0 0 8px;font-size:1.4rem} p{margin:0 0 18px;color:var(--sub)}
    label{display:block;font-size:.92rem;margin-bottom:6px}
    input{width:100%;margin-bottom:12px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#120f15;color:var(--text);font:inherit}
    button{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#e3c76a,var(--accent));color:#1a1210;font-weight:700;cursor:pointer}
    button[disabled]{opacity:.65;cursor:wait}
    .link{display:block;margin-top:14px;color:#f2dc98;text-align:center;text-decoration:none}
    .link-small{display:block;margin-top:10px;color:var(--sub);text-align:center;text-decoration:none;font-size:.85rem}
    .error{min-height:20px;color:#ff8d8d;font-size:.9rem;margin-bottom:10px}
    .success{min-height:20px;color:#7ecf8e;font-size:.9rem;margin-bottom:10px}
  </style>
</head>
<body>
  <form class="card" id="login-form">
    <h1>Přihlášení</h1>
    <p>Zadej svůj e-mail a pošleme ti přihlašovací odkaz.</p>
    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
    <label for="email">E-mail</label>
    <input id="email" type="email" required autocomplete="email">
    <label for="password">Heslo</label>
    <input id="password" type="password" required minlength="6" placeholder="Minimálně 6 znaků" autocomplete="current-password">
    <button id="submit-btn" type="submit">Poslat přístupový odkaz</button>
    <a class="link" href="./register.html">Ještě nemáš účet? Zaregistruj se</a>
    <a class="link-small" href="./admin-login.html">Admin přihlášení</a>
  </form>

  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import emailjs from 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/+esm';
    import { verifyPassword } from './password-utils.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDNxmsMfxs0RZJLOViRn85P1t3SxuDOoRc",
      authDomain: "myeshim-app.firebaseapp.com",
      projectId: "myeshim-app",
      storageBucket: "myeshim-app.firebasestorage.app",
      messagingSenderId: "360259005980",
      appId: "1:360259005980:web:610695f8b44de04dc079d9"
    };
    const EMAILJS_SERVICE_ID = 'service_ritfist';
    const EMAILJS_TEMPLATE_ID = 'template_3x8z61m';
    const EMAILJS_PUBLIC_KEY = 'E1vj9Uv9CqN8xYOHS';

    emailjs.init(EMAILJS_PUBLIC_KEY);

    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const successEl = document.getElementById('success');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorEl.textContent = '';
      successEl.textContent = '';
      submitBtn.disabled = true;
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      try {
        const approvedSnap = await getDoc(doc(db, 'approvedUsers', email));
        if (!approvedSnap.exists()) {
          errorEl.textContent = 'Neplatný e-mail nebo heslo.';
          return;
        }
        const data = approvedSnap.data();
        if (data.status !== 'approved') {
          errorEl.textContent = 'Tvůj účet ještě nebyl schválen.';
          return;
        }
        const isPasswordValid = await verifyPassword(password, data.passwordHash, data.passwordSalt);
        if (!isPasswordValid) {
          errorEl.textContent = 'Neplatný e-mail nebo heslo.';
          return;
        }
        const token = crypto.randomUUID();
        await setDoc(doc(db, 'inviteTokens', token), {
          email,
          name: data.name || '',
          createdAt: serverTimestamp(),
          expiresAt: Timestamp.fromMillis(Date.now() + 48 * 60 * 60 * 1000),
          used: false
        });
        const link = 'https://payntrecords-gif.github.io/zjeveni-myeshim/?token=' + token;
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          to_email: email,
          to_name: data.name || '',
          message: 'Tvůj přihlašovací odkaz (platnost 48 hodin):',
          code: link
        });
        successEl.textContent = 'Poslali jsme ti přihlašovací odkaz na e-mail. Klikni na něj.';
        form.reset();
      } catch (error) {
        console.error(error);
        errorEl.textContent = 'Nepodařilo se odeslat e-mail. Zkus to prosím znovu.';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
