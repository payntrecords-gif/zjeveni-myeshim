<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MYEShim – Přihlášení</title>
  <style>
    :root{--bg:#120f15;--card:#1d1723;--line:#3b3044;--text:#f7f1ff;--sub:#b9a9c6;--accent:#d4af37}
    *{box-sizing:border-box} body{margin:0;min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at top,#2a1f31,var(--bg));font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding:20px}
    .card{width:min(430px,100%);background:rgba(29,23,35,.92);border:1px solid var(--line);border-radius:18px;padding:24px}
    h1{margin:0 0 8px;font-size:1.4rem} p{margin:0 0 18px;color:var(--sub)}
    label{display:block;font-size:.92rem;margin-bottom:6px}
    input{width:100%;margin-bottom:12px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#120f15;color:var(--text)}
    button{width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#e3c76a,var(--accent));color:#1a1210;font-weight:700;cursor:pointer}
    button[disabled]{opacity:.65;cursor:wait}
    .ghost{margin-top:8px;background:#2d2434;color:#f7f1ff;border:1px solid var(--line)}
    .link{display:block;margin-top:14px;color:#f2dc98;text-align:center;text-decoration:none}
    .error{min-height:20px;color:#ff8d8d;font-size:.9rem;margin-bottom:10px}
    .success{min-height:20px;color:#bff7a8;font-size:.9rem;margin-bottom:10px}
    .hidden{display:none}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div class="card">
    <h1>Přihlášení</h1>
    <p>Přihlas se pomocí jednorázového kódu zaslaného na e-mail.</p>
    <div class="error" id="error"></div>
    <div class="success" id="success"></div>

    <form id="email-form">
      <label for="email">E-mail</label>
      <input id="email" type="email" required autocomplete="email">
      <button id="send-code-btn" type="submit">Poslat přístupový kód</button>
    </form>

    <form id="otp-form" class="hidden">
      <label for="otp">Zadej přístupový kód</label>
      <input id="otp" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required placeholder="123456">
      <button id="verify-btn" type="submit">Přihlásit se</button>
      <button id="resend-btn" class="ghost" type="button">Poslat nový kód</button>
    </form>

    <a class="link" href="./register.html">Ještě nemáš účet? Zaregistruj se</a>
  </div>

  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const EMAILJS_SERVICE_ID = 'service_ritfist';
    const EMAILJS_TEMPLATE_ID = 'template_64wrero';
    const EMAILJS_PUBLIC_KEY = 'E1vj9Uv9CqN8xYOHS';

    const FIREBASE_AUTH_CONFIG = {
      apiKey: "AIzaSyDNxmsMfxs0RZJLOViRn85P1t3SxuDOoRc",
      authDomain: "myeshim-app.firebaseapp.com",
      projectId: "myeshim-app",
      storageBucket: "myeshim-app.firebasestorage.app",
      messagingSenderId: "360259005980",
      appId: "1:360259005980:web:610695f8b44de04dc079d9"
    };

    if (window.emailjs && typeof window.emailjs.init === 'function') {
      window.emailjs.init(EMAILJS_PUBLIC_KEY);
    }

    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_AUTH_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const emailForm = document.getElementById('email-form');
    const otpForm = document.getElementById('otp-form');
    const errorEl = document.getElementById('error');
    const successEl = document.getElementById('success');
    const sendCodeBtn = document.getElementById('send-code-btn');
    const verifyBtn = document.getElementById('verify-btn');
    const resendBtn = document.getElementById('resend-btn');

    let currentEmail = '';
    let currentName = '';

    function setError(message) {
      errorEl.textContent = message;
      successEl.textContent = '';
    }

    function setSuccess(message) {
      successEl.textContent = message;
      errorEl.textContent = '';
    }

    function generateCode() {
      const randomBuffer = new Uint32Array(1);
      const maxAcceptable = Math.floor(0x100000000 / 900000) * 900000;
      let randomValue = 0;
      do {
        window.crypto.getRandomValues(randomBuffer);
        randomValue = randomBuffer[0];
      } while (randomValue >= maxAcceptable);
      return String((randomValue % 900000) + 100000);
    }

    function ensureEmailJsReady() {
      if (!window.emailjs || typeof window.emailjs.send !== 'function') {
        throw new Error('emailjs-unavailable');
      }
    }

    async function sendOtpCode(email, name) {
      ensureEmailJsReady();
      const code = generateCode();
      const now = Date.now();

      await setDoc(doc(db, 'otpCodes', email), {
        code,
        createdAt: now,
        expiresAt: now + (10 * 60 * 1000),
        used: false,
        email
      });

      await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_email: email,
        to_name: name || email,
        code
      });

      currentEmail = email;
      currentName = name || email;
      otpForm.classList.remove('hidden');
      setSuccess('Kód jsme odeslali na tvůj e-mail. Platí 10 minut.');
    }

    emailForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      if (!email) {
        setError('Zadej e-mail.');
        return;
      }

      sendCodeBtn.disabled = true;
      try {
        const approvedSnap = await getDoc(doc(db, 'approvedUsers', email));
        if (!approvedSnap.exists()) {
          setError('E-mail nenalezen, zaregistruj se.');
          return;
        }

        const approvedData = approvedSnap.data() || {};
        if (approvedData.status !== 'approved') {
          setError('Tvůj účet ještě nebyl schválen.');
          return;
        }

        await sendOtpCode(email, approvedData.name || email);
      } catch (error) {
        if (error && error.message === 'emailjs-unavailable') {
          setError('E-mailová služba je dočasně nedostupná. Zkus to prosím za chvíli.');
        } else {
          setError('Odeslání kódu selhalo. Zkus to prosím znovu.');
        }
      } finally {
        sendCodeBtn.disabled = false;
      }
    });

    otpForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const inputCode = document.getElementById('otp').value.trim();
      verifyBtn.disabled = true;
      try {
        const otpSnap = await getDoc(doc(db, 'otpCodes', currentEmail));
        const otpData = otpSnap.exists() ? otpSnap.data() : null;
        const valid = otpData
          && otpData.code === inputCode
          && otpData.used === false
          && Number(otpData.expiresAt || 0) > Date.now();

        if (!valid) {
          setError('Nesprávný nebo expirovaný kód.');
          return;
        }

        await setDoc(doc(db, 'otpCodes', currentEmail), { used: true }, { merge: true });
        localStorage.setItem('myeshim_user_email', currentEmail);

        try {
          await signInAnonymously(auth);
        } catch (error) {
          console.warn('Anonymous sign-in failed, continuing with localStorage session:', error);
        }

        window.location.replace('./index.html');
      } catch (error) {
        setError('Nesprávný nebo expirovaný kód.');
      } finally {
        verifyBtn.disabled = false;
      }
    });

    resendBtn.addEventListener('click', async () => {
      if (!currentEmail) return;
      resendBtn.disabled = true;
      try {
        await sendOtpCode(currentEmail, currentName);
      } catch (error) {
        if (error && error.message === 'emailjs-unavailable') {
          setError('E-mailová služba je dočasně nedostupná. Zkus to prosím za chvíli.');
        } else {
          setError('Nový kód se nepodařilo odeslat.');
        }
      } finally {
        resendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
