<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>MYEShim – Import členů</title>
  <style>
    :root{--bg:#f7f1e3;--card:#fbf4e7;--line:#e6d7ba;--text:#3f2f1e;--sub:#7a6542;--accent:#c79b3b;--accent-2:#ddb86a;--ok:#658348;--error:#a35746;--shadow:0 14px 30px rgba(118,90,40,.12)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100dvh;display:grid;place-items:center;background:radial-gradient(circle at top,#fff8ea 0%,#f7efdf 42%,#f2e8d3 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
    h1,h2{color:var(--text)}
    p{color:var(--sub)}
    input,textarea{width:100%;margin-bottom:12px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#fffaf0;color:var(--text);font:inherit}
    input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(199,155,59,.22)}
    button,.btn{padding:12px 14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#2f2214;font-weight:700;cursor:pointer;box-shadow:0 8px 18px rgba(139,104,43,.2)}
    button:hover,.btn:hover{filter:brightness(1.02)}
    button:active,.btn:active{transform:translateY(1px)}
    button:disabled,.btn:disabled{opacity:.6;cursor:not-allowed}
    a,.link{color:#9a772f}
    .error{color:var(--error)}
    .success,.status.ok{color:var(--ok)}
    .status.error{color:var(--error)}
    body{margin:0;background:radial-gradient(circle at top,#fff8ea 0%,#f7efdf 42%,#f2e8d3 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding:20px;display:block;min-height:100dvh}
    .card{max-width:760px;margin:0 auto;padding:20px}
    textarea{min-height:220px;margin:10px 0}
    input[type='file']{margin:10px 0}
    .status{min-height:22px;margin-top:12px}

  </style>
</head>
<body>
  <div class="card">
    <h1>Hromadný import členů</h1>
    <p>Nahraj CSV (jeden e-mail na řádek nebo sloupec <strong>email</strong>) nebo vlož e-maily ručně.</p>
    <input type="file" id="csv-file" accept=".csv,text/csv,text/plain">
    <textarea id="email-input" placeholder="např. clovek@example.com"></textarea>
    <button id="import-btn" type="button">Importovat e-maily</button>
    <div class="status" id="status"></div>
    <p><a href="./admin.html">← Zpět do admin panelu</a></p>
  </div>

  <script type="module">
    import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const FIREBASE_AUTH_CONFIG = {
      apiKey: "AIzaSyDNxmsMfxs0RZJLOViRn85P1t3SxuDOoRc",
      authDomain: "myeshim-app.firebaseapp.com",
      projectId: "myeshim-app",
      storageBucket: "myeshim-app.firebasestorage.app",
      messagingSenderId: "360259005980",
      appId: "1:360259005980:web:610695f8b44de04dc079d9"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_AUTH_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const fileInput = document.getElementById('csv-file');
    const input = document.getElementById('email-input');
    const statusEl = document.getElementById('status');
    const importBtn = document.getElementById('import-btn');
    let currentUid = '';

    function setStatus(text, isError = false) {
      statusEl.style.color = isError ? '#ff9ea1' : '#c8f7b0';
      statusEl.textContent = text;
    }

    function parseEmails(text) {
      const lines = text.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      if (!lines.length) return [];

      const splitLine = (line) => line.split(/[;,\t]/).map((col) => col.trim());
      const first = splitLine(lines[0]).map((value) => value.toLowerCase());
      const emailIndex = first.indexOf('email');
      const sourceLines = emailIndex >= 0 ? lines.slice(1) : lines;
      const emails = new Set();

      sourceLines.forEach((line) => {
        const cols = splitLine(line);
        const candidate = emailIndex >= 0 ? (cols[emailIndex] || '') : cols[0];
        const normalized = candidate.trim().toLowerCase();
        if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(normalized)) emails.add(normalized);
      });

      return [...emails];
    }

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      input.value = await file.text();
    });

    importBtn.addEventListener('click', async () => {
      if (!currentUid) return;
      const emails = parseEmails(input.value);
      if (!emails.length) {
        setStatus('CSV neobsahuje žádné platné e-maily.', true);
        return;
      }

      importBtn.disabled = true;
      try {
        await Promise.all(emails.map((email) => (
          setDoc(doc(db, 'preApprovedEmails', email), {
            email,
            addedAt: serverTimestamp(),
            addedBy: currentUid
          }, { merge: true })
        )));
        setStatus(`Import dokončen: ${emails.length} e-mailů.`);
      } catch (error) {
        setStatus('Import selhal. Zkus to prosím znovu.', true);
      } finally {
        importBtn.disabled = false;
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.replace('./login.html');
        return;
      }
      currentUid = user.uid;
      const adminSnap = await getDoc(doc(db, 'admins', user.uid));
      if (!adminSnap.exists()) {
        window.location.replace('./index.html');
      }
    });
  </script>
</body>
</html>
